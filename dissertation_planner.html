<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JJ's Project Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&family=Josefin+Sans:wght@300;400;600&family=Share+Tech+Mono&family=Righteous&family=Fredoka+One&family=Caveat:wght@400;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1e2028; --paper: #ffffff; --cream: #f4f6fb;
    --blue: #4A6CF7; --blue-light: #e8edff; --blue-mid: #c5d0fa;
    --teal: #2e9e8f; --muted: #6b7280; --border: #e2e6f0;
    --card: #ffffff; --red-dead: #e53e3e; --green-done: #38a169;
    --gold: #4A6CF7; --gold-light: #a5b4fc; --rust: #e53e3e;
    --sage: #2e9e8f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; overflow-x: hidden; }
  header { background: #fff; color: var(--ink); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); height: 60px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  header h1 { font-family: 'Lato', sans-serif; font-size: 1.25rem; font-weight: 700; letter-spacing: -.01em; color: var(--ink); }
  .subtitle { font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--blue); margin-top: 2px; letter-spacing: .1em; text-transform: uppercase; }
  nav { background: #fff; border-bottom: 1px solid var(--border); display: flex; padding: 0 32px; }
  nav button { font-family: 'Inter', sans-serif; font-size: .78rem; font-weight: 500; letter-spacing: .01em; background: none; border: none; border-bottom: 2px solid transparent; padding: 14px 16px; cursor: pointer; color: var(--muted); transition: all .15s; }
  nav button.active { color: var(--blue); border-bottom-color: var(--blue); }
  nav button:hover { color: var(--ink); }
  .app { display: flex; min-height: calc(100vh - 108px); }
  .main-pane { flex: 1; padding: 28px 32px; }
  .side-pane { width: 280px; background: #fff; border-left: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .card h3 { font-family: 'Lato', sans-serif; font-size: .95rem; font-weight: 700; margin-bottom: 14px; color: var(--ink); }
  .card label { font-family: 'Inter', sans-serif; font-size: .72rem; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 12px; }
  .card label:first-of-type { margin-top: 0; }
  textarea, input[type="text"], input[type="date"], input[type="number"], input[type="password"] {
    width: 100%; font-family: 'Inter', sans-serif; font-size: .85rem; background: var(--cream);
    border: 1px solid var(--border); border-radius: 7px; padding: 8px 12px; color: var(--ink);
    resize: vertical; outline: none; transition: border-color .15s, box-shadow .15s;
  }
  textarea:focus, input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-light); }
  textarea { min-height: 68px; }
  .btn { font-family: 'Inter', sans-serif; font-size: .78rem; font-weight: 600; letter-spacing: .02em; background: var(--blue); color: #fff; border: none; border-radius: 7px; padding: 9px 18px; cursor: pointer; transition: background .15s, box-shadow .15s; margin-top: 10px; }
  .btn:hover { background: #3a5ce5; box-shadow: 0 2px 8px rgba(74,108,247,.3); }
  .btn-sm { padding: 5px 12px; font-size: .72rem; margin-top: 0; }
  .btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--cream); color: var(--ink); box-shadow: none; }
  .btn-sage { background: var(--teal); }
  .btn-sage:hover { background: #25897b; box-shadow: 0 2px 8px rgba(46,158,143,.3); }
  .session-readout { background: linear-gradient(135deg, #4A6CF7 0%, #6d88f9 100%); color: #fff; border-radius: 10px; padding: 18px 20px; margin-bottom: 20px; position: relative; box-shadow: 0 4px 12px rgba(74,108,247,.2); }
  .session-readout .tag { font-family: 'DM Mono', monospace; font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.7); margin-bottom: 6px; }
  .session-readout p { font-size: .88rem; line-height: 1.55; color: #fff; }
  .hr-badge { position: absolute; top: 14px; right: 14px; font-family: 'DM Mono', monospace; font-size: .7rem; background: rgba(255,255,255,.25); color: #fff; padding: 3px 10px; border-radius: 20px; backdrop-filter: blur(4px); }
  .cal-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .cal-controls .view-btns { display: flex; gap: 4px; background: var(--cream); border-radius: 8px; padding: 3px; }
  .cal-controls .view-btns button { font-family: 'Inter', sans-serif; font-size: .73rem; font-weight: 500; padding: 5px 14px; border: none; background: none; border-radius: 6px; cursor: pointer; color: var(--muted); transition: all .15s; }
  .cal-controls .view-btns button.active { background: #fff; color: var(--blue); font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .cal-nav { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .cal-nav button { width: 30px; height: 30px; border: 1px solid var(--border); background: #fff; border-radius: 7px; cursor: pointer; font-size: 1rem; transition: all .15s; color: var(--muted); }
  .cal-nav button:hover { background: var(--blue-light); border-color: var(--blue); color: var(--blue); }
  .cal-nav .cal-label { font-family: 'Lato', sans-serif; font-size: 1rem; font-weight: 700; min-width: 200px; text-align: center; color: var(--ink); }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .week-day { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 10px; min-height: 130px; cursor: pointer; transition: all .15s; }
  .week-day:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(74,108,247,.1); }
  .week-day.today { border-color: var(--blue); background: var(--blue-light); }
  .week-day.past { background: #fafafa; }
  .week-day .day-name { font-family: 'Inter', sans-serif; font-size: .62rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
  .week-day .day-num { font-family: 'Lato', sans-serif; font-size: 1.3rem; font-weight: 700; line-height: 1; margin: 3px 0 8px; color: var(--ink); }
  .week-day.today .day-num { color: var(--blue); }
  .week-day .day-hours { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--teal); margin-bottom: 5px; font-weight: 500; }
  .week-day .day-content { font-size: .73rem; color: var(--muted); line-height: 1.4; }
  .week-day .goal-item { font-size: .7rem; color: var(--teal); background: #e6f7f5; border-radius: 4px; padding: 2px 6px; margin-top: 3px; }
  .week-total { font-family: 'Inter', sans-serif; font-size: .78rem; color: var(--muted); margin-top: 10px; padding: 10px 16px; background: #fff; border: 1px solid var(--border); border-radius: 8px; display: flex; justify-content: space-between; }
  .week-total span { color: var(--blue); font-weight: 600; }
  .words-week { font-family: 'Inter', sans-serif; font-size: .75rem; color: var(--muted); margin-top: 6px; padding: 8px 16px; background: #fff; border: 1px solid var(--border); border-radius: 8px; }
  .words-week span { color: var(--teal); font-weight: 600; }
  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .month-header-cell { font-family: 'Inter', sans-serif; font-size: .65rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); text-align: center; padding: 6px 0; }
  .month-day { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 7px; min-height: 66px; cursor: pointer; transition: all .15s; position: relative; }
  .month-day:hover { border-color: var(--blue); background: var(--blue-light); }
  .month-day.today { border-color: var(--blue); background: var(--blue-light); }
  .month-day.other-month { opacity: .35; }
  .month-day .md-num { font-family: 'Lato', sans-serif; font-size: .88rem; font-weight: 700; color: var(--ink); }
  .month-day.today .md-num { color: var(--blue); }
  .month-day .md-hours { font-family: 'DM Mono', monospace; font-size: .58rem; color: var(--teal); margin-top: 3px; font-weight: 500; }
  .month-summary { font-family: 'Inter', sans-serif; font-size: .78rem; margin-top: 10px; padding: 10px 16px; background: #fff; border: 1px solid var(--border); border-radius: 8px; display: flex; justify-content: space-between; }
  .month-summary span { color: var(--blue); font-weight: 600; }

  /* ── YEAR VIEW — Google-style mini month grids ── */
  .year-view-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .year-mini-month { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .ymm-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .ymm-name { font-family: 'Lato', sans-serif; font-size: .82rem; font-weight: 700; color: var(--ink); }
  .ymm-hours { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--teal); font-weight: 500; }
  .ymm-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
  .ymm-dow { font-family: 'Inter', sans-serif; font-size: .52rem; font-weight: 700; text-transform: uppercase; color: var(--muted); text-align: center; padding-bottom: 3px; }
  .ymm-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; font-size: .62rem; font-weight: 400; border-radius: 50%; color: var(--ink); cursor: default; transition: background .1s; }
  .ymm-cell.other { color: #ccc; }
  .ymm-cell.has-hours { background: var(--blue-light); color: var(--blue); font-weight: 600; }
  .ymm-cell.is-today { background: var(--blue); color: #fff; font-weight: 700; border-radius: 50%; }
  .ymm-cell.has-deadline { background: #fff0f0; color: var(--red-dead); font-weight: 700; border: 1px solid #fca5a5; }
  .year-mini-month:hover { border-color: var(--blue); box-shadow: 0 2px 10px rgba(74,108,247,.12); }



  .deadline-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .deadline-item:last-child { border-bottom: none; }
  .deadline-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .deadline-dot.complete { background: var(--green-done); }
  .deadline-dot.incomplete { background: var(--red-dead); }
  .deadline-info { flex: 1; }
  .deadline-info .dl-desc { font-size: .83rem; font-weight: 500; }
  .deadline-info .dl-date { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--muted); margin-top: 2px; }
  .deadline-actions { display: flex; gap: 5px; }
  .wc-bar-bg { background: var(--cream); border-radius: 4px; height: 8px; margin: 10px 0 6px; overflow: hidden; border: 1px solid var(--border); }
  .wc-bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--blue)); border-radius: 4px; transition: width .5s ease; }
  .wc-stats { font-family: 'DM Mono', monospace; font-size: .68rem; color: var(--muted); display: flex; justify-content: space-between; }
  .year-deadline { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 7px; margin-bottom: 6px; font-size: .8rem; font-family: 'Inter', sans-serif; }
  .year-deadline.complete { background: #f0fdf4; color: var(--green-done); border: 1px solid #bbf7d0; }
  .year-deadline.incomplete { background: #fff5f5; color: var(--red-dead); border: 1px solid #fca5a5; }
  .year-deadline.final { border: 2px solid var(--blue); background: var(--blue-light); color: var(--blue); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 420px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
  .modal h3 { font-family: 'Lato', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
  .modal .actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .section-title { font-family: 'Lato', sans-serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); color: var(--ink); }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
  .toggle-label { font-family: 'Inter', sans-serif; font-size: .88rem; font-weight: 500; }
  .toggle-sublabel { font-family: 'Inter', sans-serif; font-size: .72rem; color: var(--muted); margin-top: 2px; }
  .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; cursor: pointer; transition: background .2s; }
  .toggle-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
  .toggle input:checked + .toggle-slider { background: var(--blue); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }
  .email-preview { background: var(--cream); color: var(--ink); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; font-size: .85rem; line-height: 1.6; margin: 12px 0; font-family: 'Inter', sans-serif; }
  .status-pill { display: inline-flex; align-items: center; gap: 6px; font-family: 'Inter', sans-serif; font-size: .73rem; font-weight: 500; padding: 5px 12px; border-radius: 20px; margin-top: 10px; }
  .status-pill.connected { background: #f0fdf4; color: var(--green-done); border: 1px solid #bbf7d0; }
  .status-pill.disconnected { background: #fff5f5; color: var(--red-dead); border: 1px solid #fca5a5; }
  .status-pill.neutral { background: var(--cream); color: var(--muted); border: 1px solid var(--border); }
  .step-block { border-left: 3px solid var(--blue); padding-left: 14px; margin: 14px 0; }
  .step-block .step-num { font-family: 'Inter', sans-serif; font-size: .68rem; font-weight: 700; text-transform: uppercase; color: var(--blue); margin-bottom: 4px; letter-spacing: .04em; }
  .step-block p { font-size: .82rem; color: var(--muted); line-height: 1.55; }
  .step-block a { color: var(--blue); }
  .step-block code { font-family: 'DM Mono', monospace; font-size: .78rem; background: var(--cream); padding: 1px 5px; border-radius: 4px; color: var(--ink); }
  .send-log { font-family: 'DM Mono', monospace; font-size: .68rem; color: var(--muted); margin-top: 8px; line-height: 1.7; }
  /* Deadline indicators */
  .deadline-chip { font-size: .65rem; font-family: 'Inter', sans-serif; font-weight: 600; padding: 2px 6px; border-radius: 4px; margin-top: 3px; display: flex; align-items: center; gap: 3px; }
  .deadline-chip.incomplete { background: #fff5f5; color: var(--red-dead); border: 1px solid #fca5a5; }
  .deadline-chip.complete { background: #f0fdf4; color: var(--green-done); border: 1px solid #bbf7d0; }
  .deadline-chip.final { background: var(--blue-light); color: var(--blue); border: 1px solid var(--blue-mid); }
  .month-day .dl-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .month-day .dl-dot.incomplete { background: var(--red-dead); }
  .month-day .dl-dot.complete { background: var(--green-done); }
  .month-day .dl-dot.final { background: var(--blue); }
  .month-day .dl-dots { display: flex; gap: 2px; margin-top: 3px; flex-wrap: wrap; }
  .month-day .md-label { font-size: .58rem; font-family: 'Inter', sans-serif; color: var(--red-dead); font-weight: 600; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .month-day .md-label.final { color: var(--blue); }

  /* Meeting log */
  .meeting-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0; margin-bottom: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .meeting-card-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; user-select: none; transition: background .15s; }
  .meeting-card-header:hover { background: var(--cream); }
  .meeting-date-badge { font-family: 'DM Mono', monospace; font-size: .7rem; font-weight: 500; background: var(--blue-light); color: var(--blue); border-radius: 6px; padding: 4px 10px; flex-shrink: 0; }
  .meeting-supervisor { font-family: 'Inter', sans-serif; font-size: .82rem; font-weight: 600; color: var(--ink); flex: 1; }
  .meeting-preview { font-family: 'Inter', sans-serif; font-size: .75rem; color: var(--muted); flex: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meeting-actions-count { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--muted); flex-shrink: 0; }
  .meeting-body { padding: 0 18px 16px; border-top: 1px solid var(--border); }
  .meeting-body.hidden { display: none; }
  .meeting-section-label { font-family: 'Inter', sans-serif; font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 14px 0 6px; }
  .meeting-notes-text { font-size: .85rem; color: var(--ink); line-height: 1.6; white-space: pre-wrap; }
  .action-item { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .action-item:last-child { border-bottom: none; }
  .action-checkbox { width: 16px; height: 16px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .action-checkbox.done { background: var(--green-done); border-color: var(--green-done); color: #fff; font-size: .7rem; }
  .action-text { font-size: .83rem; flex: 1; line-height: 1.45; }
  .action-text.done { text-decoration: line-through; color: var(--muted); }
  .meeting-empty { text-align: center; padding: 40px 0; color: var(--muted); font-size: .85rem; }
  .meeting-chevron { font-size: .7rem; color: var(--muted); transition: transform .2s; flex-shrink: 0; }
  .meeting-chevron.open { transform: rotate(90deg); }


  /* ── Solarized ── */
  html[data-theme="solarized"] {
    --ink: #657b83; --paper: #fdf6e3; --cream: #eee8d5;
    --blue: #268bd2; --blue-light: #d4eaf7; --blue-mid: #93c5e8;
    --teal: #2aa198; --muted: #93a1a1; --border: #ddd6c1;
    --card: #fdf6e3; --red-dead: #dc322f; --green-done: #859900;
    --gold: #268bd2; --gold-light: #93c5e8; --rust: #cb4b16;
    --sage: #2aa198;
  }
  html[data-theme="solarized"] body { background: var(--paper); color: var(--ink); }
  html[data-theme="solarized"] header { background: #073642; border-bottom-color: #268bd2; }
  html[data-theme="solarized"] nav { background: #eee8d5; }
  html[data-theme="solarized"] .side-pane { background: #eee8d5; }
  html[data-theme="solarized"] .cal-nav button { background: #fdf6e3; }
  html[data-theme="solarized"] .week-total, html[data-theme="solarized"] .words-week, html[data-theme="solarized"] .month-summary { background: #eee8d5; }
  html[data-theme="solarized"] textarea, html[data-theme="solarized"] input[type="text"], html[data-theme="solarized"] input[type="date"], html[data-theme="solarized"] input[type="number"], html[data-theme="solarized"] input[type="password"] { background: #eee8d5; color: var(--ink); border-color: var(--border); }
  html[data-theme="solarized"] .session-readout { background: linear-gradient(135deg, #073642 0%, #0d4a5a 100%); }
  html[data-theme="solarized"] .cal-controls .view-btns { background: #eee8d5; }
  html[data-theme="solarized"] .cal-controls .view-btns button.active { background: #fdf6e3; color: var(--blue); }

  /* ── Lavender Fields ── */
  html[data-theme="lavender"] {
    --ink: #2d2540; --paper: #f7f4ff; --cream: #ede8fa;
    --blue: #7c5cbf; --blue-light: #e8e0f8; --blue-mid: #c4b0e8;
    --teal: #9b6fb5; --muted: #8a7aaa; --border: #d8cfee;
    --card: #ffffff; --red-dead: #c0392b; --green-done: #5a9e6f;
    --gold: #7c5cbf; --gold-light: #c4b0e8; --rust: #c0392b;
    --sage: #9b6fb5;
  }
  html[data-theme="lavender"] body { background: var(--paper); font-family: 'Nunito', sans-serif; }
  html[data-theme="lavender"] header { background: #2d2540; border-bottom-color: #c4b0e8; }

<div class="app">
  <div class="main-pane" id="main-pane"></div>
  <div class="side-pane" id="side-pane"></div>
</div>

<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ===================== DATE UTILS =====================
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const todayKey = () => fmtKey(TODAY);
const fmtKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const parseKey = k => { const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); };
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ===================== STORAGE =====================
const store = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} };
const retrieve = key => { try { const v=localStorage.getItem(key); return v?JSON.parse(v):null; } catch(e){ return null; } };

// ===================== STATE =====================
let state = {
  lastAccomplished: '', lastPlan: '', lastHours: '',
  currentTheme: 'airy',
  meetings: [],  // [{id, date, supervisor, notes, actions:[{text,done}]}]
  days: {}, deadlines: [], finalDeadline: '',
  wcGoal: 0, wcCurrent: 0,
  calView: 'week', calDate: new Date(TODAY),
  // Alexa emailer — secret & token live only in memory; stored encrypted
  alexaEnabled: false,
  alexaRecipient: '',
  alexaClientId: '',
  alexaClientSecret: '',   // in-memory only; persisted encrypted
  alexaRefreshToken: '',   // in-memory only; persisted encrypted
  alexaSenderEmail: '',
  alexaLastSent: '',
  alexaLastStatus: '',
  _hasEncryptedSecret: false,
  _hasEncryptedToken: false,
};

// ── AES-GCM helpers ──────────────────────────────────────────
async function deriveKey(password, saltBytes) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: saltBytes, iterations: 200000, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
}
function toHex(buf) {
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function fromHex(hex) {
  const bytes = new Uint8Array(hex.length/2);
  for (let i=0;i<hex.length;i+=2) bytes[i/2] = parseInt(hex.slice(i,i+2),16);
  return bytes;
}
async function encryptSecret(plaintext, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await deriveKey(password, salt);
  const cipherBuf = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(plaintext));
  return { salt: toHex(salt), iv: toHex(iv), ct: toHex(cipherBuf) };
}
async function decryptSecret(stored, password) {
  const key = await deriveKey(password, fromHex(stored.salt));
  const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: fromHex(stored.iv) }, key, fromHex(stored.ct));
  return new TextDecoder().decode(plainBuf);
}

// ── State load / save ─────────────────────────────────────────
function loadState() {
  const plainKeys = ['lastAccomplished','lastPlan','lastHours','days','deadlines','finalDeadline',
                     'wcGoal','wcCurrent','alexaEnabled','alexaRecipient','alexaClientId',
                     'alexaSenderEmail','alexaLastSent','alexaLastStatus','currentTheme','meetings'];
  for (const k of plainKeys) { const v = retrieve('diss_'+k); if (v !== null) state[k] = v; }
  state._hasEncryptedSecret = !!localStorage.getItem('diss_enc_clientSecret');
  state._hasEncryptedToken  = !!localStorage.getItem('diss_enc_refreshToken');
}
function saveState() {
  const plainKeys = ['lastAccomplished','lastPlan','lastHours','days','deadlines','finalDeadline',
                     'wcGoal','wcCurrent','alexaEnabled','alexaRecipient','alexaClientId',
                     'alexaSenderEmail','alexaLastSent','alexaLastStatus','currentTheme','meetings'];
  for (const k of plainKeys) store('diss_'+k, state[k]);
}
async function saveEncryptedCreds(password) {
  if (state.alexaClientSecret) {
    localStorage.setItem('diss_enc_clientSecret', JSON.stringify(await encryptSecret(state.alexaClientSecret, password)));
  }
  if (state.alexaRefreshToken) {
    localStorage.setItem('diss_enc_refreshToken', JSON.stringify(await encryptSecret(state.alexaRefreshToken, password)));
  }
  state._hasEncryptedSecret = !!state.alexaClientSecret;
  state._hasEncryptedToken  = !!state.alexaRefreshToken;
}
async function loadEncryptedCreds(password) {
  const rawSecret = localStorage.getItem('diss_enc_clientSecret');
  const rawToken  = localStorage.getItem('diss_enc_refreshToken');
  try {
    if (rawSecret) state.alexaClientSecret = await decryptSecret(JSON.parse(rawSecret), password);
    if (rawToken)  state.alexaRefreshToken  = await decryptSecret(JSON.parse(rawToken),  password);
    return true;
  } catch(e) {
    state.alexaClientSecret = '';
    state.alexaRefreshToken  = '';
    return false;
  }
}
function clearEncryptedCreds() {
  localStorage.removeItem('diss_enc_clientSecret');
  localStorage.removeItem('diss_enc_refreshToken');
  state.alexaClientSecret = '';
  state.alexaRefreshToken  = '';
  state._hasEncryptedSecret = false;
  state._hasEncryptedToken  = false;
}

// ===================== COMPUTED =====================
const hoursForDay = k => parseFloat(state.days[k]?.hours || 0) || 0;
const hoursForWeek = ws => Array.from({length:7},(_,i)=>hoursForDay(fmtKey(addDays(ws,i)))).reduce((a,b)=>a+b,0);
const hoursForMonth = (y,m) => { let t=0,d=new Date(y,m+1,0).getDate(); for(let i=1;i<=d;i++) t+=hoursForDay(`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`); return t; };
const hoursForYear = y => Array.from({length:12},(_,m)=>hoursForMonth(y,m)).reduce((a,b)=>a+b,0);
const getWeekStart = d => { const r=new Date(d); r.setDate(r.getDate()-r.getDay()); return r; };
const wordsPerDay = () => {
  if (!state.finalDeadline||!state.wcGoal||!state.wcCurrent) return 0;
  const diff = Math.max(1,Math.ceil((new Date(state.finalDeadline)-TODAY)/86400000));
  return Math.max(0,state.wcGoal-state.wcCurrent)/diff;
};

// ===================== PASSWORD MODAL =====================
// mode: 'set' (new password) or 'enter' (existing password)
function showPasswordModal(mode, onSuccess) {
  const isSet = mode === 'set';
  document.getElementById('modal-content').innerHTML = `
    <h3>${isSet ? 'Set a Storage Password' : 'Enter Your Storage Password'}</h3>
    <p style="font-size:.82rem;color:var(--muted);line-height:1.55;margin-bottom:12px">
      ${isSet
        ? 'Your Client Secret and refresh token will be encrypted with this password. You will need it each time you open the app.'
        : 'Enter your password to decrypt your stored Gmail credentials.'}
    </p>
    <label style="font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px">Password</label>
    <input type="password" id="storage-pw-input" placeholder="Enter password…" style="width:100%">
    ${isSet ? `<label style="font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px;margin-top:10px">Confirm Password</label>
    <input type="password" id="storage-pw-confirm" placeholder="Confirm password…" style="width:100%">` : ''}
    <div id="pw-modal-error" style="font-family:'DM Mono',monospace;font-size:.68rem;color:var(--red-dead);margin-top:8px;min-height:18px"></div>
    <div class="actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="submitPasswordModal(${isSet})">OK</button>
    </div>`;
  document.getElementById('modal')._pwCallback = onSuccess;
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('storage-pw-input')?.focus(), 50);
}

async function submitPasswordModal(isSet) {
  const pw = document.getElementById('storage-pw-input')?.value || '';
  if (!pw) { document.getElementById('pw-modal-error').textContent = 'Password cannot be empty.'; return; }
  if (isSet) {
    const confirm = document.getElementById('storage-pw-confirm')?.value || '';
    if (pw !== confirm) { document.getElementById('pw-modal-error').textContent = 'Passwords do not match.'; return; }
  }
  const cb = document.getElementById('modal')._pwCallback;
  if (!isSet) {
    // Decrypt mode — verify password works
    const ok = await loadEncryptedCreds(pw);
    if (!ok) { document.getElementById('pw-modal-error').textContent = 'Incorrect password.'; return; }
  }
  closeModal();
  if (cb) cb(pw);
}

// ===================== GMAIL OAUTH2 + SEND =====================
// Flow: user provides Client ID + Secret from Google Cloud Console.
// We open an OAuth popup, get an auth code, exchange it for tokens,
// store the refresh token. From then on we get fresh access tokens
// silently and call Gmail REST API to send.

const GMAIL_SCOPE = 'https://www.googleapis.com/auth/gmail.send';
const TOKEN_URL   = 'https://oauth2.googleapis.com/token';
const GMAIL_SEND  = 'https://www.googleapis.com/gmail/v1/users/me/messages/send';

// Step 1 — open OAuth popup and get auth code
function gmailAuthorize() {
  const clientId = document.getElementById('alexa-client-id')?.value.trim() || state.alexaClientId;
  const email    = document.getElementById('alexa-sender-email')?.value.trim() || state.alexaSenderEmail;
  if (!clientId) { alert('Please enter your Google Client ID first.'); return; }

  // Save what the user has typed so far — only overwrite secret if they actually typed something
  if (document.getElementById('alexa-client-id'))    state.alexaClientId   = document.getElementById('alexa-client-id').value.trim();
  if (document.getElementById('alexa-sender-email')) state.alexaSenderEmail = document.getElementById('alexa-sender-email').value.trim();
  const typedSecret = document.getElementById('alexa-client-secret')?.value.trim();
  if (typedSecret) state.alexaClientSecret = typedSecret;  // only overwrite if user re-entered it
  saveState();

  // If secret still not in memory, we need to unlock first
  if (!state.alexaClientSecret) {
    if (state._hasEncryptedSecret) {
      showPasswordModal('enter', async (pw) => {
        const ok = await loadEncryptedCreds(pw);
        if (!ok) { alert('Incorrect password — could not decrypt credentials.'); return; }
        _doGmailAuthorize(clientId, email);
      });
    } else {
      alert('Please enter your Client Secret before connecting.');
    }
    return;
  }

  _doGmailAuthorize(clientId, email);
}

function _doGmailAuthorize(clientId, email) {
  const redirectUri = 'urn:ietf:wg:oauth:2.0:oob';
  const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
    `client_id=${encodeURIComponent(clientId)}` +
    `&redirect_uri=${encodeURIComponent(redirectUri)}` +
    `&response_type=code` +
    `&scope=${encodeURIComponent(GMAIL_SCOPE)}` +
    `&access_type=offline` +
    `&prompt=consent` +
    (email ? `&login_hint=${encodeURIComponent(email)}` : '');
  // Open in a new tab — OOB flow gives user a code to paste back
  window.open(authUrl, '_blank');
  // Show the code-paste modal
  showAuthCodeModal();
}

function showAuthCodeModal() {
  document.getElementById('modal-content').innerHTML = `
    <h3>Paste Authorization Code</h3>
    <p style="font-size:.82rem;color:var(--muted);line-height:1.55;margin-bottom:12px">
      After authorizing in the Google tab, you'll see a code on the page. Copy it and paste it below.
    </p>
    <label style="font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px">Authorization Code</label>
    <input type="text" id="auth-code-input" placeholder="4/0AX4Xf..." style="width:100%">
    <div class="actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="gmailExchangeCode()">Connect</button>
    </div>`;
  document.getElementById('modal').style.display = 'flex';
}

async function gmailExchangeCode() {
  const code = document.getElementById('auth-code-input')?.value.trim();
  if (!code) { alert('Please paste the authorization code.'); return; }

  const clientId     = state.alexaClientId;
  const clientSecret = state.alexaClientSecret;
  if (!clientId || !clientSecret) { alert('Client ID and Secret are required.'); return; }

  try {
    const resp = await fetch(TOKEN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        code, client_id: clientId, client_secret: clientSecret,
        redirect_uri: 'urn:ietf:wg:oauth:2.0:oob', grant_type: 'authorization_code'
      })
    });
    const data = await resp.json();
    if (data.refresh_token) {
      state.alexaRefreshToken = data.refresh_token;
      saveState();
      closeModal();
      showPasswordModal('set', async (pw) => {
        await saveEncryptedCreds(pw);
        renderMain();
        renderSide();
        alert('✓ Gmail connected successfully! You can now send emails.');
      });
    } else {
      alert('Failed to get refresh token. Response: ' + JSON.stringify(data));
    }
  } catch(e) {
    alert('Connection error: ' + e.message);
  }
}

async function gmailGetAccessToken() {
  const resp = await fetch(TOKEN_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id:     state.alexaClientId,
      client_secret: state.alexaClientSecret,
      refresh_token: state.alexaRefreshToken,
      grant_type:    'refresh_token'
    })
  });
  const data = await resp.json();
  if (!data.access_token) throw new Error('Could not refresh access token: ' + JSON.stringify(data));
  return data.access_token;
}

function buildEmailBody() {
  const acc  = state.lastAccomplished || '(nothing recorded)';
  const plan = state.lastPlan         || '(nothing recorded)';
  return `Hello! Glad to see you working on your project! Last time, you ${acc}. Today, you should ${plan}.`;
}

function toBase64url(str) {
  // Encode a string to base64url safely via UTF-8 bytes
  const bytes = new TextEncoder().encode(str);
  const binary = Array.from(bytes, b => String.fromCharCode(b)).join('');
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function makeRawEmail(to, subject, attachmentText) {
  const boundary = 'diss_planner_' + Math.random().toString(36).slice(2);
  // Encode the attachment content as base64 (standard, not url-safe — MIME uses standard)
  const attachBytes = new TextEncoder().encode(attachmentText);
  const attachBinary = Array.from(attachBytes, b => String.fromCharCode(b)).join('');
  const attachB64 = btoa(attachBinary);
  // Split into 76-char lines as required by MIME
  const attachB64Wrapped = attachB64.match(/.{1,76}/g).join('\r\n');

  const msg = [
    `To: ${to}`,
    `From: ${state.alexaSenderEmail}`,
    `Subject: ${subject}`,
    `MIME-Version: 1.0`,
    `Content-Type: multipart/mixed; boundary="${boundary}"`,
    ``,
    `--${boundary}`,
    `Content-Type: text/plain; charset=utf-8`,
    ``,
    `Please see the attached check-in note.`,
    ``,
    `--${boundary}`,
    `Content-Type: text/plain; charset=utf-8; name="checkin.txt"`,
    `Content-Disposition: attachment; filename="checkin.txt"`,
    `Content-Transfer-Encoding: base64`,
    ``,
    attachB64Wrapped,
    ``,
    `--${boundary}--`
  ].join('\r\n');

  return toBase64url(msg);
}

function resetEmailBody() {
  const el = document.getElementById('email-body-edit');
  if (el) el.value = buildEmailBody();
}

function setSendStatus(msg, color) {
  const el = document.getElementById('send-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = color || 'var(--muted)';
  el.style.display = 'block';
}

async function sendAlexaEmail(isManual = true) {
  if (!state.alexaClientId || !state.alexaClientSecret || !state.alexaRefreshToken) {
    if (isManual) {
      setSendStatus('✗ Gmail is not connected. Complete setup below.', 'var(--red-dead)');
    }
    return false;
  }
  if (isManual) {
    const btn = document.querySelector('.send-now-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }
    setSendStatus('Sending…', 'var(--muted)');
  }
  try {
    const accessToken = await gmailGetAccessToken();
    // Use edited body if the textarea exists, otherwise fall back to generated body
    const bodyEl = document.getElementById('email-body-edit');
    const emailBody = bodyEl ? bodyEl.value.trim() || buildEmailBody() : buildEmailBody();
    const raw = makeRawEmail(
      state.alexaRecipient || 'alexa@alexa.com',
      'Project Check-In',
      emailBody
    );
    const resp = await fetch(GMAIL_SEND, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ raw })
    });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || resp.status);
    }
    state.alexaLastSent   = new Date().toLocaleString();
    state.alexaLastStatus = 'success';
    saveState();
    if (isManual) {
      setSendStatus('✓ Email sent successfully at ' + state.alexaLastSent, 'var(--sage)');
      const btn = document.querySelector('.send-now-btn');
      if (btn) { btn.disabled = false; btn.textContent = 'Send Now'; }
      renderSide();
    }
    return true;
  } catch(e) {
    state.alexaLastStatus = 'error: ' + e.message;
    saveState();
    if (isManual) {
      setSendStatus('✗ Failed to send: ' + e.message, 'var(--red-dead)');
      const btn = document.querySelector('.send-now-btn');
      if (btn) { btn.disabled = false; btn.textContent = 'Send Now'; }
    }
    return false;
  }
}

function disconnectGmail() {
  if (!confirm('Disconnect Gmail? Encrypted credentials will be cleared from storage.')) return;
  clearEncryptedCreds();
  state.alexaLastSent = '';
  state.alexaLastStatus = '';
  saveState();
  renderMain();
  renderSide();
}

// ===================== PANE SWITCHING =====================
let currentPane = 'session';
function showPane(pane) {
  currentPane = pane;
  document.querySelectorAll('nav button').forEach((b,i) =>
    b.classList.toggle('active', ['session','calendar','deadlines','wordcount','meetings','themes','alexa','backup','help'][i]===pane));
  renderMain(); renderSide();
}
function renderMain() {
  const mp = document.getElementById('main-pane');
  if (currentPane==='session')   renderSession(mp);
  else if (currentPane==='calendar')  renderCalendar(mp);
  else if (currentPane==='deadlines') renderDeadlines(mp);
  else if (currentPane==='wordcount') renderWordCount(mp);
  else if (currentPane==='alexa')     renderAlexa(mp);
  else if (currentPane==='meetings')  renderMeetings(mp);
  else if (currentPane==='themes')    renderThemes(mp);
  else if (currentPane==='backup')    renderBackup(mp);
  else if (currentPane==='help')      renderHelp(mp);
}

// ===================== SESSION PANE =====================
function renderSession(mp) {
  const has = state.lastAccomplished || state.lastPlan;
  mp.innerHTML = `
    <div class="section-title">Session Log</div>
    ${has ? `<div class="session-readout">
      <div class="hr-badge">${state.lastHours ? state.lastHours+'h' : '—'}</div>
      <div class="tag">Last Session — Accomplished</div>
      <p>${state.lastAccomplished || '<em style="opacity:.6">Nothing recorded.</em>'}</p>
      <div class="tag" style="margin-top:14px">Today's Plan</div>
      <p>${state.lastPlan || '<em style="opacity:.6">Nothing recorded.</em>'}</p>
    </div>` : `<div class="session-readout" style="opacity:.7">
      <div class="tag">No Previous Session Found</div>
      <p>Log your first session below to get started.</p>
    </div>`}
    <div class="card">
      <h3>Log This Session</h3>
      <label>What did you accomplish today?</label>
      <textarea id="inp-accomplished" placeholder="Describe what you worked on…">${state._sessionInputClear ? '' : (state.lastAccomplished||'')}</textarea>
      <label>Hours worked this session</label>
      <input type="number" id="inp-hours" min="0" max="24" step="0.25" placeholder="e.g. 2.5" value="${state._sessionInputClear ? '' : (state.lastHours||'')}">
      <label>What do you plan to do next time?</label>
      <textarea id="inp-plan" placeholder="Your goals for next session…">${state._sessionInputClear ? '' : (state.lastPlan||'')}</textarea>
      <button class="btn" onclick="saveSession()">Save Session</button>
    </div>`;
}

function saveSession() {
  const acc  = document.getElementById('inp-accomplished').value.trim();
  const hrs  = document.getElementById('inp-hours').value.trim();
  const plan = document.getElementById('inp-plan').value.trim();
  if (!acc && !plan) { alert('Please enter at least something for this session.'); return; }
  state.lastAccomplished = acc; state.lastHours = hrs; state.lastPlan = plan;
  const key = todayKey();
  if (!state.days[key]) state.days[key] = { goals: [] };
  state.days[key].accomplished = acc; state.days[key].hours = hrs;
  saveState();
  // Clear the input fields after saving by temporarily nulling the fill values
  state._sessionInputClear = true;
  renderMain(); renderSide();
  state._sessionInputClear = false;
}

// ===================== CALENDAR PANE =====================
function renderCalendar(mp) {
  const wpd = wordsPerDay();
  mp.innerHTML = `
    <div class="cal-controls">
      <div class="view-btns">
        ${['week','month','year'].map((v,i)=>`<button class="${state.calView===v?'active':''}" onclick="setCalView('${v}')">${['Week','Month','Year'][i]}</button>`).join('')}
      </div>
      <div class="cal-nav">
        <button onclick="calNav(-1)">&#8592;</button>
        <div class="cal-label" id="cal-label"></div>
        <button onclick="calNav(1)">&#8594;</button>
        <button onclick="calGoToday()" style="font-size:.65rem;font-family:'DM Mono',monospace;letter-spacing:.08em;padding:0 8px;width:auto;">Today</button>
      </div>
    </div>
    <div id="cal-body"></div>
    <div id="cal-footer" style="margin-top:8px"></div>`;
  renderCalBody(wpd);
}

function setCalView(v) { state.calView=v; renderCalendar(document.getElementById('main-pane')); }
function calNav(dir) {
  const d=state.calDate;
  if(state.calView==='week') d.setDate(d.getDate()+dir*7);
  else if(state.calView==='month') d.setMonth(d.getMonth()+dir);
  else if(state.calView==='year') d.setFullYear(d.getFullYear()+dir);
  else d.setFullYear(d.getFullYear()+dir*5);
  renderCalendar(document.getElementById('main-pane'));
}
function calGoToday() { state.calDate=new Date(TODAY); renderCalendar(document.getElementById('main-pane')); }

function renderCalBody(wpd) {
  const v=state.calView, d=state.calDate;
  const label=document.getElementById('cal-label');
  const body=document.getElementById('cal-body');
  const footer=document.getElementById('cal-footer');
  if (v==='week') {
    const ws=getWeekStart(d);
    label.textContent=`${MONTHS[ws.getMonth()]} ${ws.getDate()} – ${MONTHS[addDays(ws,6).getMonth()]} ${addDays(ws,6).getDate()}, ${ws.getFullYear()}`;
    body.innerHTML=`<div class="week-grid">${Array.from({length:7},(_,i)=>renderWeekDay(addDays(ws,i))).join('')}</div>`;
    const wt=wpd?(wpd*7).toFixed(0):null;
    footer.innerHTML=`<div class="week-total"><span style="color:var(--muted)">Week Total</span><span>${hoursForWeek(ws).toFixed(1)} hrs</span></div>${wt?`<div class="words-week">Words needed this week: <span>${Number(wt).toLocaleString()}</span></div>`:''}`;
  } else if (v==='month') {
    label.textContent=`${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    renderMonthView(body, d.getFullYear(), d.getMonth());
    const dim=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    const wt=wpd?(wpd*dim).toFixed(0):null;
    footer.innerHTML=`<div class="month-summary"><span style="color:var(--muted)">Month Total</span><span>${hoursForMonth(d.getFullYear(),d.getMonth()).toFixed(1)} hrs</span></div>${wt?`<div class="words-week">Words needed this month: <span>${Number(wt).toLocaleString()}</span></div>`:''}`;
  } else if (v==='year') {
    label.textContent=String(d.getFullYear());
    renderYearView(body, d.getFullYear());
    footer.innerHTML=`<div class="month-summary"><span style="color:var(--muted)">Year Total</span><span>${hoursForYear(d.getFullYear()).toFixed(1)} hrs</span></div>`;
  }
}

function renderWeekDay(day) {
  const key=fmtKey(day), isToday=key===todayKey(), isPast=day<TODAY;
  const entry=state.days[key]||{}, goals=entry.goals||[], hrs=entry.hours?`${entry.hours}h`:'';
  // Gather deadlines on this day
  const dayDls = state.deadlines.filter(dl=>dl.date===key);
  const isFinal = state.finalDeadline===key;
  let content='';
  if (isPast||isToday) {
    content=entry.accomplished
      ?`<div class="day-content">${entry.accomplished.slice(0,80)}${entry.accomplished.length>80?'…':''}</div>`
      :`<div class="day-content" style="opacity:.4">No entry</div>`;
  } else {
    content=goals.length
      ?goals.map(g=>`<div class="goal-item">${g.slice(0,40)}</div>`).join('')
      :`<div class="day-content" style="opacity:.3">No goals</div>`;
  }
  const dlChips = [
    ...(isFinal ? [`<div class="deadline-chip final">★ Final Deadline</div>`] : []),
    ...dayDls.map(dl=>`<div class="deadline-chip ${dl.complete?'complete':'incomplete'}">
      ${dl.complete?'✓':'!'} ${dl.desc.slice(0,22)}${dl.desc.length>22?'…':''}
    </div>`)
  ].join('');
  return `<div class="week-day${isToday?' today':''}${isPast?' past':''}" onclick="openDayModal('${key}')">
    <div class="day-name">${DAYS_SHORT[day.getDay()]}</div>
    <div class="day-num">${day.getDate()}</div>
    ${hrs?`<div class="day-hours">${hrs}</div>`:''}${content}${dlChips}</div>`;
}

function renderMonthView(body, year, month) {
  const firstDay=new Date(year,month,1).getDay(), dim=new Date(year,month+1,0).getDate(), prev=new Date(year,month,0).getDate();
  let cells=DAYS_SHORT.map(d=>`<div class="month-header-cell">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++) cells+=`<div class="month-day other-month"><div class="md-num">${prev-firstDay+1+i}</div></div>`;
  for(let d=1;d<=dim;d++) {
    const k=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hrs=hoursForDay(k);
    const dayDls=state.deadlines.filter(dl=>dl.date===k);
    const isFinal=state.finalDeadline===k;
    // Build dot row
    const dots=[
      ...(isFinal?[`<div class="dl-dot final" title="Final Deadline"></div>`]:[]),
      ...dayDls.map(dl=>`<div class="dl-dot ${dl.complete?'complete':'incomplete'}" title="${dl.desc}"></div>`)
    ].join('');
    // First deadline label (truncated)
    const firstDl = isFinal ? '★ Final' : dayDls.length ? dayDls[0].desc.slice(0,14)+(dayDls[0].desc.length>14?'…':'') : '';
    const labelCls = isFinal ? 'md-label final' : 'md-label';
    cells+=`<div class="month-day${k===todayKey()?' today':''}" onclick="jumpToWeek('${k}')">
      <div class="md-num">${d}</div>
      ${hrs>0?`<div class="md-hours">${hrs}h</div>`:''}
      ${dots?`<div class="dl-dots">${dots}</div>`:''}
      ${firstDl?`<div class="${labelCls}">${firstDl}</div>`:''}
    </div>`;
  }
  const rem=(7-(firstDay+dim)%7)%7;
  for(let i=1;i<=rem;i++) cells+=`<div class="month-day other-month"><div class="md-num">${i}</div></div>`;
  body.innerHTML=`<div class="month-grid">${cells}</div>`;
}
function jumpToWeek(key) { state.calDate=new Date(parseKey(key)); state.calView='week'; renderCalendar(document.getElementById('main-pane')); }
function jumpToMonth(year, month) { state.calDate=new Date(year,month,1); state.calView='month'; renderCalendar(document.getElementById('main-pane')); }

function renderYearView(body, year) {
  const DS2 = ['S','M','T','W','T','F','S'];
  // Collect deadline dates for highlight
  const dlDates = new Set(state.deadlines.filter(dl=>dl.date).map(dl=>dl.date));
  const finalDate = state.finalDeadline || '';

  const monthCards = Array.from({length:12}, (_, m) => {
    const firstDay = new Date(year, m, 1).getDay();
    const dim = new Date(year, m+1, 0).getDate();
    const prev = new Date(year, m, 0).getDate();
    const hrs = hoursForMonth(year, m).toFixed(1);

    let cells = DS2.map(d=>`<div class="ymm-dow">${d}</div>`).join('');
    // prev month filler
    for(let i=0;i<firstDay;i++) cells+=`<div class="ymm-cell other">${prev-firstDay+1+i}</div>`;
    // current month days
    for(let d=1;d<=dim;d++){
      const k=`${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = k===todayKey();
      const hasHrs = hoursForDay(k) > 0;
      const isDl = dlDates.has(k) || k===finalDate;
      let cls = 'ymm-cell';
      if(isToday) cls+=' is-today';
      else if(isDl) cls+=' has-deadline';
      else if(hasHrs) cls+=' has-hours';
      cells+=`<div class="${cls}">${d}</div>`;
    }
    // trailing filler
    const rem=(7-(firstDay+dim)%7)%7;
    for(let i=1;i<=rem;i++) cells+=`<div class="ymm-cell other">${i}</div>`;

    return `<div class="year-mini-month" onclick="jumpToMonth(${year},${m})" style="cursor:pointer" title="View ${MONTHS[m]} ${year}">
      <div class="ymm-header">
        <span class="ymm-name">${MONTHS[m]}</span>
        <span class="ymm-hours">${hrs}h</span>
      </div>
      <div class="ymm-grid">${cells}</div>
    </div>`;
  });

  const dls=state.deadlines.filter(dl=>dl.date&&new Date(dl.date).getFullYear()===year);
  const finalDl=state.finalDeadline&&new Date(state.finalDeadline).getFullYear()===year;
  let dlHtml='';
  if(finalDl||dls.length) dlHtml=`<div style="margin-top:24px"><div class="section-title" style="font-size:1rem;margin-bottom:10px">Deadlines ${year}</div>
    ${finalDl?`<div class="year-deadline final">★ Final Deadline — ${state.finalDeadline}</div>`:''}
    ${dls.map(dl=>`<div class="year-deadline ${dl.complete?'complete':'incomplete'}">${dl.complete?'✓':'✗'} ${dl.desc} — ${dl.date}</div>`).join('')}</div>`;

  body.innerHTML=`<div class="year-view-grid">${monthCards.join('')}</div>${dlHtml}`;
}


// DAY MODAL
function openDayModal(key) {
  const d=parseKey(key), isToday=key===todayKey(), isPast=d<=TODAY, entry=state.days[key]||{goals:[]};
  const title=`${DAYS_SHORT[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  const mc=document.getElementById('modal-content');

  // Deadlines on this day
  const dayDls = state.deadlines.filter(dl=>dl.date===key);
  const isFinal = state.finalDeadline===key;
  const dlSection = (isFinal || dayDls.length) ? `
    <label>Deadlines</label>
    <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:4px">
      ${isFinal ? `<div style="font-size:.82rem;background:var(--blue-light);color:var(--blue);border:1px solid var(--blue-mid);border-radius:6px;padding:6px 10px;font-weight:600">★ Final Deadline</div>` : ''}
      ${dayDls.map(dl=>`<div style="font-size:.82rem;background:${dl.complete?'#f0fdf4':'#fff5f5'};color:${dl.complete?'var(--green-done)':'var(--red-dead)'};border:1px solid ${dl.complete?'#bbf7d0':'#fca5a5'};border-radius:6px;padding:6px 10px;display:flex;align-items:center;gap:6px">
        <span style="font-weight:700">${dl.complete?'✓':'!'}</span> ${dl.desc}
        <span style="margin-left:auto;font-size:.72rem;opacity:.7;font-family:'DM Mono',monospace">${dl.complete?'complete':'due'}</span>
      </div>`).join('')}
    </div>` : '';

  if (isPast||isToday) {
    mc.innerHTML=`<h3>${title}</h3>
      ${dlSection}
      <label>Accomplished</label><textarea id="modal-acc" style="min-height:80px">${entry.accomplished||''}</textarea>
      <label>Hours Worked</label><input type="number" id="modal-hrs" min="0" step="0.25" value="${entry.hours||''}">
      <label>Goals for this day</label><textarea id="modal-goals">${(entry.goals||[]).join('\n')}</textarea>
      <div class="actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveDayModal('${key}')">Save</button></div>`;
  } else {
    mc.innerHTML=`<h3>${title}</h3>
      ${dlSection}
      <label>Goals for this day</label><textarea id="modal-goals">${(entry.goals||[]).join('\n')}</textarea>
      <div class="actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveDayModal('${key}')">Save Goals</button></div>`;
  }
  document.getElementById('modal').style.display='flex';
}
function saveDayModal(key) {
  const d=parseKey(key), isPast=d<=TODAY;
  if (!state.days[key]) state.days[key]={goals:[]};
  const ge=document.getElementById('modal-goals');
  if(ge) state.days[key].goals=ge.value.split('\n').map(g=>g.trim()).filter(Boolean);
  if(isPast||key===todayKey()) {
    const ae=document.getElementById('modal-acc'), he=document.getElementById('modal-hrs');
    if(ae) state.days[key].accomplished=ae.value.trim();
    if(he) state.days[key].hours=he.value.trim();
  }
  saveState(); closeModal(); renderMain();
}
function closeModal() { document.getElementById('modal').style.display='none'; }

function renderMeetings(mp) {
  const meetings = [...(state.meetings||[])].sort((a,b) => b.date.localeCompare(a.date));

  const cards = meetings.length === 0
    ? `<div class="meeting-empty">
        <div style="font-size:2rem;margin-bottom:8px">📋</div>
        No meetings logged yet. Add your first one below.
       </div>`
    : meetings.map((m, idx) => {
        const realIdx = state.meetings.indexOf(m);
        const pending = (m.actions||[]).filter(a=>!a.done).length;
        const total   = (m.actions||[]).length;
        const actionSummary = total ? `${total - pending}/${total} actions done` : 'No actions';
        const notesPreview = (m.notes||'').split('\n')[0].slice(0, 60) + ((m.notes||'').length > 60 ? '...' : '');
        const actionItems = (m.actions||[]).map((a, ai) => `
          <div class="action-item">
            <div class="action-checkbox${a.done?' done':''}" onclick="toggleAction(${realIdx},${ai})">
              ${a.done ? '✓' : ''}
            </div>
            <span class="action-text${a.done?' done':''}">${a.text}</span>
            <button class="btn btn-ghost btn-sm" style="margin-top:0;padding:3px 8px;font-size:.6rem" onclick="deleteAction(${realIdx},${ai})">✕</button>
          </div>`).join('');

        return `<div class="meeting-card">
          <div class="meeting-card-header" onclick="toggleMeetingExpand(${realIdx})">
            <span class="meeting-date-badge">${m.date}</span>
            <span class="meeting-supervisor">${m.supervisor || 'Meeting'}</span>
            <span class="meeting-preview">${notesPreview}</span>
            <span class="meeting-actions-count">${actionSummary}</span>
            <span class="meeting-chevron${m._open?' open':''}" id="chev-${realIdx}">▶</span>
          </div>
          <div class="meeting-body${m._open?'':' hidden'}" id="mbody-${realIdx}">
            <div class="meeting-section-label">Discussion Notes</div>
            <div class="meeting-notes-text">${(m.notes||'<em style="opacity:.5">No notes.</em>')}</div>
            <div class="meeting-section-label">Action Items</div>
            ${actionItems || '<div style="font-size:.8rem;color:var(--muted);padding:4px 0">No action items.</div>'}
            <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
              <button class="btn btn-sm" style="margin-top:0" onclick="openAddActionModal(${realIdx})">+ Action Item</button>
              <button class="btn btn-ghost btn-sm" style="margin-top:0" onclick="openEditMeetingModal(${realIdx})">Edit</button>
              <button class="btn btn-sm" style="margin-top:0;background:var(--red-dead)" onclick="deleteMeeting(${realIdx})">Delete</button>
            </div>
          </div>
        </div>`;
      }).join('');

  mp.innerHTML = `
    <div class="section-title">Supervisor Meeting Log</div>
    <div class="card" style="margin-bottom:18px">
      <h3>Log a Meeting</h3>
      <label>Date</label>
      <input type="date" id="mtg-date" value="${new Date().toISOString().slice(0,10)}">
      <label>Supervisor / Attendees</label>
      <input type="text" id="mtg-supervisor" placeholder="e.g. Dr. Smith">
      <label>Discussion Notes</label>
      <textarea id="mtg-notes" placeholder="What was discussed…" style="min-height:90px"></textarea>
      <button class="btn" onclick="addMeeting()">Save Meeting</button>
    </div>
    <div id="meeting-list">${cards}</div>`;
}

function addMeeting() {
  const date = document.getElementById('mtg-date').value;
  const supervisor = document.getElementById('mtg-supervisor').value.trim();
  const notes = document.getElementById('mtg-notes').value.trim();
  if (!date) { alert('Please enter a date.'); return; }
  state.meetings = state.meetings || [];
  state.meetings.push({ date, supervisor, notes, actions: [], _open: true });
  saveState();
  renderMeetings(document.getElementById('main-pane'));
}

function toggleMeetingExpand(idx) {
  state.meetings[idx]._open = !state.meetings[idx]._open;
  // Don't save _open to storage — just re-render
  renderMeetings(document.getElementById('main-pane'));
}

function deleteMeeting(idx) {
  if (!confirm('Delete this meeting log?')) return;
  state.meetings.splice(idx, 1);
  saveState();
  renderMeetings(document.getElementById('main-pane'));
}

function toggleAction(meetingIdx, actionIdx) {
  state.meetings[meetingIdx].actions[actionIdx].done = !state.meetings[meetingIdx].actions[actionIdx].done;
  saveState();
  renderMeetings(document.getElementById('main-pane'));
}

function deleteAction(meetingIdx, actionIdx) {
  state.meetings[meetingIdx].actions.splice(actionIdx, 1);
  saveState();
  renderMeetings(document.getElementById('main-pane'));
}

function openAddActionModal(meetingIdx) {
  const m = state.meetings[meetingIdx];
  document.getElementById('modal-content').innerHTML = `
    <h3>Add Action Item</h3>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:12px">Meeting: ${m.date}${m.supervisor ? ' · ' + m.supervisor : ''}</p>
    <label style="font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px">Action Item</label>

function exportBackup() {
  const backup = {
    _version: 1,
    _exported: new Date().toISOString(),
    // Plain state fields
    lastAccomplished: state.lastAccomplished,
    lastPlan:         state.lastPlan,
    lastHours:        state.lastHours,
    days:             state.days,
    deadlines:        state.deadlines,
    finalDeadline:    state.finalDeadline,
    wcGoal:           state.wcGoal,
    wcCurrent:        state.wcCurrent,
    alexaEnabled:     state.alexaEnabled,
    alexaRecipient:   state.alexaRecipient,
    alexaClientId:    state.alexaClientId,
    alexaSenderEmail: state.alexaSenderEmail,
    alexaLastSent:    state.alexaLastSent,
    alexaLastStatus:  state.alexaLastStatus,
    currentTheme:     state.currentTheme,
    meetings:         state.meetings,
    // Encrypted blobs (stored as-is — still encrypted)
    enc_clientSecret: localStorage.getItem('diss_enc_clientSecret') || null,
    enc_refreshToken: localStorage.getItem('diss_enc_refreshToken') || null,
  };

  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href     = url;
  a.download = `dissertation-backup-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;

  const filenameEl = document.getElementById('import-filename');
  const statusEl   = document.getElementById('import-status');
  if (filenameEl) filenameEl.textContent = file.name;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);

      // Basic validation
      if (typeof backup !== 'object' || backup === null) throw new Error('Invalid backup file.');
      if (!backup._version) throw new Error('File does not appear to be a dissertation planner backup.');

      if (!confirm('This will replace ALL current data with the backup. Are you sure?')) {
        if (statusEl) statusEl.textContent = '';
        return;
      }

      // Restore plain fields
      const fields = ['lastAccomplished','lastPlan','lastHours','days','deadlines','finalDeadline',
                      'wcGoal','wcCurrent','alexaEnabled','alexaRecipient','alexaClientId','alexaSenderEmail',
                      'alexaLastSent','alexaLastStatus','currentTheme','meetings'];
      for (const k of fields) {
        if (backup[k] !== undefined) state[k] = backup[k];
      }

      // Restore encrypted blobs if present
      if (backup.enc_clientSecret) localStorage.setItem('diss_enc_clientSecret', backup.enc_clientSecret);
      else localStorage.removeItem('diss_enc_clientSecret');
      if (backup.enc_refreshToken) localStorage.setItem('diss_enc_refreshToken', backup.enc_refreshToken);
      else localStorage.removeItem('diss_enc_refreshToken');
      state._hasEncryptedSecret = !!backup.enc_clientSecret;
      state._hasEncryptedToken  = !!backup.enc_refreshToken;

      // Persist and refresh
      saveState();
      if (state.currentTheme && state.currentTheme !== 'airy') {
        document.documentElement.setAttribute('data-theme', state.currentTheme);
      } else {
        document.documentElement.removeAttribute('data-theme');
      }

      if (statusEl) {
        statusEl.style.color = 'var(--green-done)';
        statusEl.textContent = '✓ Backup restored successfully. ' +
          `Imported ${Object.keys(state.days||{}).length} day entries, ` +
          `${(state.deadlines||[]).length} deadlines, ` +
          `${(state.meetings||[]).length} meetings.`;
      }
      renderSide();

      // If encrypted creds were restored, prompt to unlock
      if (state._hasEncryptedSecret || state._hasEncryptedToken) {
        setTimeout(() => {
          showPasswordModal('enter', async (pw) => {
            await loadEncryptedCreds(pw);
            renderMain();
          });
        }, 600);
      } else {
        renderMain();
      }

    } catch(err) {
      if (statusEl) {
        statusEl.style.color = 'var(--red-dead)';
        statusEl.textContent = '✗ Import failed: ' + err.message;
      }
    }
  };
  reader.readAsText(file);
}

function applyTheme(id) {
  state.currentTheme = id;
  document.documentElement.setAttribute('data-theme', id === 'airy' ? '' : id);
  saveState();
}

function renderThemes(mp) {
  const cards = THEMES.map(t => {
    const p = t.preview;
    const isActive = state.currentTheme === t.id;
    return `<div class="theme-card${isActive?' active':''}" onclick="applyTheme('${t.id}');renderThemes(document.getElementById('main-pane'))">
      <div class="theme-preview" style="background:${p.bg}">
        <div class="theme-preview-header" style="background:${p.header}"></div>
        <div class="theme-preview-nav" style="background:${p.nav};border-bottom:1px solid ${p.border}"></div>
        <div class="theme-preview-body">
          <div class="theme-preview-main">
            <div class="theme-preview-card" style="background:${p.card};border:1px solid ${p.border}"></div>
            <div class="theme-preview-card" style="background:${p.accent};opacity:.7"></div>
            <div class="theme-preview-card2" style="background:${p.card};border:1px solid ${p.border}"></div>
            <div class="theme-preview-card2" style="background:${p.card};border:1px solid ${p.border}"></div>
          </div>
          <div class="theme-preview-side" style="border-color:${p.border};background:${p.nav}"></div>
        </div>
      </div>
      <div class="theme-name">
        ${t.name} <span class="theme-check">✓</span>
        <div style="font-size:.65rem;font-weight:400;color:var(--muted);margin-top:2px">${t.desc}</div>
      </div>
    </div>`;
  }).join('');

  mp.innerHTML = `
    <div class="section-title">Themes</div>
    <div class="card">
      <h3>Choose a Theme</h3>
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:16px;line-height:1.55">
        Select a theme below. Your choice is saved automatically.
      </p>
      <div class="theme-grid">${cards}</div>
    </div>`;
}

loadState();
// Apply saved theme on startup
if (state.currentTheme && state.currentTheme !== 'airy') {
  document.documentElement.setAttribute('data-theme', state.currentTheme);
}
const el=document.getElementById('today-display');
if(el) el.textContent=`${DAYS_SHORT[TODAY.getDay()]} ${MONTHS[TODAY.getMonth()]} ${TODAY.getDate()}, ${TODAY.getFullYear()}`;
showPane('session');
// If encrypted creds exist, prompt for password to unlock them on startup
if (state._hasEncryptedSecret || state._hasEncryptedToken) {
  setTimeout(() => {
    showPasswordModal('enter', async (pw) => {
      const ok = await loadEncryptedCreds(pw);
      if (ok) { renderMain(); renderSide(); }
    });
  }, 300);
}

window.addEventListener('beforeunload', () => {
  if (state.alexaEnabled && state.alexaRefreshToken && (state.lastAccomplished || state.lastPlan)) {
    sendAlexaEmail(false);
  }
});
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target===this) closeModal();
});
</script>
