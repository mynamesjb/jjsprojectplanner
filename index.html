<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JJ's Project Planner</title>
<style>
  /* Font fallbacks for offline/Electron use — maps Google Fonts to Windows system fonts */
  /* Lato → Segoe UI (Windows default, very similar) */
  /* Inter → Segoe UI */
  /* DM Mono → Consolas (excellent Windows monospace) */
  /* Crimson Pro → Georgia (classic serif) */
  /* Nunito → Segoe UI (rounded feel) */
  /* IBM Plex Serif → Georgia */
  /* JetBrains Mono → Consolas */
  /* Share Tech Mono → Consolas */
  /* Righteous → Impact (bold display) */
  /* Fredoka One → Impact */
  /* Caveat → Comic Sans MS (handwriting) */
  /* Cinzel → Trajan Pro / Times New Roman */
  /* IM Fell English → Georgia */
  /* UnifrakturMaguntia → no system equivalent, falls back to serif */
</style>
<style>
  :root {
    --ink: #1e2028; --paper: #ffffff; --cream: #f4f6fb;
    --blue: #4A6CF7; --blue-light: #e8edff; --blue-mid: #c5d0fa;
    --teal: #2e9e8f; --muted: #6b7280; --border: #e2e6f0;
    --card: #ffffff; --red-dead: #e53e3e; --green-done: #38a169;
    --gold: #4A6CF7; --gold-light: #a5b4fc; --rust: #e53e3e;
    --sage: #2e9e8f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Inter', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; overflow-x: hidden; }
  header { background: #fff; color: var(--ink); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); height: 60px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  header h1 { font-family: 'Segoe UI', 'Lato', sans-serif; font-size: 1.25rem; font-weight: 700; letter-spacing: -.01em; color: var(--ink); }
  .subtitle { font-family: 'Consolas', 'DM Mono', monospace; font-size: .62rem; color: var(--blue); margin-top: 2px; letter-spacing: .1em; text-transform: uppercase; }
  nav { background: #fff; border-bottom: 1px solid var(--border); display: flex; padding: 0 32px; }
  nav button { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .78rem; font-weight: 500; letter-spacing: .01em; background: none; border: none; border-bottom: 2px solid transparent; padding: 14px 16px; cursor: pointer; color: var(--muted); transition: all .15s; }
  nav button.active { color: var(--blue); border-bottom-color: var(--blue); }
  nav button:hover { color: var(--ink); }
  .app { display: flex; min-height: calc(100vh - 108px); }
  .main-pane { flex: 1; padding: 28px 32px; min-width: 0; overflow-x: hidden; }
  .side-pane { width: 280px; background: #fff; border-left: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }

  /* ── Mobile sidebar toggle button ── */
  .sidebar-toggle-btn { display: none; background: none; border: none; cursor: pointer; padding: 8px; color: var(--ink); font-size: 1.4rem; line-height: 1; margin-left: auto; }
  .sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 199; }

  /* ── Tablet: tighten up ── */
  @media (max-width: 1100px) {
    .main-pane { padding: 22px 24px; }
    .side-pane { width: 240px; }
  }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    header { padding: 0 16px; height: 52px; }
    header h1 { font-size: 1.05rem; }
    .subtitle { display: none; }
    .sidebar-toggle-btn { display: block; }
    #today-display { display: none; }

    nav { padding: 0 8px; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-shrink: 0; }
    nav::-webkit-scrollbar { display: none; }
    nav button { padding: 12px 10px; font-size: .72rem; white-space: nowrap; flex-shrink: 0; }

    .app { min-height: calc(100vh - 92px); }
    .main-pane { padding: 16px; width: 100%; }

    .side-pane { position: fixed; top: 0; right: 0; width: min(300px, 85vw); height: 100vh; z-index: 200; transform: translateX(100%); transition: transform .25s ease; overflow-y: auto; border-left: 1px solid var(--border); box-shadow: -4px 0 24px rgba(0,0,0,.15); padding-top: 56px; }
    .side-pane.open { transform: translateX(0); }
    .sidebar-backdrop.open { display: block; }

    .card { padding: 14px; }
    .card h3 { font-size: .88rem; margin-bottom: 10px; }

    .overview-hero { padding: 18px 16px; border-radius: 10px; }
    .overview-hero > div[style*="grid-template-columns"] { grid-template-columns: 1fr !important; gap: 14px !important; }
    .overview-hero-plan { margin-top: 0; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.12); }

    /* Calendar controls */
    .cal-controls { flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .cal-controls .view-btns { order: 1; }
    .cal-nav { order: 2; margin-left: 0; }
    .cal-nav .cal-label { min-width: 140px; font-size: .85rem; }

    /* Calendar week view — vertical list (scoped to #main-pane only, not overview mini-weeks) */
    #main-pane .week-grid { display: flex; flex-direction: column; gap: 4px; }
    #main-pane .week-day { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; min-height: 0; border-radius: 8px; }
    #main-pane .week-day .day-name-num { display: flex; flex-direction: column; align-items: center; min-width: 36px; flex-shrink: 0; padding-top: 2px; }
    #main-pane .week-day .day-name { font-size: .6rem; letter-spacing: .06em; }
    #main-pane .week-day .day-num { font-size: 1.1rem; margin: 2px 0 0; }
    #main-pane .week-day .day-right { flex: 1; min-width: 0; }
    #main-pane .week-day .day-hours { font-size: .65rem; margin-bottom: 2px; }
    #main-pane .week-day .day-content { font-size: .72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    #main-pane .week-day .goal-item { font-size: .68rem; padding: 1px 5px; }
    #main-pane .week-day .deadline-chip, #main-pane .week-day .meeting-chip { font-size: .6rem; padding: 1px 5px; margin-top: 2px; }

    /* Overview mini-week grids — keep as 7-column grid, just tighten sizing */
    .overview-week .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .overview-week .week-day { display: block; padding: 4px 3px; min-height: 48px; }
    .overview-week .week-day .day-name-num { display: block; }
    .overview-week .week-day .day-right { display: block; }
    .overview-week .week-day .day-num { font-size: .85rem; margin: 1px 0 3px; }
    .overview-week .week-day .day-name { font-size: .52rem; }
    .overview-week .week-day .day-hours { font-size: .55rem; }
    .overview-week .week-day .day-content { display: none; }
    .overview-week .week-day .goal-item { display: none; }
    .overview-week .week-day .deadline-chip, .overview-week .week-day .meeting-chip { display: none; }

    /* Month view */
    .month-day { padding: 3px 4px; min-height: 36px; }
    .month-day .md-num { font-size: .72rem; }
    .month-day .md-hours { display: none; }
    .month-day .md-label { display: none; }
    .month-day .dl-dots { margin-top: 2px; gap: 1px; }
    .month-day .dl-dot, .month-day .mtg-dot { width: 4px; height: 4px; }
    .month-header-cell { font-size: .55rem; padding: 4px 0; }

    /* Year view — 2 columns, enlarged */
    .year-view-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .year-mini-month { padding: 14px; }
    .ymm-name { font-size: .88rem; }
    .ymm-dow { font-size: .58rem; }
    .ymm-cell { font-size: .7rem; }

    /* Stats */
    .overview-stats { padding: 14px 16px; }
    .ov-stat-title { font-size: .8rem; margin-bottom: 10px; }
    .ov-stat-val { font-size: .95rem; }
    .ov-stat-label { font-size: .62rem; min-width: 52px; }

    /* Config */
    .config-wrap { flex-direction: column !important; }
    .config-tab-bar { width: 100% !important; flex-direction: row !important; overflow-x: auto; overflow-y: hidden; border-right: none !important; border-bottom: 1px solid var(--border); padding-bottom: 0 !important; scrollbar-width: none; -webkit-overflow-scrolling: touch; min-height: auto !important; }
    .config-tab-bar::-webkit-scrollbar { display: none; }
    .config-tab-bar-title { display: none !important; }
    .config-tab { border-left: none !important; border-bottom: 2px solid transparent !important; padding: 10px 14px !important; white-space: nowrap; font-size: .72rem !important; text-align: center; }
    .config-tab.active { border-bottom-color: var(--blue) !important; background: var(--blue-light) !important; }
    .config-section { padding: 16px !important; }

    .report-window-row { flex-direction: column; gap: 10px; }
    .toggle-row { gap: 12px; }
    .pages-input-row { flex-wrap: wrap; gap: 6px; }
    .meeting-card-header { flex-wrap: wrap; gap: 8px; }
    .session-entry-row > div { flex-wrap: wrap; }
  }

  @media (max-width: 380px) {
    nav button { padding: 10px 8px; font-size: .68rem; }
    .main-pane { padding: 12px; }
    .card { padding: 12px; }
  }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .card h3 { font-family: 'Segoe UI', 'Lato', sans-serif; font-size: .95rem; font-weight: 700; margin-bottom: 14px; color: var(--ink); }
  .card label { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .72rem; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 12px; }
  .card label:first-of-type { margin-top: 0; }
  textarea, input[type="text"], input[type="date"], input[type="number"], input[type="password"] {
    width: 100%; font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .85rem; background: var(--cream);
    border: 1px solid var(--border); border-radius: 7px; padding: 8px 12px; color: var(--ink);
    resize: vertical; outline: none; transition: border-color .15s, box-shadow .15s;
  }
  textarea:focus, input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-light); }
  textarea { min-height: 68px; }
  .btn { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .78rem; font-weight: 600; letter-spacing: .02em; background: var(--blue); color: #fff; border: none; border-radius: 7px; padding: 9px 18px; cursor: pointer; transition: background .15s, box-shadow .15s; margin-top: 10px; }
  .btn:hover { background: #3a5ce5; box-shadow: 0 2px 8px rgba(74,108,247,.3); }
  .btn-sm { padding: 5px 12px; font-size: .72rem; margin-top: 0; }
  .btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--cream); color: var(--ink); box-shadow: none; }
  .btn-sage { background: var(--teal); }
  .btn-sage:hover { background: #25897b; box-shadow: 0 2px 8px rgba(46,158,143,.3); }
  .session-readout { background: linear-gradient(135deg, #4A6CF7 0%, #6d88f9 100%); color: #fff; border-radius: 10px; padding: 18px 20px; margin-bottom: 20px; position: relative; box-shadow: 0 4px 12px rgba(74,108,247,.2); }
  .session-readout .tag { font-family: 'Consolas', 'DM Mono', monospace; font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.7); margin-bottom: 6px; }
  .session-readout p { font-size: .88rem; line-height: 1.55; color: #fff; }
  .hr-badge { position: absolute; top: 14px; right: 14px; font-family: 'Consolas', 'DM Mono', monospace; font-size: .7rem; background: rgba(255,255,255,.25); color: #fff; padding: 3px 10px; border-radius: 20px; backdrop-filter: blur(4px); }
  .cal-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .cal-controls .view-btns { display: flex; gap: 4px; background: var(--cream); border-radius: 8px; padding: 3px; }
  .cal-controls .view-btns button { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .73rem; font-weight: 500; padding: 5px 14px; border: none; background: none; border-radius: 6px; cursor: pointer; color: var(--muted); transition: all .15s; }
  .cal-controls .view-btns button.active { background: #fff; color: var(--blue); font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .cal-nav { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .cal-nav button { width: 30px; height: 30px; border: 1px solid var(--border); background: #fff; border-radius: 7px; cursor: pointer; font-size: 1rem; transition: all .15s; color: var(--muted); }
  .cal-nav button:hover { background: var(--blue-light); border-color: var(--blue); color: var(--blue); }
  .cal-nav .cal-label { font-family: 'Segoe UI', 'Lato', sans-serif; font-size: 1rem; font-weight: 700; min-width: 200px; text-align: center; color: var(--ink); }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .week-day { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 10px; min-height: 130px; cursor: pointer; transition: all .15s; }
  .week-day:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(74,108,247,.1); }
  .week-day.today { border-color: var(--blue); background: var(--blue-light); }
  .week-day.past { background: #fafafa; }
  .week-day .day-name-num { display: block; }
  .week-day .day-right { display: block; }
  .week-day .day-name-num { display: block; }
  .week-day .day-right { display: block; }
  .week-day .day-name { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .62rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
  .week-day .day-num { font-family: 'Segoe UI', 'Lato', sans-serif; font-size: 1.3rem; font-weight: 700; line-height: 1; margin: 3px 0 8px; color: var(--ink); }
  .week-day.today .day-num { color: var(--blue); }
  .week-day .day-hours { font-family: 'Consolas', 'DM Mono', monospace; font-size: .65rem; color: var(--teal); margin-bottom: 5px; font-weight: 500; }
  .week-day .day-content { font-size: .73rem; color: var(--muted); line-height: 1.4; }
  .week-day .goal-item { font-size: .7rem; color: var(--teal); background: #e6f7f5; border-radius: 4px; padding: 2px 6px; margin-top: 3px; }
  .week-total { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .78rem; color: var(--muted); margin-top: 10px; padding: 10px 16px; background: #fff; border: 1px solid var(--border); border-radius: 8px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .week-total span { color: var(--blue); font-weight: 600; }
  .words-week { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .75rem; color: var(--muted); margin-top: 6px; padding: 8px 16px; background: #fff; border: 1px solid var(--border); border-radius: 8px; }
  .words-week span { color: var(--teal); font-weight: 600; }
  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .month-header-cell { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .65rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); text-align: center; padding: 6px 0; }
  .month-day { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 7px; min-height: 66px; cursor: pointer; transition: all .15s; position: relative; }
  .month-day:hover { border-color: var(--blue); background: var(--blue-light); }
  .month-day.today { border-color: var(--blue); background: var(--blue-light); }
  .month-day.other-month { opacity: .35; }
  .month-day .md-num { font-family: 'Segoe UI', 'Lato', sans-serif; font-size: .88rem; font-weight: 700; color: var(--ink); }
  .month-day.today .md-num { color: var(--blue); }
  .month-day .md-hours { font-family: 'Consolas', 'DM Mono', monospace; font-size: .58rem; color: var(--teal); margin-top: 3px; font-weight: 500; }
  .month-summary { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .78rem; margin-top: 10px; padding: 10px 16px; background: #fff; border: 1px solid var(--border); border-radius: 8px; display: flex; justify-content: space-between; }
  .month-summary span { color: var(--blue); font-weight: 600; }

  /* ── YEAR VIEW — Google-style mini month grids ── */
  .year-view-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .year-mini-month { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .ymm-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .ymm-name { font-family: 'Segoe UI', 'Lato', sans-serif; font-size: .82rem; font-weight: 700; color: var(--ink); }
  .ymm-hours { font-family: 'Consolas', 'DM Mono', monospace; font-size: .65rem; color: var(--teal); font-weight: 500; }
  .ymm-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
  .ymm-dow { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .52rem; font-weight: 700; text-transform: uppercase; color: var(--muted); text-align: center; padding-bottom: 3px; }
  .ymm-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .62rem; font-weight: 400; border-radius: 50%; color: var(--ink); cursor: default; transition: background .1s; }
  .ymm-cell.other { color: #ccc; }
  .ymm-cell.has-hours { background: var(--blue-light); color: var(--blue); font-weight: 600; }
  .ymm-cell.is-today { background: var(--blue); color: #fff; font-weight: 700; border-radius: 50%; }
  .ymm-cell.has-deadline { background: #fff0f0; color: var(--red-dead); font-weight: 700; border: 1px solid #fca5a5; }
  .year-mini-month:hover { border-color: var(--blue); box-shadow: 0 2px 10px rgba(74,108,247,.12); }



  .deadline-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .deadline-item:last-child { border-bottom: none; }
  .deadline-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .deadline-dot.complete { background: var(--green-done); }
  .deadline-dot.incomplete { background: var(--red-dead); }
  .deadline-info { flex: 1; }
  .deadline-info .dl-desc { font-size: .83rem; font-weight: 500; }
  .deadline-info .dl-date { font-family: 'Consolas', 'DM Mono', monospace; font-size: .65rem; color: var(--muted); margin-top: 2px; }
  .deadline-actions { display: flex; gap: 5px; }
  .wc-bar-bg { background: var(--cream); border-radius: 4px; height: 8px; margin: 10px 0 6px; overflow: hidden; border: 1px solid var(--border); }
  .wc-bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--blue)); border-radius: 4px; transition: width .5s ease; }
  .wc-stats { font-family: 'Consolas', 'DM Mono', monospace; font-size: .68rem; color: var(--muted); display: flex; justify-content: space-between; }
  .year-deadline { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 7px; margin-bottom: 6px; font-size: .8rem; font-family: 'Segoe UI', 'Inter', sans-serif; }
  .year-deadline.complete { background: #f0fdf4; color: var(--green-done); border: 1px solid #bbf7d0; }
  .year-deadline.incomplete { background: #fff5f5; color: var(--red-dead); border: 1px solid #fca5a5; }
  .year-deadline.final { border: 2px solid var(--blue); background: var(--blue-light); color: var(--blue); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 420px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
  .modal h3 { font-family: 'Segoe UI', 'Lato', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
  .modal .actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .section-title { font-family: 'Segoe UI', 'Lato', sans-serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); color: var(--ink); }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
  .toggle-label { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .88rem; font-weight: 500; }
  .toggle-sublabel { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .72rem; color: var(--muted); margin-top: 2px; }
  .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; cursor: pointer; transition: background .2s; }
  .toggle-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
  .toggle input:checked + .toggle-slider { background: var(--blue); }

  .email-preview { background: var(--cream); color: var(--ink); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; font-size: .85rem; line-height: 1.6; margin: 12px 0; font-family: 'Segoe UI', 'Inter', sans-serif; }
  .status-pill { display: inline-flex; align-items: center; gap: 6px; font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .73rem; font-weight: 500; padding: 5px 12px; border-radius: 20px; margin-top: 10px; }

  .status-pill.disconnected { background: #fff5f5; color: var(--red-dead); border: 1px solid #fca5a5; }

  /* Lavender Fields — deep plum, lavender orb */
  html[data-theme="lavender"] .overview-hero { background: linear-gradient(135deg, #2d2540 0%, #3a2e52 100%); border: 1px solid #4a3a6a; }
  html[data-theme="lavender"] .overview-hero::before { background: rgba(124,92,191,.18); }
  html[data-theme="lavender"] .overview-hero-label { color: #c4b0e8; opacity: 1; }
  html[data-theme="lavender"] .overview-hero-text { color: #f0ecff; }
  html[data-theme="lavender"] .overview-hero-plan { border-top-color: rgba(196,176,232,.2); }

  /* Terminal — pure black, green glow */
  html[data-theme="terminal"] .overview-hero { background: #000; border: 1px solid #00ff41; box-shadow: 0 0 20px rgba(0,255,65,.1); }
  html[data-theme="terminal"] .overview-hero::before { background: rgba(0,255,65,.04); }
  html[data-theme="terminal"] .overview-hero-label { color: #00cc33; opacity: 1; font-family: 'Consolas', 'Share Tech Mono', monospace; }
  html[data-theme="terminal"] .overview-hero-text { color: #00ff41; font-family: 'Consolas', 'Share Tech Mono', monospace; }
  html[data-theme="terminal"] .overview-hero-plan { border-top-color: rgba(0,255,65,.2); }

  /* Neon Noir — near-black, hot pink orb */
  html[data-theme="neonnoir"] .overview-hero { background: linear-gradient(135deg, #0d0d1a 0%, #18102a 100%); border: 1px solid #2a1040; box-shadow: 0 4px 24px rgba(255,45,120,.12); }
  html[data-theme="neonnoir"] .overview-hero::before { background: rgba(255,45,120,.08); }
  html[data-theme="neonnoir"] .overview-hero-label { color: #ff2d78; opacity: 1; }
  html[data-theme="neonnoir"] .overview-hero-text { color: #e8e0f0; }
  html[data-theme="neonnoir"] .overview-hero-plan { border-top-color: rgba(255,45,120,.18); }

  /* Vaporwave — deep purple-black, pink-to-cyan gradient orb */
  html[data-theme="vaporwave"] .overview-hero { background: linear-gradient(135deg, #0d001a 0%, #1a0035 100%); border: 1px solid #3a1050; box-shadow: 0 4px 28px rgba(255,113,206,.12); }
  html[data-theme="vaporwave"] .overview-hero::before { background: radial-gradient(circle, rgba(255,113,206,.12), rgba(1,205,254,.06)); }
  html[data-theme="vaporwave"] .overview-hero-label { background: linear-gradient(90deg,#ff71ce,#01cdfe); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; opacity:1; }
  html[data-theme="vaporwave"] .overview-hero-text { color: #f0e6ff; }
  html[data-theme="vaporwave"] .overview-hero-plan { border-top-color: rgba(255,113,206,.2); }

  /* Crayola — bright red hero, yellow accent */
  html[data-theme="crayola"] .overview-hero { background: linear-gradient(135deg, #cc0000 0%, #ee2222 100%); border: 3px solid #ffcc00; border-radius: 12px; box-shadow: 4px 4px 0 #ffcc00; }
  html[data-theme="crayola"] .overview-hero::before { background: rgba(255,204,0,.12); }
  html[data-theme="crayola"] .overview-hero-label { color: #ffcc00; opacity: 1; font-family: 'Impact', 'Fredoka One', sans-serif; letter-spacing: .06em; }
  html[data-theme="crayola"] .overview-hero-text { color: #fff; font-family: 'Impact', 'Fredoka One', sans-serif; }
  html[data-theme="crayola"] .overview-hero-plan { border-top-color: rgba(255,204,0,.3); }

  /* Chalkboard — very dark green board, chalk-yellow label */
  html[data-theme="chalkboard"] .overview-hero { background: #1a2a1a; border: 2px dashed #f5e642; }
  html[data-theme="chalkboard"] .overview-hero::before { background: rgba(245,230,66,.04); }
  html[data-theme="chalkboard"] .overview-hero-label { color: #f5e642; opacity: 1; font-family: 'Comic Sans MS', 'Caveat', cursive; font-size: .75rem; text-transform: none; letter-spacing: .04em; }
  html[data-theme="chalkboard"] .overview-hero-text { color: #f0ece0; font-family: 'Comic Sans MS', 'Caveat', cursive; font-size: 1.05rem; }
  html[data-theme="chalkboard"] .overview-hero-plan { border-top-color: rgba(245,230,66,.2); }

  /* Geneva — aged leather dark, crimson accent */
  html[data-theme="geneva"] .overview-hero { background: linear-gradient(135deg, #1a0e05 0%, #2e1a08 100%); border: 2px solid #c8aa88; }
  html[data-theme="geneva"] .overview-hero::before { background: rgba(139,26,26,.1); }
  html[data-theme="geneva"] .overview-hero-label { color: #c8aa88; opacity: 1; font-family: Georgia, 'IM Fell English', serif; font-style: italic; text-transform: none; letter-spacing: .04em; }
  html[data-theme="geneva"] .overview-hero-text { color: #f8f0e0; font-family: Georgia, 'IM Fell English', serif; }
  html[data-theme="geneva"] .overview-hero-plan { border-top-color: rgba(200,170,136,.25); }

  /* Westminster Abbey — stone-black, gold orb glow */
  html[data-theme="westminster"] .overview-hero { background: linear-gradient(180deg, #0a0806 0%, #1a1610 100%); border: 1px solid #c8a84a; box-shadow: 0 4px 24px rgba(200,168,74,.12); }
  html[data-theme="westminster"] .overview-hero::before { background: rgba(200,168,74,.07); }
  html[data-theme="westminster"] .overview-hero-label { color: #c8a84a; opacity: 1; font-family: Georgia, 'Cinzel', serif; font-size: .58rem; letter-spacing: .16em; }
  html[data-theme="westminster"] .overview-hero-text { color: #f0ece4; font-family: Georgia, 'Cinzel', serif; font-size: .92rem; letter-spacing: .04em; }
  html[data-theme="westminster"] .overview-hero-plan { border-top-color: rgba(200,168,74,.2); }
  .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .overview-timeline { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px 28px; margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .ov-tl-title { font-family: 'Segoe UI', 'Lato', sans-serif; font-size: .88rem; font-weight: 700; color: var(--ink); margin-bottom: 20px; }
  /* New event-card layout */
  .ov-tl-events { display: flex; flex-direction: column; gap: 0; }
  .ov-tl-event { display: flex; align-items: stretch; gap: 0; }
  .ov-tl-spine { display: flex; flex-direction: column; align-items: center; width: 32px; flex-shrink: 0; }
  .ov-tl-node { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; border: 2px solid #fff; box-shadow: 0 0 0 2px var(--border); }
  .ov-tl-node.node-today { background: var(--blue); box-shadow: 0 0 0 2px var(--blue); width: 10px; height: 10px; margin-top: 6px; }
  .ov-tl-node.node-dl { background: var(--red-dead); box-shadow: 0 0 0 2px var(--red-dead); }
  .ov-tl-node.node-mtg { background: #1a6fa8; box-shadow: 0 0 0 2px #1a6fa8; }
  .ov-tl-connector { width: 2px; background: var(--border); flex: 1; margin: 3px 0; min-height: 18px; }
  .ov-tl-content { flex: 1; padding: 0 0 22px 4px; }
  .ov-tl-event:last-child .ov-tl-content { padding-bottom: 0; }
  .ov-tl-event:last-child .ov-tl-connector { display: none; }
  .ov-tl-event-label { font-family: 'Consolas', 'DM Mono', monospace; font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
  .ov-tl-event-name { font-family: 'Segoe UI', 'Lato', sans-serif; font-size: .92rem; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
  .ov-tl-event-meta { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .72rem; font-weight: 500; }
  .ov-tl-event-meta.meta-dl { color: var(--red-dead); }
  .ov-tl-event-meta.meta-mtg { color: #1a6fa8; }
  .ov-tl-event-meta.meta-today { color: var(--blue); }
  .overview-stats { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .ov-stat-title { font-family: 'Segoe UI', 'Lato', sans-serif; font-size: .88rem; font-weight: 700; color: var(--ink); margin-bottom: 14px; }
  .ov-stat-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .ov-stat-row:last-child { border-bottom: none; }
  .ov-stat-label { font-family: 'Consolas', 'DM Mono', monospace; font-size: .68rem; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); min-width: 60px; flex-shrink: 0; }
  .ov-stat-val { font-family: 'Segoe UI', 'Lato', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--ink); }
  .ov-stat-sub { font-family: 'Consolas', 'DM Mono', monospace; font-size: .65rem; color: var(--muted); margin-left: auto; }
  .overview-week { margin-bottom: 0; }
  .overview-week .week-grid { gap: 6px; }


  /* Cato's Review annotation in Overview */
  .cato-annotation { border-left: 3px solid var(--blue); background: rgba(74,108,247,.07); border-radius: 0 8px 8px 0; padding: 14px 18px; margin-top: 10px; }
  .cato-annotation-label { font-family: 'Consolas','DM Mono',monospace; font-size: .6rem; letter-spacing: .12em; text-transform: uppercase; color: var(--blue); margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
  .cato-annotation-text { font-size: .88rem; line-height: 1.65; color: var(--ink); }
  html[data-theme="dark"] .cato-annotation { border-left-color: #c8a84a; background: rgba(200,168,74,.07); }
  html[data-theme="dark"] .cato-annotation-label { color: #c8a84a; }
  html[data-theme="parchment"] .cato-annotation { border-left-color: #8b5e3c; background: rgba(139,94,60,.07); }
  html[data-theme="parchment"] .cato-annotation-label { color: #8b5e3c; }
  html[data-theme="forest"] .cato-annotation { border-left-color: #2d6a4f; background: rgba(45,106,79,.08); }
  html[data-theme="forest"] .cato-annotation-label { color: #2d6a4f; }
  html[data-theme="slate"] .cato-annotation { border-left-color: #7c9ef5; background: rgba(124,158,245,.08); }
  html[data-theme="slate"] .cato-annotation-label { color: #7c9ef5; }
  html[data-theme="solarized"] .cato-annotation { border-left-color: #268bd2; background: rgba(38,139,210,.08); }
  html[data-theme="solarized"] .cato-annotation-label { color: #268bd2; }
  html[data-theme="lavender"] .cato-annotation { border-left-color: #7c5cbf; background: rgba(124,92,191,.08); }
  html[data-theme="lavender"] .cato-annotation-label { color: #7c5cbf; }
  html[data-theme="terminal"] .cato-annotation { border-left-color: #00ff41; background: rgba(0,255,65,.05); }
  html[data-theme="terminal"] .cato-annotation-label { color: #00cc33; font-family: 'Consolas',monospace; }
  html[data-theme="terminal"] .cato-annotation-text { color: #00ff41; font-family: 'Consolas',monospace; }
  html[data-theme="neonnoir"] .cato-annotation { border-left-color: #ff2d78; background: rgba(255,45,120,.06); }
  html[data-theme="neonnoir"] .cato-annotation-label { color: #ff2d78; }
  html[data-theme="vaporwave"] .cato-annotation { border-left-color: #ff71ce; background: rgba(255,113,206,.06); }
  html[data-theme="vaporwave"] .cato-annotation-label { color: #ff71ce; }
  html[data-theme="crayola"] .cato-annotation { border-left-color: #0066cc; background: rgba(0,102,204,.07); }
  html[data-theme="crayola"] .cato-annotation-label { color: #0066cc; font-family: 'Impact',sans-serif; }
  html[data-theme="chalkboard"] .cato-annotation { border-left-color: #f5e642; background: rgba(245,230,66,.05); }
  html[data-theme="chalkboard"] .cato-annotation-label { color: #f5e642; font-family: 'Comic Sans MS',cursive; }
  html[data-theme="chalkboard"] .cato-annotation-text { color: #f0ece0; font-family: 'Comic Sans MS',cursive; }
  html[data-theme="geneva"] .cato-annotation { border-left-color: #8b1a1a; background: rgba(139,26,26,.06); }
  html[data-theme="geneva"] .cato-annotation-label { color: #8b1a1a; font-family: Georgia,serif; font-style: italic; text-transform: none; letter-spacing: .02em; }
  html[data-theme="westminster"] .cato-annotation { border-left-color: #c8a84a; background: rgba(200,168,74,.06); }
  html[data-theme="westminster"] .cato-annotation-label { color: #c8a84a; font-family: Georgia,serif; }

  /* Session log entry rows */
  .session-entry-row { margin-bottom: 8px; }
  .session-entry-row select { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .84rem; padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px; background: var(--card); color: var(--ink); }
  .session-entry-row input[type=number] { width: 110px; }

  /* Configuration pane tabs */
  .config-wrap { display: flex; min-height: calc(100vh - 120px); width: 100%; box-sizing: border-box; }
  .config-tab-bar { display: flex; flex-direction: column; gap: 2px; width: 180px; flex-shrink: 0; padding: 28px 0 28px 28px; border-right: 1px solid var(--border); }
  .config-tab-bar-title { font-family: 'Consolas', 'DM Mono', monospace; font-size: .6rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); padding: 0 12px 10px 12px; }
  .config-tab { font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .82rem; font-weight: 500; padding: 9px 14px; background: none; border: none; border-radius: 7px; text-align: left; cursor: pointer; color: var(--muted); transition: all .15s; border-left: 3px solid transparent; }
  .config-tab.active { color: var(--blue); background: var(--blue-light); border-left-color: var(--blue); }
  .config-tab:hover:not(.active) { color: var(--ink); background: var(--cream); }
  .config-section { flex: 1; padding: 28px 32px; max-width: 720px; }

  /* Progress report pane */
  .report-window-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 18px; }
  .report-window-row label { margin-top: 0; }
  .report-toggle-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .84rem; color: var(--ink); }
  .report-toggle-item:last-child { border-bottom: none; }
  .report-toggle-item input[type=checkbox] { width: auto; cursor: pointer; }
  .report-preview { background: var(--cream); border: 1px solid var(--border); border-radius: 8px; padding: 18px 22px; font-family: 'Segoe UI', 'Inter', sans-serif; font-size: .84rem; line-height: 1.7; color: var(--ink); white-space: pre-wrap; margin-bottom: 18px; max-height: 400px; overflow-y: auto; }


  /* AI Dashboard */
  .ai-wrap { padding: 28px 32px; width: 100%; box-sizing: border-box; max-width: 860px; margin: 0 auto; }
  /* Cato review reuses .overview-hero for full theme support */
  .cato-label { font-family:'Consolas','DM Mono',monospace; font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.4); margin-bottom:8px; }
  .cato-review-text { font-family:'Segoe UI','Inter',sans-serif; font-size:1.05rem; line-height:1.7; color:rgba(255,255,255,.92); min-height:60px; }
  .cato-review-meta { font-family:'Consolas','DM Mono',monospace; font-size:.62rem; color:rgba(255,255,255,.3); margin-top:14px; }
  .cato-refresh-btn { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; font-family:'Segoe UI','Inter',sans-serif; font-size:.75rem; padding:6px 14px; border-radius:7px; cursor:pointer; transition:background .15s; margin-top:14px; }
  .cato-refresh-btn:hover { background:rgba(255,255,255,.18); }
  .cato-refresh-btn:disabled { opacity:.4; cursor:default; }
  .agenda-item { display:flex; align-items:flex-start; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
  .agenda-item:last-child { border-bottom:none; }
  .agenda-item input[type=checkbox] { width:auto; margin-top:3px; flex-shrink:0; cursor:pointer; }
  .agenda-item-body { flex:1; }
  .agenda-item-type { font-family:'Consolas','DM Mono',monospace; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:2px; }
  .agenda-item-title { font-size:.88rem; color:var(--ink); font-weight:500; }
  .agenda-item-date { font-family:'Consolas','DM Mono',monospace; font-size:.68rem; color:var(--muted); margin-top:2px; }
  .usage-log-row { font-family:'Consolas','DM Mono',monospace; font-size:.65rem; color:var(--muted); padding:3px 0; border-bottom:1px solid var(--border); display:flex; gap:14px; }
  .usage-log-row:last-child { border-bottom:none; }
  .cato-spinning { display:inline-block; animation:cato-spin .8s linear infinite; }
  @keyframes cato-spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .ai-monitor { display:flex; align-items:center; justify-content:space-between; gap:14px; background:var(--cream); border:1px solid var(--border); border-radius:8px; padding:9px 16px; margin-bottom:18px; flex-wrap:wrap; }
  .ai-monitor-status { font-family:'Consolas','DM Mono',monospace; font-size:.68rem; color:var(--muted); }
  .ai-monitor-status.active { color:var(--blue); }
  .ai-monitor-status.error  { color:var(--red-dead); }
  .ai-kill-switch { display:flex; align-items:center; gap:8px; font-family:'Consolas','DM Mono',monospace; font-size:.68rem; font-weight:600; }
  .ai-kill-switch.enabled  { color:var(--green-done); }
  .ai-kill-switch.disabled { color:var(--red-dead); }
  .ai-disabled-banner { background:#fff5f5; border:1px solid #fca5a5; border-radius:8px; padding:10px 16px; margin-bottom:16px; font-size:.82rem; color:var(--red-dead); }


  /* ══════════════════════════════════════════
     THEME DEFINITIONS
     Each theme overrides :root variables and
     sets font families via data-theme on <html>
  ══════════════════════════════════════════ */

  /* Theme 1: Airy (default — already in :root) */

  /* Theme 2: Dark Academic */
  html[data-theme="dark"] {
    --ink: #e8e0d0; --paper: #1a1814; --cream: #232018;
    --blue: #c8a96e; --blue-light: #2e2a20; --blue-mid: #4a3f28;
    --teal: #7eb8a4; --muted: #8a8070; --border: #332e24;
    --card: #211f1a; --red-dead: #e07070; --green-done: #7ec89a;
    --gold: #c8a96e; --gold-light: #8a7050; --rust: #e07070;
    --sage: #7eb8a4;
    --ui-font: Georgia, 'Crimson Pro', serif;
    --mono-font: 'Consolas', 'DM Mono', monospace;
    --heading-font: Georgia, 'Crimson Pro', serif;
  }
  html[data-theme="dark"] body { background: var(--paper); }
  html[data-theme="dark"] header { background: #141210; border-bottom-color: var(--blue); box-shadow: 0 1px 0 var(--border); }
  html[data-theme="dark"] nav { background: #1a1814; }
  html[data-theme="dark"] .side-pane { background: #1e1c17; }
  html[data-theme="dark"] .cal-nav button { background: #232018; }
  html[data-theme="dark"] .week-total,
  html[data-theme="dark"] .words-week,
  html[data-theme="dark"] .month-summary { background: #232018; }
  html[data-theme="dark"] textarea,
  html[data-theme="dark"] input[type="text"],
  html[data-theme="dark"] input[type="date"],
  html[data-theme="dark"] input[type="number"],
  html[data-theme="dark"] input[type="password"] { background: #232018; color: var(--ink); border-color: var(--border); }
  html[data-theme="dark"] .modal { background: #232018; }
  html[data-theme="dark"] .week-day.past { background: #1d1b16; }
  html[data-theme="dark"] .cal-controls .view-btns { background: #232018; }
  html[data-theme="dark"] .cal-controls .view-btns button.active { background: #2e2a20; }

  /* Theme 3: Warm Parchment */
  html[data-theme="parchment"] {
    --ink: #2c1e0f; --paper: #fdf6e3; --cream: #f5ead0;
    --blue: #8b5e3c; --blue-light: #f0e0c8; --blue-mid: #d4b896;
    --teal: #5c7a4e; --muted: #8a6e52; --border: #ddd0b8;
    --card: #fdf8f0; --red-dead: #c0392b; --green-done: #4a7c59;
    --gold: #8b5e3c; --gold-light: #c49a6c; --rust: #c0392b;
    --sage: #5c7a4e;
    --ui-font: Georgia, 'IBM Plex Serif', serif;
    --mono-font: 'Consolas', 'DM Mono', monospace;
    --heading-font: Georgia, 'IBM Plex Serif', serif;
  }
  html[data-theme="parchment"] body { background: var(--paper); }
  html[data-theme="parchment"] header { background: #2c1e0f; border-bottom-color: var(--blue); }
  html[data-theme="parchment"] nav { background: var(--cream); }
  html[data-theme="parchment"] .side-pane { background: var(--cream); }
  html[data-theme="parchment"] .cal-nav button { background: var(--paper); }
  html[data-theme="parchment"] .week-total,
  html[data-theme="parchment"] .words-week,
  html[data-theme="parchment"] .month-summary { background: var(--cream); }
  html[data-theme="parchment"] textarea,
  html[data-theme="parchment"] input[type="text"],
  html[data-theme="parchment"] input[type="date"],
  html[data-theme="parchment"] input[type="number"],
  html[data-theme="parchment"] input[type="password"] { background: var(--paper); color: var(--ink); border-color: var(--border); }
  html[data-theme="parchment"] .session-readout { background: linear-gradient(135deg, #8b5e3c 0%, #a67c5b 100%); }
  html[data-theme="parchment"] .cal-controls .view-btns { background: var(--cream); }
  html[data-theme="parchment"] .cal-controls .view-btns button.active { background: var(--paper); color: var(--blue); }

  /* Theme 4: Forest */
  html[data-theme="forest"] {
    --ink: #1a2e1e; --paper: #f2f7f3; --cream: #e4efe6;
    --blue: #2d6a4f; --blue-light: #d8eedf; --blue-mid: #a8d4b4;
    --teal: #1b7a6e; --muted: #5a7a62; --border: #c8dece;
    --card: #ffffff; --red-dead: #c0392b; --green-done: #1a7a3c;
    --gold: #2d6a4f; --gold-light: #74c69d; --rust: #c0392b;
    --sage: #1b7a6e;
    --ui-font: 'Nunito', 'Segoe UI', 'Inter', sans-serif;
    --mono-font: 'Consolas', 'DM Mono', monospace;
    --heading-font: 'Nunito', 'Segoe UI', 'Inter', sans-serif;
  }

<script>
// ===================== DATE UTILS =====================
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const todayKey = () => fmtKey(TODAY);
const fmtKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const parseKey = k => { const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); };
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ===================== STORAGE =====================
// ── Storage: Electron file-based or localStorage fallback ───────────────────
const isElectron = typeof window.electronStorage !== 'undefined';
let _storeCache = {};

async function initStoreCache() {
  if (!isElectron) return;
  const keys = await window.electronStorage.keys();
  for (const k of keys) {
    _storeCache[k] = await window.electronStorage.getItem(k);
  }
}

const store = (key, val) => {
  const s = JSON.stringify(val);
  _storeCache[key] = s;
  if (isElectron) {
    window.electronStorage.setItem(key, s).catch(e => console.error('store:', e));
  } else {
    try { localStorage.setItem(key, s); } catch(e) {}
  }
};

const retrieve = key => {
  let raw;
  if (isElectron) {
    raw = _storeCache[key] !== undefined ? _storeCache[key] : null;
  } else {
    try { raw = localStorage.getItem(key); } catch(e) { return null; }
  }
  try { return raw ? JSON.parse(raw) : null; } catch(e) { return null; }
};

// ── Key helpers ───────────────────────────────────────────────
// Per-project keys:  diss_proj_{id}_{field}
// Global keys:       diss_global_{field}
const projKey  = (id, field) => `diss_proj_${id}_${field}`;
const globalKey = field => `diss_global_${field}`;

// ── Project metadata ──────────────────────────────────────────
// Stored globally: { id, name, created }[]
function getProjectList() {
  return retrieve(globalKey('projects')) || [];
}
function saveProjectList(list) {
  store(globalKey('projects'), list);
}
function getActiveProjectId() {
  return retrieve(globalKey('activeProject')) || null;
}
function setActiveProjectId(id) {
  store(globalKey('activeProject'), id);
}
function generateProjectId() {
  return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

// ── Per-project state fields ──────────────────────────────────
const PROJECT_FIELDS = ['lastAccomplished','lastPlan','lastHours','days','deadlines',
                        'finalDeadline','wcGoal','wcCurrent','alexaEnabled','alexaRecipient',
                        'alexaLastSent','alexaLastStatus','currentTheme','meetings',
                        'books','writingProjects','userName','reportRecipient',
                        'docxPath','gcalSyncGoals','gcalSyncDeadlines','gcalSyncMeetings',
                        'notionSyncOnClose','notionLastSync',
                        'catoEnabled','catoReview','catoReviewDate','catoUsageLog','catoAgendaItems',
                        'catoHistory'];

// ── Global (cross-project) state fields ──────────────────────
const GLOBAL_FIELDS  = ['alexaClientId','alexaSenderEmail','notionDbId','catoSystemPrompt','anthropicAdminKey','gistId','gistAutoSync','gistLastSync'];

// ===================== STATE =====================
let state = {
  // Per-project
  lastAccomplished: '', lastPlan: '', lastHours: '',
  currentTheme: 'airy',
  meetings: [],
  days: {}, deadlines: [], finalDeadline: '',
  wcGoal: 0, wcCurrent: 0,
  docxPath: '',           // path to the watched .docx file for main writing project
  books: [],              // [{id, title, currentPage, totalPages}]
  writingProjects: [],    // [{id, title, wcGoal, wcCurrent, docxPath}] — additional writing projects
  alexaEnabled: false,
  alexaRecipient: '',
  reportRecipient: '',
  userName: '',
  alexaLastSent: '',
  alexaLastStatus: '',
  gcalSyncGoals:     false,  // auto-sync goals to Google Calendar
  gcalSyncDeadlines: false,  // auto-sync deadlines to Google Calendar
  gcalSyncMeetings:  false,  // auto-sync meetings to Google Calendar
  // Global
  alexaClientId: '',
  alexaClientSecret: '',   // in-memory only; persisted encrypted globally
  alexaRefreshToken: '',   // in-memory only; persisted encrypted globally
  alexaSenderEmail: '',
  notionApiKey: '',        // Notion integration token — encrypted
  notionDbId: '',          // Notion database ID
  notionSyncOnClose: false,// auto-sync to Notion on app close
  notionLastSync: '',      // ISO timestamp of last successful sync
  anthropicKey: '',        // Anthropic API key — encrypted
  anthropicAdminKey: '',   // Anthropic Admin API key — encrypted (for usage/cost reports)
  catoSystemPrompt: '',    // Cato's editable system prompt (stored globally)
  gistId: '',              // GitHub Gist ID for mobile sync
  gistAutoSync: false,     // Auto-push to Gist on close
  gistLastSync: '',        // ISO timestamp of last Gist push
  _hasEncryptedGistToken: false, // whether a Gist token is stored encrypted
  catoEnabled: true,       // kill switch — when false, no API calls allowed
  catoLastCallStatus: '',  // 'idle'|'calling'|'ok'|'error'
  catoLastCallTime: '',    // ISO timestamp of last API call
  catoLastCallFeature: '', // feature name of last call
  catoReview: '',          // Last persisted review text
  catoReviewDate: '',      // ISO date of last review
  catoUsageLog: [],        // [{ts, feature, inputTokens, outputTokens}]
  catoHistory: [],         // last 3 Review outputs: [{ts, response}]
  // Session-only
  calView: 'week', calDate: new Date(TODAY),
  _hasEncryptedSecret: false,
  _hasEncryptedToken: false,
  _hasEncryptedNotionKey: false,
  _hasEncryptedAnthropicKey: false,
  _hasEncryptedAdminKey: false,
  // Project meta (in-memory)
  _activeProjectId: null,
};

// ── AES-GCM helpers ──────────────────────────────────────────
async function deriveKey(password, saltBytes) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: saltBytes, iterations: 200000, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
}
function toHex(buf) {
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function fromHex(hex) {
  const bytes = new Uint8Array(hex.length/2);
  for (let i=0;i<hex.length;i+=2) bytes[i/2] = parseInt(hex.slice(i,i+2),16);
  return bytes;
}
async function encryptSecret(plaintext, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await deriveKey(password, salt);
  const cipherBuf = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(plaintext));
  return { salt: toHex(salt), iv: toHex(iv), ct: toHex(cipherBuf) };
}
async function decryptSecret(stored, password) {
  const key = await deriveKey(password, fromHex(stored.salt));
  const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: fromHex(stored.iv) }, key, fromHex(stored.ct));
  return new TextDecoder().decode(plainBuf);
}

// ── State load / save ─────────────────────────────────────────
function loadState() {
  const id = state._activeProjectId;
  if (!id) return;
  // Load per-project fields
  for (const k of PROJECT_FIELDS) {
    const v = retrieve(projKey(id, k));
    if (v !== null) state[k] = v;
  }
  // Load global fields
  for (const k of GLOBAL_FIELDS) {
    const v = retrieve(globalKey(k));
    if (v !== null) state[k] = v;
  }
  state._hasEncryptedSecret       = !!(isElectron ? _storeCache[globalKey('enc_clientSecret')]      : localStorage.getItem(globalKey('enc_clientSecret')));
  state._hasEncryptedToken        = !!(isElectron ? _storeCache[globalKey('enc_refreshToken')]       : localStorage.getItem(globalKey('enc_refreshToken')));
  state._hasEncryptedNotionKey    = !!(isElectron ? _storeCache[globalKey('enc_notionApiKey')]       : localStorage.getItem(globalKey('enc_notionApiKey')));
  state._hasEncryptedAnthropicKey = !!(isElectron ? _storeCache[globalKey('enc_anthropicKey')]       : localStorage.getItem(globalKey('enc_anthropicKey')));
  state._hasEncryptedAdminKey     = !!(isElectron ? _storeCache[globalKey('enc_anthropicAdminKey')] : localStorage.getItem(globalKey('enc_anthropicAdminKey')));
  state._hasEncryptedGistToken    = !!(isElectron ? _storeCache[globalKey('enc_gistToken')]          : localStorage.getItem(globalKey('enc_gistToken')));
}
function saveState() {
  const id = state._activeProjectId;
  if (!id) return;
  for (const k of PROJECT_FIELDS) store(projKey(id, k), state[k]);
  for (const k of GLOBAL_FIELDS)  store(globalKey(k), state[k]);
}
async function saveEncryptedCreds(password) {
  if (state.alexaClientSecret) {
    { const v = JSON.stringify(await encryptSecret(state.alexaClientSecret, password)); _storeCache[globalKey('enc_clientSecret')] = v; if(isElectron) await window.electronStorage.setItem(globalKey('enc_clientSecret'), v); else localStorage.setItem(globalKey('enc_clientSecret'), v); }
  }
  if (state.alexaRefreshToken) {
    { const v = JSON.stringify(await encryptSecret(state.alexaRefreshToken, password)); _storeCache[globalKey('enc_refreshToken')] = v; if(isElectron) await window.electronStorage.setItem(globalKey('enc_refreshToken'), v); else localStorage.setItem(globalKey('enc_refreshToken'), v); }
  }
  if (state.notionApiKey) {
    { const v = JSON.stringify(await encryptSecret(state.notionApiKey, password)); _storeCache[globalKey('enc_notionApiKey')] = v; if(isElectron) await window.electronStorage.setItem(globalKey('enc_notionApiKey'), v); else localStorage.setItem(globalKey('enc_notionApiKey'), v); }
  }
  if (state.anthropicKey) {
    { const v = JSON.stringify(await encryptSecret(state.anthropicKey, password)); _storeCache[globalKey('enc_anthropicKey')] = v; if(isElectron) await window.electronStorage.setItem(globalKey('enc_anthropicKey'), v); else localStorage.setItem(globalKey('enc_anthropicKey'), v); }
  }
  if (state.anthropicAdminKey) {
    { const v = JSON.stringify(await encryptSecret(state.anthropicAdminKey, password)); _storeCache[globalKey('enc_anthropicAdminKey')] = v; if(isElectron) await window.electronStorage.setItem(globalKey('enc_anthropicAdminKey'), v); else localStorage.setItem(globalKey('enc_anthropicAdminKey'), v); }
  }
  if (state.gistToken) {
    { const v = JSON.stringify(await encryptSecret(state.gistToken, password)); _storeCache[globalKey('enc_gistToken')] = v; if(isElectron) await window.electronStorage.setItem(globalKey('enc_gistToken'), v); else localStorage.setItem(globalKey('enc_gistToken'), v); }
  }
  state._hasEncryptedSecret       = !!state.alexaClientSecret;
  state._hasEncryptedToken        = !!state.alexaRefreshToken;
  state._hasEncryptedNotionKey    = !!state.notionApiKey;
  state._hasEncryptedAnthropicKey = !!state.anthropicKey;
  state._hasEncryptedAdminKey     = !!state.anthropicAdminKey;
  state._hasEncryptedGistToken    = !!state.gistToken;
}
async function loadEncryptedCreds(password) {
  const rawSecret   = isElectron ? _storeCache[globalKey('enc_clientSecret')] : localStorage.getItem(globalKey('enc_clientSecret'));
  const rawToken    = isElectron ? _storeCache[globalKey('enc_refreshToken')]  : localStorage.getItem(globalKey('enc_refreshToken'));
  const rawNotion    = isElectron ? _storeCache[globalKey('enc_notionApiKey')]   : localStorage.getItem(globalKey('enc_notionApiKey'));
  const rawAnthropic  = isElectron ? _storeCache[globalKey('enc_anthropicKey')]      : localStorage.getItem(globalKey('enc_anthropicKey'));
  const rawAdminKey   = isElectron ? _storeCache[globalKey('enc_anthropicAdminKey')] : localStorage.getItem(globalKey('enc_anthropicAdminKey'));
  try {
    const rawGist     = isElectron ? _storeCache[globalKey('enc_gistToken')]       : localStorage.getItem(globalKey('enc_gistToken'));
    if (rawSecret)    state.alexaClientSecret  = await decryptSecret(JSON.parse(rawSecret),    password);
    if (rawToken)     state.alexaRefreshToken   = await decryptSecret(JSON.parse(rawToken),     password);
    if (rawNotion)    state.notionApiKey        = await decryptSecret(JSON.parse(rawNotion),    password);
    if (rawAnthropic) state.anthropicKey        = await decryptSecret(JSON.parse(rawAnthropic), password);
    if (rawAdminKey)  state.anthropicAdminKey   = await decryptSecret(JSON.parse(rawAdminKey),  password);
    if (rawGist)      state.gistToken           = await decryptSecret(JSON.parse(rawGist),      password);
    return true;
  } catch(e) {
    state.alexaClientSecret  = '';
    state.alexaRefreshToken   = '';
    state.notionApiKey        = '';
    state.anthropicKey        = '';
    state.anthropicAdminKey   = '';
    state.gistToken           = '';
    return false;
  }
}
function clearEncryptedCreds() {
  delete _storeCache[globalKey('enc_clientSecret')]; if(isElectron) window.electronStorage.removeItem(globalKey('enc_clientSecret')); else localStorage.removeItem(globalKey('enc_clientSecret'));
  delete _storeCache[globalKey('enc_refreshToken')]; if(isElectron) window.electronStorage.removeItem(globalKey('enc_refreshToken')); else localStorage.removeItem(globalKey('enc_refreshToken'));
  delete _storeCache[globalKey('enc_notionApiKey')]; if(isElectron) window.electronStorage.removeItem(globalKey('enc_notionApiKey')); else localStorage.removeItem(globalKey('enc_notionApiKey'));
  state.alexaClientSecret      = '';
  state.alexaRefreshToken       = '';
  delete _storeCache[globalKey('enc_anthropicKey')]; if(isElectron) window.electronStorage.removeItem(globalKey('enc_anthropicKey')); else localStorage.removeItem(globalKey('enc_anthropicKey'));
  state.notionApiKey             = '';
  delete _storeCache[globalKey('enc_anthropicAdminKey')]; if(isElectron) window.electronStorage.removeItem(globalKey('enc_anthropicAdminKey')); else localStorage.removeItem(globalKey('enc_anthropicAdminKey'));
  delete _storeCache[globalKey('enc_gistToken')]; if(isElectron) window.electronStorage.removeItem(globalKey('enc_gistToken')); else localStorage.removeItem(globalKey('enc_gistToken'));
  state.anthropicKey              = '';
  state.anthropicAdminKey         = '';
  state.gistToken                 = '';
  state._hasEncryptedSecret       = false;
  state._hasEncryptedToken        = false;
  state._hasEncryptedNotionKey    = false;
  state._hasEncryptedAnthropicKey = false;
  state._hasEncryptedAdminKey     = false;
  state._hasEncryptedGistToken    = false;
}

// ===================== COMPUTED =====================
const hoursForDay = k => parseFloat(state.days[k]?.hours || 0) || 0;
const hoursForWeek = ws => Array.from({length:7},(_,i)=>hoursForDay(fmtKey(addDays(ws,i)))).reduce((a,b)=>a+b,0);
const hoursForMonth = (y,m) => { let t=0,d=new Date(y,m+1,0).getDate(); for(let i=1;i<=d;i++) t+=hoursForDay(`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`); return t; };
const hoursForYear = y => Array.from({length:12},(_,m)=>hoursForMonth(y,m)).reduce((a,b)=>a+b,0);
const getWeekStart = d => { const r=new Date(d); r.setDate(r.getDate()-r.getDay()); return r; };
// ── Pages read helpers ───────────────────────────────────────────────────────
const totalPagesNow = () => (state.books||[]).reduce((t,b)=>t+(parseInt(b.currentPage)||0),0);
const pagesForDay = k => {
  const reading = state.days[k]?.reading || [];
  return reading.reduce((t, e) => t + (parseInt(e.pagesRead) || 0), 0);
};
const pagesForWeek  = ws  => Array.from({length:7},(_,i)=>pagesForDay(fmtKey(addDays(ws,i)))).reduce((a,b)=>a+b,0);
const pagesForMonth = (y,m) => { let t=0,d=new Date(y,m+1,0).getDate(); for(let i=1;i<=d;i++) t+=pagesForDay(`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`); return t; };
const pagesForYear  = y   => Array.from({length:12},(_,m)=>pagesForMonth(y,m)).reduce((a,b)=>a+b,0);

// ── Words written helpers ─────────────────────────────────────────────────────
const wordsForDay = k => {
  const writing = state.days[k]?.writing || [];
  return writing.reduce((t, e) => t + (parseInt(e.wordsWritten) || 0), 0);
};
const wordsForWeek  = ws  => Array.from({length:7},(_,i)=>wordsForDay(fmtKey(addDays(ws,i)))).reduce((a,b)=>a+b,0);
const wordsForMonth = (y,m) => { let t=0,d=new Date(y,m+1,0).getDate(); for(let i=1;i<=d;i++) t+=wordsForDay(`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`); return t; };
const wordsForYear  = y   => Array.from({length:12},(_,m)=>wordsForMonth(y,m)).reduce((a,b)=>a+b,0);

const wordsPerDay = () => {
  if (!state.finalDeadline||!state.wcGoal||!state.wcCurrent) return 0;
  const diff = Math.max(1,Math.ceil((new Date(state.finalDeadline)-TODAY)/86400000));
  return Math.max(0,state.wcGoal-state.wcCurrent)/diff;
};

// ===================== GMAIL OAUTH2 + SEND =====================
// Flow: user provides Client ID + Secret from Google Cloud Console.
// We open an OAuth popup, get an auth code, exchange it for tokens,
// store the refresh token. From then on we get fresh access tokens
// silently and call Gmail REST API to send.

const GMAIL_SCOPE = 'https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/calendar.events';
const GCAL_API    = 'https://www.googleapis.com/calendar/v3';
const TOKEN_URL   = 'https://oauth2.googleapis.com/token';
const GMAIL_SEND  = 'https://www.googleapis.com/gmail/v1/users/me/messages/send';

// Step 1 — open OAuth popup and get auth code
function gmailAuthorize() {
  const clientId = document.getElementById('alexa-client-id')?.value.trim() || state.alexaClientId;
  const email    = document.getElementById('alexa-sender-email')?.value.trim() || state.alexaSenderEmail;
  if (!clientId) { alert('Please enter your Google Client ID first.'); return; }

  // Save what the user has typed so far — only overwrite secret if they actually typed something
  if (document.getElementById('alexa-client-id'))    state.alexaClientId   = document.getElementById('alexa-client-id').value.trim();
  if (document.getElementById('alexa-sender-email')) state.alexaSenderEmail = document.getElementById('alexa-sender-email').value.trim();
  const typedSecret = document.getElementById('alexa-client-secret')?.value.trim();
  if (typedSecret) state.alexaClientSecret = typedSecret;  // only overwrite if user re-entered it
  saveState();

  // If secret still not in memory, we need to unlock first
  if (!state.alexaClientSecret) {
    if (state._hasEncryptedSecret) {
      showPasswordModal('enter', async (pw) => {
        const ok = await loadEncryptedCreds(pw);
        if (!ok) { alert('Incorrect password — could not decrypt credentials.'); return; }
        _doGmailAuthorize(clientId, email);
      });
    } else {
      alert('Please enter your Client Secret before connecting.');
    }
    return;
  }

  _doGmailAuthorize(clientId, email);
}

function _doGmailAuthorize(clientId, email) {
  const redirectUri = 'urn:ietf:wg:oauth:2.0:oob';
  const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
    `client_id=${encodeURIComponent(clientId)}` +
    `&redirect_uri=${encodeURIComponent(redirectUri)}` +
    `&response_type=code` +
    `&scope=${encodeURIComponent(GMAIL_SCOPE)}` +
    `&access_type=offline` +
    `&prompt=consent` +
    (email ? `&login_hint=${encodeURIComponent(email)}` : '');
  // Open in a new tab — OOB flow gives user a code to paste back
  if (isElectron) { window.electronShell.openExternal(authUrl); } else { window.open(authUrl, '_blank'); }
  // Show the code-paste modal
  showAuthCodeModal();
}

function showAuthCodeModal() {
  document.getElementById('modal-content').innerHTML = `
    <h3>Paste Authorization Code</h3>
    <p style="font-size:.82rem;color:var(--muted);line-height:1.55;margin-bottom:12px">
      After authorizing in the Google tab, you'll see a code on the page. Copy it and paste it below.
    </p>
    <label style="font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px">Authorization Code</label>
    <input type="text" id="auth-code-input" placeholder="4/0AX4Xf..." style="width:100%">
    <div class="actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="gmailExchangeCode()">Connect</button>
    </div>`;
  document.getElementById('modal').style.display = 'flex';
}

async function gmailExchangeCode() {
  const code = document.getElementById('auth-code-input')?.value.trim();
  if (!code) { alert('Please paste the authorization code.'); return; }

  const clientId     = state.alexaClientId;
  const clientSecret = state.alexaClientSecret;
  if (!clientId || !clientSecret) { alert('Client ID and Secret are required.'); return; }

  try {
    const resp = await fetch(TOKEN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        code, client_id: clientId, client_secret: clientSecret,
        redirect_uri: 'urn:ietf:wg:oauth:2.0:oob', grant_type: 'authorization_code'
      })
    });
    const data = await resp.json();
    if (data.refresh_token) {
      state.alexaRefreshToken = data.refresh_token;
      saveState();
      closeModal();
      showPasswordModal('set', async (pw) => {
        await saveEncryptedCreds(pw);
        renderMain();
        renderSide();
        alert('✓ Gmail connected successfully! You can now send emails.');
      });
    } else {
      alert('Failed to get refresh token. Response: ' + JSON.stringify(data));
    }
  } catch(e) {
    alert('Connection error: ' + e.message);
  }
}

async function gmailGetAccessToken() {
  const resp = await fetch(TOKEN_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id:     state.alexaClientId,
      client_secret: state.alexaClientSecret,
      refresh_token: state.alexaRefreshToken,
      grant_type:    'refresh_token'
    })
  });
  const data = await resp.json();
  if (!data.access_token) throw new Error('Could not refresh access token: ' + JSON.stringify(data));
  return data.access_token;
}

function buildEmailBody() {
  const acc  = state.lastAccomplished || '(nothing recorded)';

}

function toBase64url(str) {
  // Encode a string to base64url safely via UTF-8 bytes
  const bytes = new TextEncoder().encode(str);
  const binary = Array.from(bytes, b => String.fromCharCode(b)).join('');
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function makeRawEmail(to, subject, attachmentText) {
  const boundary = 'diss_planner_' + Math.random().toString(36).slice(2);
  // Encode the attachment content as base64 (standard, not url-safe — MIME uses standard)
  const attachBytes = new TextEncoder().encode(attachmentText);
  const attachBinary = Array.from(attachBytes, b => String.fromCharCode(b)).join('');
  const attachB64 = btoa(attachBinary);
  // Split into 76-char lines as required by MIME
  const attachB64Wrapped = attachB64.match(/.{1,76}/g).join('\r\n');

  const msg = [
    `To: ${to}`,
    `From: ${state.alexaSenderEmail}`,
    `Subject: ${subject}`,
    `MIME-Version: 1.0`,
    `Content-Type: multipart/mixed; boundary="${boundary}"`,
    ``,
    `--${boundary}`,
    `Content-Type: text/plain; charset=utf-8`,
    ``,
    `Please see the attached check-in note.`,
    ``,
    `--${boundary}`,
    `Content-Type: text/plain; charset=utf-8; name="checkin.txt"`,
    `Content-Disposition: attachment; filename="checkin.txt"`,
    `Content-Transfer-Encoding: base64`,
    ``,
    attachB64Wrapped,
    ``,
    `--${boundary}--`
  ].join('\r\n');

  return toBase64url(msg);
}

function resetEmailBody() {
  const el = document.getElementById('email-body-edit');
  if (el) el.value = buildEmailBody();
}

function setSendStatus(msg, color) {
  const el = document.getElementById('send-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = color || 'var(--muted)';
  el.style.display = 'block';
}

async function sendAlexaEmail(isManual = true) {
  if (!state.alexaClientId || !state.alexaClientSecret || !state.alexaRefreshToken) {
    if (isManual) {
      setSendStatus('✗ Gmail is not connected. Complete setup below.', 'var(--red-dead)');
    }
    return false;
  }
  if (isManual) {
    const btn = document.querySelector('.send-now-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }
    setSendStatus('Sending…', 'var(--muted)');
  }
  try {
    const accessToken = await gmailGetAccessToken();
    // Use edited body if the textarea exists, otherwise fall back to generated body
    const bodyEl = document.getElementById('email-body-edit');
    const emailBody = bodyEl ? bodyEl.value.trim() || buildEmailBody() : buildEmailBody();
    const raw = makeRawEmail(
      state.alexaRecipient || 'alexa@alexa.com',
      'Project Check-In',
      emailBody
    );
    const resp = await fetch(GMAIL_SEND, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ raw })
    });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || resp.status);
    }
    state.alexaLastSent   = new Date().toLocaleString();
    state.alexaLastStatus = 'success';
    saveState();
    if (isManual) {
      setSendStatus('✓ Email sent successfully at ' + state.alexaLastSent, 'var(--sage)');
      const btn = document.querySelector('.send-now-btn');
      if (btn) { btn.disabled = false; btn.textContent = 'Send Now'; }
      renderSide();
    }
    return true;
  } catch(e) {
    state.alexaLastStatus = 'error: ' + e.message;
    saveState();
    if (isManual) {
      setSendStatus('✗ Failed to send: ' + e.message, 'var(--red-dead)');
      const btn = document.querySelector('.send-now-btn');
      if (btn) { btn.disabled = false; btn.textContent = 'Send Now'; }
    }
    return false;
  }
}

function disconnectGmail() {
  if (!confirm('Disconnect Gmail? Encrypted credentials will be cleared from storage.')) return;
  clearEncryptedCreds();
  state.alexaLastSent = '';
  state.alexaLastStatus = '';
  saveState();
  renderMain();
  renderSide();
}
