function catoAddApproved() {
  const approved = (state.catoAgendaItems||[]).filter(i=>i.approved);
  if (!approved.length) { alert('No items approved. Check the checkboxes first.'); return; }
  let added = { goals: 0, deadlines: 0 };
  approved.forEach(item => {
    if (item.type === 'goal' && item.date) {
      if (!state.days[item.date]) state.days[item.date] = { goals: [] };
      if (!state.days[item.date].goals) state.days[item.date].goals = [];
      const goal = { text: item.title, done: false, gcalEventId: null };
      state.days[item.date].goals.push(goal);
      if (state.gcalSyncGoals && item.date >= todayKey()) {
        gcalCreateEvent(item.title, item.date, 'Goal').then(id => {
          if (id) { goal.gcalEventId = id; saveState(); }
        });
      }
      added.goals++;
    } else if (item.type === 'deadline' && item.date) {
      const dl = { desc: item.title, date: item.date, complete: false, gcalEventId: null };
      state.deadlines.push(dl);
      if (state.gcalSyncDeadlines) {
        gcalCreateEvent(item.title, item.date, 'Deadline').then(id => { if (id) { dl.gcalEventId = id; saveState(); } });
      }
      added.deadlines++;
    }
  });
  state.catoAgendaItems = (state.catoAgendaItems||[]).filter(i=>!i.approved);
  saveState();
  if (currentPane === 'deadlines') renderMain();
  renderSide();
  const msg = [
    added.goals     ? added.goals     + ' goal'     + (added.goals    !==1?'s':'') : '',
    added.deadlines ? added.deadlines + ' deadline' + (added.deadlines!==1?'s':'') : '',
  ].filter(Boolean).join(', ');
  const status = document.getElementById('cato-agenda-status');
  if (status) { status.style.color='var(--green-done)'; status.textContent = 'Added: ' + msg; }
}

function buildNotionExport() {
  const proj = getProjectList().find(p => p.id === state._activeProjectId);
  const projName = proj ? proj.name : 'Project';
  const now = new Date().toISOString();
  const items = [];

  function slugify(str) {
    return (str || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 60);
  }

  Object.keys(state.days || {}).sort().forEach(dateKey => {
    (state.days[dateKey]?.goals || []).forEach((g, i) => {
      const text = typeof g === 'string' ? g : (g.text || '');
      const done = typeof g === 'object' && !!g.done;
      const gcalId = typeof g === 'object' ? g.gcalEventId : null;
      const externalId = gcalId ? 'gcal:' + gcalId : 'goal:' + dateKey + ':' + slugify(text);
      items.push({ external_id: externalId, type: 'goal', title: text, date: dateKey, done, updated_at: now });
    });
  });

  (state.deadlines || []).forEach(dl => {
    const externalId = dl.gcalEventId ? 'gcal:' + dl.gcalEventId : 'deadline:' + dl.date + ':' + slugify(dl.desc);
    items.push({ external_id: externalId, type: 'deadline', title: dl.desc, date: dl.date, done: !!dl.complete, updated_at: now });
  });

  (state.meetings || []).forEach(m => {
    const meetingExtId = 'meeting:' + m.id;
    items.push({ external_id: meetingExtId, type: 'meeting', title: m.supervisor || 'Meeting', date: m.date, supervisor: m.supervisor || '', notes: m.notes || '', done: false, updated_at: now });
    (m.actions || []).forEach((a, i) => {
      const aText = typeof a === 'string' ? a : (a.text || '');
      const aDone = typeof a === 'object' && !!a.done;
      items.push({ external_id: meetingExtId + ':action:' + i, type: 'meeting_action', title: aText, date: m.date, done: aDone, meeting_external_id: meetingExtId, updated_at: now });
    });
  });

  Object.keys(state.days || {}).sort().forEach(dateKey => {
    const d = state.days[dateKey];
    if (!d || (!d.accomplished && !d.hours)) return;
    items.push({ external_id: 'session:' + dateKey, type: 'session', date: dateKey, hours: parseFloat(d.hours || 0) || 0, accomplished: d.accomplished || '', plan: d.goals ? d.goals.map(g => typeof g === 'string' ? g : g.text).filter(Boolean).join('; ') : '', done: true, updated_at: now });
  });

  (state.books || []).forEach(b => {
    const cur = parseInt(b.currentPage) || 0, tot = parseInt(b.totalPages) || 0;
    const pct = tot > 0 ? Math.round(cur / tot * 100) : 0;
    items.push({ external_id: 'book:' + slugify(b.title), type: 'book', title: b.title, current_page: cur, total_pages: tot, percent: pct, done: tot > 0 && cur >= tot, updated_at: now });
  });

  return { _schema_version: 1, _exported_at: now, _project_name: projName, items };
}

function downloadNotionExport() {
  const data = buildNotionExport();
  const proj = getProjectList().find(p => p.id === state._activeProjectId);
  const slug = (proj?.name || 'project').replace(/[^a-z0-9]/gi, '-').toLowerCase();
  const filename = slug + '-notion-export-' + todayKey() + '.json';
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  const counts = {};
  data.items.forEach(i => { counts[i.type] = (counts[i.type]||0) + 1; });
  return Object.entries(counts).map(([t,n]) => n + ' ' + t + (n!==1?'s':'')).join(', ');
}

async function copyNotionExport() {
  const data = buildNotionExport();
  try { await navigator.clipboard.writeText(JSON.stringify(data, null, 2)); return true; }

}

async function pushToNotion(showStatus) {
  if (!state.notionApiKey || !state.notionDbId) {
    if (showStatus) alert('Please configure your Notion API key and database ID.');
    return false;
  }
  const data = buildNotionExport();
  const statusEl = document.getElementById('notion-sync-status');
  if (statusEl) { statusEl.style.color = 'var(--muted)'; statusEl.textContent = 'Syncing to Notion...'; }
  const NOTION_API = 'https://api.notion.com/v1';
  const headers = { 'Authorization': 'Bearer ' + state.notionApiKey, 'Content-Type': 'application/json', 'Notion-Version': '2022-06-28' };
  const typeMap = { goal:'Goal', deadline:'Deadline', meeting:'Meeting', meeting_action:'Meeting action', session:'Session', book:'Book' };
  let synced = 0, errors = 0;
  for (const item of data.items) {
    try {
      const props = {
        'Name':        { title:     [{ text: { content: item.title || '' } }] },
        'Type':        { select:    { name: typeMap[item.type] || item.type } },
        'External ID': { rich_text: [{ text: { content: item.external_id } }] },
        'Done':        { checkbox:  item.done },
        'Updated At':  { date:      { start: item.updated_at } },
      };
      if (item.date)         props['Date']           = { date: { start: item.date } };
      if (item.notes)        props['Notes']          = { rich_text: [{ text: { content: item.notes.slice(0,2000) } }] };
      if (item.supervisor)   props['Supervisor']     = { rich_text: [{ text: { content: item.supervisor } }] };
      if (item.hours)        props['Hours']          = { number: item.hours };
      if (item.accomplished) props['Accomplished']   = { rich_text: [{ text: { content: item.accomplished.slice(0,2000) } }] };
      if (item.current_page !== undefined) props['Current Page'] = { number: item.current_page };
      if (item.total_pages)  props['Total Pages']   = { number: item.total_pages };
      if (item.percent !== undefined) props['Percent'] = { number: item.percent };
      if (item.meeting_external_id) props['Meeting ID'] = { rich_text: [{ text: { content: item.meeting_external_id } }] };
      const searchResp = await fetch(NOTION_API + '/databases/' + state.notionDbId + '/query', {
        method: 'POST', headers,
        body: JSON.stringify({ filter: { property: 'External ID', rich_text: { equals: item.external_id } } }),
      });
      const searchData = await searchResp.json();
      const existing = searchData.results?.[0];
      if (existing) {
        await fetch(NOTION_API + '/pages/' + existing.id, { method: 'PATCH', headers, body: JSON.stringify({ properties: props }) });
      } else {
        await fetch(NOTION_API + '/pages', { method: 'POST', headers, body: JSON.stringify({ parent: { database_id: state.notionDbId }, properties: props }) });
      }
      synced++;
    } catch(e) { console.error('Notion sync error:', item.external_id, e); errors++; }
  }
  const now = new Date().toISOString();
  state.notionLastSync = now; saveState();
  const msg = errors > 0 ? 'Synced ' + synced + ' items, ' + errors + ' errors.' : 'Synced ' + synced + ' items at ' + new Date(now).toLocaleTimeString();
  if (statusEl) { statusEl.style.color = errors > 0 ? 'var(--red-dead)' : 'var(--green-done)'; statusEl.textContent = (errors>0?'':'OK: ') + msg; }
  return errors === 0;
}

function buildSyncPayload() {
  // Build a complete snapshot of all project data for mobile sync
  const proj = getProjectList().find(p => p.id === state._activeProjectId);
  const allProjects = getProjectList();

  // Collect all project data
  const projectData = {};
  for (const p of allProjects) {
    projectData[p.id] = {};
    for (const k of PROJECT_FIELDS) {
      const v = retrieve(projKey(p.id, k));
      if (v !== null) projectData[p.id][k] = v;
    }
  }

  return {
    _syncVersion: 1,
    _pushedAt: new Date().toISOString(),
    _activeProjectId: state._activeProjectId,
    _projectList: allProjects,
    _projectData: projectData,
    // Global non-sensitive fields
    notionDbId: state.notionDbId,
    gistId: state.gistId,
    // Note: encrypted blobs deliberately excluded from sync payload
    // (API keys, tokens never leave the device that owns them)
  };
}

async function pushToGist(silent) {
  if (!state.gistToken || !state.gistId) {
    if (!silent) alert('Configure your Gist ID and GitHub token in Configuration → Data first.');
    return false;
  }
  try {
    const payload = buildSyncPayload();
    const resp = await fetch('https://api.github.com/gists/' + state.gistId, {
      method: 'PATCH',
      headers: {
        'Authorization': 'Bearer ' + state.gistToken,
        'Content-Type': 'application/json',
        'X-GitHub-Api-Version': '2022-11-28',
      },
      body: JSON.stringify({
        files: {
          'jjs-planner-sync.json': {
            content: JSON.stringify(payload, null, 2)
          }
        }
      })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.message || resp.statusText);
    }
    state.gistLastSync = new Date().toISOString();
    store(globalKey('gistLastSync'), state.gistLastSync);
    if (!silent) {
      const el = document.getElementById('gist-sync-status');
      if (el) { el.style.color = 'var(--green-done)'; el.textContent = 'Pushed at ' + new Date().toLocaleTimeString(); }
    }
    return true;
  } catch(e) {
    console.error('Gist push failed:', e);
    if (!silent) {
      const el = document.getElementById('gist-sync-status');
      if (el) { el.style.color = 'var(--red-dead)'; el.textContent = 'Push failed: ' + e.message; }
    }
    return false;
  }
}

async function fetchFromGist() {
  // Non-Electron only — load project data from Gist on startup
  if (isElectron) return false;

  // Check URL query parameter for gist ID first (?gist=GIST_ID)
  const urlParams = new URLSearchParams(window.location.search);
  const urlGistId = urlParams.get('gist');
  if (urlGistId && urlGistId !== state.gistId) {
    state.gistId = urlGistId;
    store(globalKey('gistId'), urlGistId);
  }

  if (!state.gistId) {
    console.log('JJS Sync: no Gist ID configured — add ?gist=YOUR_GIST_ID to the URL');
    return false;
  }

  console.log('JJS Sync: fetching from Gist', state.gistId);
  try {
    const resp = await fetch('https://api.github.com/gists/' + state.gistId, {
      headers: { 'X-GitHub-Api-Version': '2022-11-28' }
    });
    if (!resp.ok) {
      console.log('JJS Sync: fetch failed', resp.status, resp.statusText);
      return false;
    }
    const gist = await resp.json();
    const fileContent = gist.files['jjs-planner-sync.json']?.content;
    if (!fileContent) {
      console.log('JJS Sync: jjs-planner-sync.json not found in Gist');
      return false;
    }
    const payload = JSON.parse(fileContent);
    if (!payload._syncVersion) {
      console.log('JJS Sync: invalid payload');
      return false;
    }
    console.log('JJS Sync: loaded payload pushed at', payload._pushedAt);

    // Load project list and data into store cache (in-memory only for web)
    if (payload._projectList) {
      localStorage.setItem(globalKey('projectList'), JSON.stringify(payload._projectList));
    }
    if (payload._projectData) {
      for (const [projId, fields] of Object.entries(payload._projectData)) {
        for (const [k, v] of Object.entries(fields)) {
          localStorage.setItem(projKey(projId, k), JSON.stringify(v));
        }
      }
    }
    if (payload._activeProjectId) {
      localStorage.setItem(globalKey('activeProject'), JSON.stringify(payload._activeProjectId));
      state._activeProjectId = payload._activeProjectId;
    }
    if (payload.notionDbId) localStorage.setItem(globalKey('notionDbId'), JSON.stringify(payload.notionDbId));

    // Reload state from the freshly populated store
    loadState();
    applyTheme(state.currentTheme || 'airy');
    updateHeaderProject();
    renderMain();
    renderSide();

    const banner = document.getElementById('sync-loaded-banner');
    if (banner) {
      banner.textContent = 'Synced from desktop · ' + new Date(payload._pushedAt).toLocaleString();
      banner.style.display = 'block';
      setTimeout(() => { banner.style.display = 'none'; }, 4000);
    }
    return true;
  } catch(e) {
    console.error('Gist fetch failed:', e);
    return false;
  }
}

async function syncGistNow() {
  const statusEl = document.getElementById('gist-sync-status');
  if (statusEl) { statusEl.style.color = 'var(--muted)'; statusEl.textContent = 'Pushing...'; }
  await pushToGist(false);
  if (currentPane === 'config') renderMain();
}

function saveGistToken() {
  const tokenInput = document.getElementById('gist-token-input')?.value.trim();
  const idInput    = document.getElementById('gist-id-input')?.value.trim();
  if (idInput) { state.gistId = idInput; }
  if (!tokenInput) { saveState(); renderMain(); return; }
  state.gistToken = tokenInput;
  const hasCreds = state._hasEncryptedSecret || state._hasEncryptedToken ||
                   state._hasEncryptedNotionKey || state._hasEncryptedAnthropicKey ||
                   state._hasEncryptedAdminKey   || state._hasEncryptedGistToken;
  if (hasCreds) {
    const savedPw = getSavedPassword();
    if (savedPw) {
      saveEncryptedCreds(savedPw).then(() => { saveState(); renderMain(); });
    } else {
      showPasswordModal('enter', async (pw) => {
        await loadEncryptedCreds(pw);
        state.gistToken = tokenInput;
        await saveEncryptedCreds(pw);
        saveState(); renderMain();
      });
    }
  } else {
    showPasswordModal('set', async (pw) => {
      await saveEncryptedCreds(pw);
      saveState(); renderMain();
    });
  }
}

async function initApp() {
  await initStoreCache();
  migrateIfNeeded();
  let projects = getProjectList();
  if (projects.length === 0) {
    const id = generateProjectId();
    projects = [{ id, name: 'My Project', created: new Date().toISOString() }];
    saveProjectList(projects);
    setActiveProjectId(id);
  }
  state._activeProjectId = getActiveProjectId() || projects[0].id;
  setActiveProjectId(state._activeProjectId);
  loadState();
  for (const k of GLOBAL_FIELDS) {
    const v = retrieve(globalKey(k));
    if (v !== null) state[k] = v;
  }
  state._hasEncryptedSecret       = !!(isElectron ? _storeCache[globalKey('enc_clientSecret')]      : localStorage.getItem(globalKey('enc_clientSecret')));
  state._hasEncryptedToken        = !!(isElectron ? _storeCache[globalKey('enc_refreshToken')]       : localStorage.getItem(globalKey('enc_refreshToken')));
  state._hasEncryptedNotionKey    = !!(isElectron ? _storeCache[globalKey('enc_notionApiKey')]       : localStorage.getItem(globalKey('enc_notionApiKey')));
  state._hasEncryptedAnthropicKey = !!(isElectron ? _storeCache[globalKey('enc_anthropicKey')]       : localStorage.getItem(globalKey('enc_anthropicKey')));
  state._hasEncryptedAdminKey     = !!(isElectron ? _storeCache[globalKey('enc_anthropicAdminKey')] : localStorage.getItem(globalKey('enc_anthropicAdminKey')));
  state._hasEncryptedGistToken    = !!(isElectron ? _storeCache[globalKey('enc_gistToken')]          : localStorage.getItem(globalKey('enc_gistToken')));
  applyTheme(state.currentTheme || 'airy');
  const _todayEl = document.getElementById('today-display');
  if (_todayEl) _todayEl.textContent = DAYS_SHORT[TODAY.getDay()] + ' ' + MONTHS[TODAY.getMonth()] + ' ' + TODAY.getDate() + ', ' + TODAY.getFullYear();
  updateHeaderProject();
  showPane('overview');
  renderSide();
  initDocxWatcher();
  // On non-Electron (mobile/web), try to load synced data from Gist
  // fetchFromGist() also checks the ?gist= URL parameter so no pre-check needed
  if (!isElectron) {
    fetchFromGist().catch(e => console.error('JJS Sync fetch error:', e));
  }
  if (state._hasEncryptedSecret || state._hasEncryptedToken || state._hasEncryptedNotionKey || state._hasEncryptedAnthropicKey || state._hasEncryptedAdminKey) {
    const savedPw = getSavedPassword();
    if (savedPw) {
      await loadEncryptedCreds(savedPw);
      renderSide();
    } else {
      const hasPersisted = !!(isElectron ? _storeCache[PW_PERSIST_KEY] : localStorage.getItem(PW_PERSIST_KEY));
      showPasswordModal('enter', async (pw) => {
        const ok = await loadEncryptedCreds(pw);
        if (!ok) { alert('Incorrect password.'); }
        renderSide();
        if (currentPane === 'config') renderMain();
        if (currentPane === 'ai') renderMain();
      });
    }
  }
  window.addEventListener('beforeunload', () => {
    if (state.alexaEnabled && state.alexaRefreshToken && (state.lastAccomplished || state.lastPlan)) {
      sendAlexaEmail(false);
    }
    if (state.notionSyncOnClose && state.notionApiKey && state.notionDbId) {
      pushToNotion(false).catch(() => {});
    }
    if (isElectron && state.gistAutoSync && state.gistToken && state.gistId) {
      pushToGist(true).catch(() => {});
    }
  });
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target===this) closeModal();
  });

  // Belt-and-suspenders fix for Electron number input focus bug:
  // After innerHTML re-renders, number inputs can lose keyboard input.
  // Intercept mousedown in capture phase and explicitly focus the target.
  if (isElectron) {
    document.addEventListener('mousedown', function(e) {
      const el = e.target;
      if (el && el.tagName === 'INPUT' && el.type === 'number') {
        setTimeout(() => { el.focus(); }, 0);
      }
    }, true);
  }
} // end initApp

function saveNotionCreds() {
  const keyInput = document.getElementById('notion-api-key')?.value.trim() || '';
  const dbInput  = document.getElementById('notion-db-id')?.value.trim()  || '';
  if (dbInput) state.notionDbId = dbInput;
  if (keyInput) {
    state.notionApiKey = keyInput;
    if (state._hasEncryptedSecret || state._hasEncryptedToken || state._hasEncryptedNotionKey) {
      const savedPw = getSavedPassword();
      if (savedPw) {
        saveEncryptedCreds(savedPw).then(() => { saveState(); renderMain(); });
      } else {
        showPasswordModal('enter', async (pw) => {
          await loadEncryptedCreds(pw);
          state.notionApiKey = keyInput;
          await saveEncryptedCreds(pw);
          saveState(); renderMain();
        });
      }
    } else {
      showPasswordModal('set', async (pw) => {
        await saveEncryptedCreds(pw);
        saveState(); renderMain();
      });
    }
  } else {
    saveState(); renderMain();
  }
}

async function handleNotionSync() {
  await pushToNotion(true);
  if (currentPane === 'config') renderMain();
}

function handleNotionDownload() {
  const summary = downloadNotionExport();
  const statusEl = document.getElementById('notion-sync-status');
  if (statusEl) { statusEl.style.color = 'var(--green-done)'; statusEl.textContent = 'Downloaded: ' + summary; }
}

async function handleNotionCopy() {
  const ok = await copyNotionExport();
  const statusEl = document.getElementById('notion-sync-status');
  if (statusEl) {
    statusEl.style.color = ok ? 'var(--green-done)' : 'var(--red-dead)';
    statusEl.textContent = ok ? 'Copied to clipboard' : 'Copy failed - try Download instead';
  }
}

initApp();
