        (lastDay?.accomplished ? '<div class="overview-hero-text" style="font-size:.88rem;opacity:.85">' + lastDay.accomplished + '</div>' : (!lastDay ? '<div class="overview-hero-text"><em style="opacity:.5">No sessions logged yet.</em></div>' : '')) +
      '</div>' +
      '<div class="overview-hero-plan">' +
        '<div class="overview-hero-label">Today&#39;s Plan</div>' +
        '<div class="overview-hero-text">' + (state.lastPlan || '<em style="opacity:.5">No plan set.</em>') + '</div>' +
      '</div>' +
    '</div>' +
  '</div>' +
  catoHtml;

  // ── Stats section ──────────────────────────────────────────────
  const twHrs   = hoursForWeek(thisWeekStart);
  const twPages = pagesForWeek(thisWeekStart);
  const twWords = wordsForWeek(thisWeekStart);

  function statBlock(title, hrs, pages, words, muted) {
    const empty = hrs === 0 && pages === 0 && words === 0;
    return `<div class="overview-stats" style="flex:1;min-width:0">
      <div class="ov-stat-title" style="color:${muted?'var(--muted)':'var(--ink)'}">${title}</div>
      ${empty ? `<div style="font-size:.78rem;color:var(--muted);padding:4px 0;font-style:italic">No data yet.</div>` : ''}
      ${hrs > 0 ? `<div class="ov-stat-row">
        <span class="ov-stat-label">Hours</span>
        <span class="ov-stat-val">${hrs.toFixed(1)}</span>
        <span class="ov-stat-sub">hrs</span>
      </div>` : ''}
      ${pages > 0 ? `<div class="ov-stat-row">
        <span class="ov-stat-label">Pages</span>
        <span class="ov-stat-val" style="color:var(--teal)">${pages}</span>
        <span class="ov-stat-sub">pages</span>
      </div>` : ''}
      ${words > 0 ? `<div class="ov-stat-row">
        <span class="ov-stat-label">Words</span>
        <span class="ov-stat-val" style="color:var(--blue)">${words.toLocaleString()}</span>
        <span class="ov-stat-sub">words</span>
      </div>` : ''}
    </div>`;
  }

  const statsHtml = `<div style="display:flex;gap:14px;flex-wrap:wrap">
    ${statBlock('Last Week', lwHrs, lwPages, lwWords, true)}
    ${statBlock('This Week', twHrs, twPages, twWords, false)}
  </div>`;

  // ── Timeline section ───────────────────────────────────────────
  const tlHtml = (nextDl || nextMtg) ? `<div class="overview-timeline">
    <div class="ov-tl-title">Coming Up <span style="font-family:'DM Mono',monospace;font-size:.62rem;font-weight:400;color:var(--muted);letter-spacing:.06em">— next 60 days</span></div>
    <div class="ov-tl-events">

      <!-- Today anchor -->
      <div class="ov-tl-event">
        <div class="ov-tl-spine">
          <div class="ov-tl-node node-today"></div>
          <div class="ov-tl-connector"></div>
        </div>
        <div class="ov-tl-content">
          <div class="ov-tl-event-name" style="font-size:.78rem;font-weight:600">Today</div>
          <div class="ov-tl-event-meta meta-today">${DAYS_SHORT[TODAY.getDay()]}, ${MONTHS[TODAY.getMonth()]} ${TODAY.getDate()}</div>
        </div>
      </div>

      ${tlEvents.map((ev, i) => `
      <div class="ov-tl-event">
        <div class="ov-tl-spine">
          <div class="ov-tl-node ${ev.type==='dl'?'node-dl':'node-mtg'}"></div>
          ${i < tlEvents.length - 1 ? '<div class="ov-tl-connector"></div>' : ''}
        </div>
        <div class="ov-tl-content">
          <div class="ov-tl-event-label">${ev.type==='dl' ? 'Deadline' : 'Meeting'}</div>
          <div class="ov-tl-event-name">${ev.name.slice(0, 40)}${ev.name.length > 40 ? '…' : ''}</div>
          <div class="ov-tl-event-meta ${ev.type==='dl'?'meta-dl':'meta-mtg'}">
            ${ev.date} &nbsp;·&nbsp; in ${ev.daysAway} day${ev.daysAway!==1?'s':''}
            ${ev.pendingActions>0?` &nbsp;·&nbsp; ${ev.pendingActions} action${ev.pendingActions!==1?'s':''} pending`:''}
          </div>
        </div>
      </div>`).join('')}

    </div>
  </div>` : '';

  mp.innerHTML = `<div class="overview-wrap">
    ${heroHtml}
    <div class="overview-grid">
      ${tlHtml ? `<div style="grid-column:1/-1">${tlHtml}</div>` : ''}
      <div style="grid-column:1/-1">${statsHtml}</div>
    </div>
    <div class="card overview-week" style="margin-bottom:18px">
      <div style="font-family:'Lato',sans-serif;font-size:.88rem;font-weight:700;color:var(--ink);margin-bottom:14px">
        This Week &nbsp;<span style="font-family:'DM Mono',monospace;font-size:.68rem;font-weight:400;color:var(--muted)">${MONTHS[thisWeekStart.getMonth()]} ${thisWeekStart.getDate()} – ${MONTHS[addDays(thisWeekStart,6).getMonth()]} ${addDays(thisWeekStart,6).getDate()}</span>
      </div>
      <div class="week-grid">${weekHtml}</div>
      <div class="week-total" style="margin-top:10px">
        <span style="color:var(--muted)">This Week</span>
        <span>${twHrs.toFixed(1)} hrs worked</span>
        ${twPages>0?`<span style="color:var(--teal)">${twPages} pages read</span>`:''}
        ${twWords>0?`<span style="color:var(--blue)">${twWords.toLocaleString()} words written</span>`:''}
      </div>
    </div>
    <div class="card overview-week" style="margin-bottom:0">
      <div style="font-family:'Lato',sans-serif;font-size:.88rem;font-weight:700;color:var(--ink);margin-bottom:14px">
        Next Week &nbsp;<span style="font-family:'DM Mono',monospace;font-size:.68rem;font-weight:400;color:var(--muted)">${nwLabel}</span>
      </div>
      <div class="week-grid">${nextWeekHtml}</div>
    </div>
  </div>`;
}

// ===================== SESSION PANE =====================
function buildBookOptions(selectedId) {
  const books = state.books || [];
  let opts = '<option value="">Select a book...</option>';
  books.forEach(b => {
    opts += '<option value="' + b.id + '"' + (b.id === selectedId ? ' selected' : '') + '>' + b.title + '</option>';
  });
  opts += '<option value="__new__">+ Add new book...</option>';
  return opts;
}

function buildWritingProjectOptions(selectedId) {
  const projects = state.writingProjects || [];
  const mainTitle = (function(){ const p = getProjectList().find(p=>p.id===state._activeProjectId); return p ? p.name : 'Main Project'; })();
  let opts = '<option value="main"' + (selectedId === 'main' || !selectedId ? ' selected' : '') + '>' + mainTitle + '</option>';
  projects.forEach(p => {
    opts += '<option value="' + p.id + '"' + (p.id === selectedId ? ' selected' : '') + '>' + p.title + '</option>';
  });
  opts += '<option value="__new__">+ Add new project...</option>';
  return opts;
}

function renderSession(mp) {
  const has = state.lastAccomplished || state.lastPlan;
  const clear = state._sessionInputClear;

  // Build reading rows from previous session if not clearing
  const prevReading = clear ? [] : (state.days[todayKey()]?.reading || []);
  const prevWriting = clear ? [] : (state.days[todayKey()]?.writing || []);

  const readingRows = (prevReading.length > 0 ? prevReading : [{}]).map((r, i) => buildReadingRowHtml(i, r)).join('');
  const writingRows = (prevWriting.length > 0 ? prevWriting : [{}]).map((r, i) => buildWritingRowHtml(i, r)).join('');

  mp.innerHTML = `
    <div class="section-title">Logbook</div>
    ${has ? `<div class="session-readout">
      <div class="hr-badge">${state.lastHours ? state.lastHours+'h' : '—'}</div>
      <div class="tag">Last Session</div>
      ${(() => {
        const chips = [];
        const lastKey = Object.keys(state.days||{}).sort().reverse().find(k => state.days[k]?.hours || (state.days[k]?.reading||[]).length || (state.days[k]?.writing||[]).length);
        const ld = lastKey ? state.days[lastKey] : null;
        if (ld?.hours) chips.push(ld.hours + 'h worked');
        (ld?.reading||[]).forEach(r => { if(r.pagesRead) chips.push(r.pagesRead + ' pp — ' + (r.bookTitle||'reading')); });
        (ld?.writing||[]).forEach(w => { if(w.wordsWritten) chips.push(Number(w.wordsWritten).toLocaleString() + ' words — ' + (w.projectTitle||'writing')); });
        return chips.length ? '<p style="font-size:.82rem;opacity:.8">' + chips.join(' &nbsp;·&nbsp; ') + '</p>' : '';
      })()}
      ${state.lastAccomplished ? '<p style="margin-top:4px"><em style="opacity:.7">Reflection:</em> ' + state.lastAccomplished + '</p>' : ''}
      <div class="tag" style="margin-top:14px">Today&#39;s Plan</div>
      <p>${state.lastPlan || '<em style="opacity:.6">Nothing recorded.</em>'}</p>
    </div>` : `<div class="session-readout" style="opacity:.7">
      <div class="tag">No Previous Session Found</div>
      <p>Log your first session below to get started.</p>
    </div>`}
    <div class="card">
      <h3>Log This Session</h3>

      <label>Hours worked</label>
      <input type="number" id="inp-hours" min="0" max="24" step="0.25" placeholder="e.g. 2.5" value="${clear ? '' : (state.lastHours||'')}">

      <div style="margin-top:18px;padding-top:16px;border-top:1px solid var(--border)">
        <div style="font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Reading</div>
        <div id="reading-rows">${readingRows}</div>
        <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="addSessionReadingRow()">+ Add book</button>
      </div>

      <div style="margin-top:18px;padding-top:16px;border-top:1px solid var(--border)">
        <div style="font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Writing</div>
        <div id="writing-rows">${writingRows}</div>
        <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="addSessionWritingRow()">+ Add project</button>
      </div>

      <div style="margin-top:18px;padding-top:16px;border-top:1px solid var(--border)">
        <label style="margin-top:0">Reflections</label>
        <textarea id="inp-accomplished" placeholder="Notes, insights, or observations about this session…">${clear ? '' : (state.lastAccomplished||'')}</textarea>
        <label>What do you plan to do next time?</label>
        <textarea id="inp-plan" placeholder="Your goals for next session…">${clear ? '' : (state.lastPlan||'')}</textarea>
      </div>

      <button class="btn" style="margin-top:16px" onclick="saveSession()">Save Session</button>
    </div>`;
}

function buildReadingRowHtml(i, data) {
  data = data || {};
  const bookSel = buildBookOptions(data.bookId);
  const isNew = data.bookId === '__new__';
  return '<div class="session-entry-row" id="reading-row-' + i + '">' +
    '<div style="display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;margin-bottom:6px">' +
      '<select id="reading-book-' + i + '" onchange="onReadingBookChange(' + i + ')" style="flex:2;min-width:160px">' + bookSel + '</select>' +
      '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">' +
        '<input type="number" id="reading-pages-' + i + '" min="0" placeholder="pages read" value="' + (data.pagesRead||'') + '" style="width:100px">' +
        '<button class="btn btn-ghost btn-sm" style="margin-top:0;padding:4px 8px" onclick="removeSessionRow(\'reading-row-' + i + '\')">×</button>' +
      '</div>' +
    '</div>' +
    '<div id="reading-new-' + i + '" style="display:' + (isNew?'flex':'none') + ';gap:8px;margin-bottom:6px;flex-wrap:wrap">' +
      '<input type="text" id="reading-new-title-' + i + '" placeholder="Book title" style="flex:2;min-width:140px">' +
      '<input type="number" id="reading-new-totalpages-' + i + '" placeholder="Total pages" style="width:110px">' +
    '</div>' +
  '</div>';
}

function buildWritingRowHtml(i, data) {
  data = data || {};
  const projSel = buildWritingProjectOptions(data.projectId);
  const isNew = data.projectId === '__new__';
  return '<div class="session-entry-row" id="writing-row-' + i + '">' +
    '<div style="display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;margin-bottom:6px">' +
      '<select id="writing-project-' + i + '" onchange="onWritingProjectChange(' + i + ')" style="flex:2;min-width:160px">' + projSel + '</select>' +
      '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">' +
        '<input type="number" id="writing-words-' + i + '" min="0" placeholder="words written" value="' + (data.wordsWritten||'') + '" style="width:120px">' +
        '<button class="btn btn-ghost btn-sm" style="margin-top:0;padding:4px 8px" onclick="removeSessionRow(\'writing-row-' + i + '\')">×</button>' +
      '</div>' +
    '</div>' +
    '<div id="writing-new-' + i + '" style="display:' + (isNew?'flex':'none') + ';gap:8px;margin-bottom:6px;flex-wrap:wrap">' +
      '<input type="text" id="writing-new-title-' + i + '" placeholder="Project title" style="flex:2;min-width:140px">' +
      '<input type="number" id="writing-new-goal-' + i + '" placeholder="Word count goal" style="width:140px">' +
    '</div>' +
  '</div>';
}

function addSessionReadingRow() {
  const container = document.getElementById('reading-rows');
  if (!container) return;
  const idx = container.querySelectorAll('.session-entry-row').length;
  const div = document.createElement('div');
  div.innerHTML = buildReadingRowHtml(idx, {});
  container.appendChild(div.firstElementChild);
}

function addSessionWritingRow() {
  const container = document.getElementById('writing-rows');
  if (!container) return;
  const idx = container.querySelectorAll('.session-entry-row').length;
  const div = document.createElement('div');
  div.innerHTML = buildWritingRowHtml(idx, {});
  container.appendChild(div.firstElementChild);
}

function removeSessionRow(rowId) {
  const el = document.getElementById(rowId);
  if (el) el.remove();
}

function onReadingBookChange(i) {
  const sel = document.getElementById('reading-book-' + i);
  const newDiv = document.getElementById('reading-new-' + i);
  if (newDiv) newDiv.style.display = sel?.value === '__new__' ? 'flex' : 'none';
}

function onWritingProjectChange(i) {
  const sel = document.getElementById('writing-project-' + i);
  const newDiv = document.getElementById('writing-new-' + i);
  if (newDiv) newDiv.style.display = sel?.value === '__new__' ? 'flex' : 'none';
}

function saveSession() {
  const acc  = (document.getElementById('inp-accomplished')?.value || '').trim();
  const hrs  = (document.getElementById('inp-hours')?.value || '').trim();
  const plan = (document.getElementById('inp-plan')?.value || '').trim();

  // Collect reading entries
  const reading = [];
  const readingRows = document.querySelectorAll('#reading-rows .session-entry-row');
  readingRows.forEach((row, i) => {
    const bookSel   = document.getElementById('reading-book-' + i);
    const pagesEl   = document.getElementById('reading-pages-' + i);
    const pages = parseInt(pagesEl?.value) || 0;
    if (!bookSel || (!bookSel.value && !pages)) return;
    if (bookSel.value === '__new__') {
      // Create a new book
      const titleEl = document.getElementById('reading-new-title-' + i);
      const totEl   = document.getElementById('reading-new-totalpages-' + i);
      const title = titleEl?.value.trim();
      if (!title) return;
      if (!state.books) state.books = [];
      const newBook = { id: Date.now().toString(36) + i, title, currentPage: pages, totalPages: parseInt(totEl?.value)||0 };
      state.books.push(newBook);
      if (pages > 0) reading.push({ bookId: newBook.id, bookTitle: title, pagesRead: pages });
    } else if (bookSel.value && pages > 0) {
      const book = state.books?.find(b => b.id === bookSel.value);
      reading.push({ bookId: bookSel.value, bookTitle: book?.title || bookSel.value, pagesRead: pages });
    }
  });

  // Collect writing entries
  const writing = [];
  const writingRows = document.querySelectorAll('#writing-rows .session-entry-row');
  writingRows.forEach((row, i) => {
    const projSel  = document.getElementById('writing-project-' + i);
    const wordsEl  = document.getElementById('writing-words-' + i);
    const words = parseInt(wordsEl?.value) || 0;
    if (!projSel || (!projSel.value && !words)) return;
    if (projSel.value === '__new__') {
      const titleEl = document.getElementById('writing-new-title-' + i);
      const goalEl  = document.getElementById('writing-new-goal-' + i);
      const title = titleEl?.value.trim();
      if (!title) return;
      if (!state.writingProjects) state.writingProjects = [];
      const newProj = { id: Date.now().toString(36) + 'w' + i, title, wcGoal: parseInt(goalEl?.value)||0, wcCurrent: words, docxPath: '' };
      state.writingProjects.push(newProj);
      if (words > 0) writing.push({ projectId: newProj.id, projectTitle: title, wordsWritten: words });
    } else {
      const pid = projSel.value || 'main';
      let title = pid === 'main'
        ? (getProjectList().find(p=>p.id===state._activeProjectId)?.name || 'Main Project')
        : (state.writingProjects?.find(p=>p.id===pid)?.title || pid);
      if (words > 0) writing.push({ projectId: pid, projectTitle: title, wordsWritten: words });
    }
  });

  // Require at least something
  if (!acc && !plan && !hrs && reading.length === 0 && writing.length === 0) {
    alert('Please enter at least something for this session.');
    return;
  }

  state.lastAccomplished = acc;
  state.lastHours = hrs;
  state.lastPlan  = plan;

  const key = todayKey();
  if (!state.days[key]) state.days[key] = { goals: [] };
  state.days[key].accomplished = acc;
  state.days[key].hours        = hrs;
  state.days[key].reading      = reading;
  state.days[key].writing      = writing;

  // Update main project word count from writing entries
  const mainWords = writing.filter(e => e.projectId === 'main').reduce((t,e) => t+(e.wordsWritten||0), 0);
  if (mainWords > 0) state.wcCurrent = (state.wcCurrent || 0) + mainWords;

  // Update additional writing project totals
  (state.writingProjects || []).forEach(proj => {
    const projWords = writing.filter(e => e.projectId === proj.id).reduce((t,e) => t+(e.wordsWritten||0), 0);
    if (projWords > 0) proj.wcCurrent = (proj.wcCurrent || 0) + projWords;
  });

  saveState();
  state._sessionInputClear = true;
  renderMain(); renderSide();
  state._sessionInputClear = false;
}

// ===================== CALENDAR PANE =====================
function renderCalendar(mp) {
  const wpd = wordsPerDay();
  mp.innerHTML = `
    <div class="cal-controls">
      <div class="view-btns">
        ${['week','month','year'].map((v,i)=>`<button class="${state.calView===v?'active':''}" onclick="setCalView('${v}')">${['Week','Month','Year'][i]}</button>`).join('')}
      </div>
      <div class="cal-nav">
        <button onclick="calNav(-1)">&#8592;</button>
        <div class="cal-label" id="cal-label"></div>
        <button onclick="calNav(1)">&#8594;</button>
        <button onclick="calGoToday()" style="font-size:.65rem;font-family:'DM Mono',monospace;letter-spacing:.08em;padding:0 8px;width:auto;">Today</button>
      </div>
    </div>
    <div id="cal-body"></div>
    <div id="cal-footer" style="margin-top:8px"></div>`;
  renderCalBody(wpd);
}

function setCalView(v) { state.calView=v; renderCalendar(document.getElementById('main-pane')); }
function calNav(dir) {
  const d=state.calDate;
  if(state.calView==='week') d.setDate(d.getDate()+dir*7);
  else if(state.calView==='month') d.setMonth(d.getMonth()+dir);
  else if(state.calView==='year') d.setFullYear(d.getFullYear()+dir);
  else d.setFullYear(d.getFullYear()+dir*5);
  renderCalendar(document.getElementById('main-pane'));
}
function calGoToday() { state.calDate=new Date(TODAY); renderCalendar(document.getElementById('main-pane')); }

function renderCalBody(wpd) {
  const v=state.calView, d=state.calDate;
  const label=document.getElementById('cal-label');
  const body=document.getElementById('cal-body');
  const footer=document.getElementById('cal-footer');
  if (v==='week') {
    const ws=getWeekStart(d);
    label.textContent=`${MONTHS[ws.getMonth()]} ${ws.getDate()} – ${MONTHS[addDays(ws,6).getMonth()]} ${addDays(ws,6).getDate()}, ${ws.getFullYear()}`;
    body.innerHTML=`<div class="week-grid">${Array.from({length:7},(_,i)=>renderWeekDay(addDays(ws,i))).join('')}</div>`;
    const wt=wpd?(wpd*7).toFixed(0):null;
    const wkPages=pagesForWeek(ws); const wkWords=wordsForWeek(ws);
    footer.innerHTML=`<div class="week-total">
      <span style="color:var(--muted)">Week Total</span>
      <span>${hoursForWeek(ws).toFixed(1)} hrs worked</span>
      ${wkPages>0?`<span style="color:var(--teal)">${wkPages} pages read</span>`:''}
      ${wkWords>0?`<span style="color:var(--blue)">${wkWords.toLocaleString()} words written</span>`:''}
    </div>${wt?`<div class="words-week">Words needed this week: <span>${Number(wt).toLocaleString()}</span></div>`:''}`;
  } else if (v==='month') {
    label.textContent=`${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    renderMonthView(body, d.getFullYear(), d.getMonth());
    const dim=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    const wt=wpd?(wpd*dim).toFixed(0):null;
    const moPages=pagesForMonth(d.getFullYear(),d.getMonth()); const moWords=wordsForMonth(d.getFullYear(),d.getMonth());
    footer.innerHTML=`<div class="month-summary">
      <span style="color:var(--muted)">Month Total</span>
      <span>${hoursForMonth(d.getFullYear(),d.getMonth()).toFixed(1)} hrs worked</span>
      ${moPages>0?`<span style="color:var(--teal)">${moPages} pages read</span>`:''}
      ${moWords>0?`<span style="color:var(--blue)">${moWords.toLocaleString()} words written</span>`:''}
    </div>${wt?`<div class="words-week">Words needed this month: <span>${Number(wt).toLocaleString()}</span></div>`:''}`;
  } else if (v==='year') {
    label.textContent=String(d.getFullYear());
    renderYearView(body, d.getFullYear());
    const yrPages=pagesForYear(d.getFullYear()); const yrWords=wordsForYear(d.getFullYear());
    footer.innerHTML=`<div class="month-summary">
      <span style="color:var(--muted)">Year Total</span>
      <span>${hoursForYear(d.getFullYear()).toFixed(1)} hrs worked</span>
      ${yrPages>0?`<span style="color:var(--teal)">${yrPages} pages read</span>`:''}
      ${yrWords>0?`<span style="color:var(--blue)">${yrWords.toLocaleString()} words written</span>`:''}
    </div>`;
  }
}

function renderWeekDay(day) {
  const key=fmtKey(day), isToday=key===todayKey(), isPast=day<TODAY;
  const entry=state.days[key]||{}, goals=entry.goals||[], hrs=entry.hours?`${entry.hours}h`:'';
  // Gather deadlines and meetings on this day
  const dayDls = state.deadlines.filter(dl=>dl.date===key);
  const isFinal = state.finalDeadline===key;
  const dayMtgs = (state.meetings||[]).filter(m=>m.date===key);
  let content='';
  if (isPast||isToday) {
    content=entry.accomplished
      ?`<div class="day-content">${entry.accomplished.slice(0,80)}${entry.accomplished.length>80?'…':''}</div>`
      :`<div class="day-content" style="opacity:.4">No entry</div>`;
  } else {
    content=goals.length
      ?goals.map(g=>`<div class="goal-item"${typeof g==='object'&&g.done?' style="text-decoration:line-through;opacity:.5"':''}>${(typeof g==='string'?g:g.text).slice(0,40)}</div>`).join('')
      :`<div class="day-content" style="opacity:.3">No goals</div>`;
  }
  const dlChips = [
    ...(isFinal ? [`<div class="deadline-chip final">★ Final Deadline</div>`] : []),
    ...dayDls.map(dl=>`<div class="deadline-chip ${dl.complete?'complete':'incomplete'}">
      ${dl.complete?'✓':'!'} ${dl.desc.slice(0,22)}${dl.desc.length>22?'…':''}
    </div>`)
  ].join('');
  const mtgChips = dayMtgs.map(m=>`<div class="meeting-chip">
    📋 ${(m.supervisor||'Meeting').slice(0,22)}${(m.supervisor||'').length>22?'…':''}
  </div>`).join('');
  const pgs = pagesForDay(key); const wds = wordsForDay(key);
  return `<div class="week-day${isToday?' today':''}${isPast?' past':''}" onclick="openDayModal('${key}')">
    <div class="day-name-num">
      <div class="day-name">${DAYS_SHORT[day.getDay()]}</div>
      <div class="day-num">${day.getDate()}</div>
    </div>
    <div class="day-right">
      ${hrs?`<div class="day-hours">${hrs} worked</div>`:''}
      ${pgs>0?`<div class="day-hours" style="color:var(--teal)">${pgs} pg read</div>`:''}
      ${wds>0?`<div class="day-hours" style="color:var(--blue)">${wds.toLocaleString()} wds</div>`:''}
      ${content}${dlChips}${mtgChips}
    </div>
  </div>`;
}

function renderMonthView(body, year, month) {
  const firstDay=new Date(year,month,1).getDay(), dim=new Date(year,month+1,0).getDate(), prev=new Date(year,month,0).getDate();
  let cells=DAYS_SHORT.map(d=>`<div class="month-header-cell">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++) cells+=`<div class="month-day other-month"><div class="md-num">${prev-firstDay+1+i}</div></div>`;
  for(let d=1;d<=dim;d++) {
    const k=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hrs=hoursForDay(k);
    const dayDls=state.deadlines.filter(dl=>dl.date===k);
    const isFinal=state.finalDeadline===k;
    const dayMtgs=(state.meetings||[]).filter(m=>m.date===k);
    // Build dot row
    const dots=[
      ...(isFinal?[`<div class="dl-dot final" title="Final Deadline"></div>`]:[]),
      ...dayDls.map(dl=>`<div class="dl-dot ${dl.complete?'complete':'incomplete'}" title="${dl.desc}"></div>`),
      ...dayMtgs.map(m=>`<div class="mtg-dot" title="Meeting: ${m.supervisor||'Meeting'}"></div>`)
    ].join('');
    // First label (deadline takes priority over meeting)
    const firstDl = isFinal ? '★ Final' : dayDls.length ? dayDls[0].desc.slice(0,14)+(dayDls[0].desc.length>14?'…':'') : dayMtgs.length ? '📋 '+(dayMtgs[0].supervisor||'Meeting').slice(0,12) : '';
    const labelCls = isFinal ? 'md-label final' : 'md-label';
    cells+=`<div class="month-day${k===todayKey()?' today':''}" onclick="jumpToWeek('${k}')">
      <div class="md-num">${d}</div>
      ${hrs>0?`<div class="md-hours">${hrs}h</div>`:''}
      ${pagesForDay(k)>0?`<div class="md-hours" style="color:var(--teal)">${pagesForDay(k)}pg</div>`:''}
      ${wordsForDay(k)>0?`<div class="md-hours" style="color:var(--blue)">${wordsForDay(k)}w</div>`:''}
      ${dots?`<div class="dl-dots">${dots}</div>`:''}
      ${firstDl?`<div class="${labelCls}">${firstDl}</div>`:''}
    </div>`;
  }
  const rem=(7-(firstDay+dim)%7)%7;
  for(let i=1;i<=rem;i++) cells+=`<div class="month-day other-month"><div class="md-num">${i}</div></div>`;
  body.innerHTML=`<div class="month-grid">${cells}</div>`;
}
function jumpToWeek(key) { state.calDate=new Date(parseKey(key)); state.calView='week'; renderCalendar(document.getElementById('main-pane')); }
function jumpToMonth(year, month) { state.calDate=new Date(year,month,1); state.calView='month'; renderCalendar(document.getElementById('main-pane')); }

function renderYearView(body, year) {
  const DS2 = ['S','M','T','W','T','F','S'];
  // Collect deadline dates for highlight
  const dlDates = new Set(state.deadlines.filter(dl=>dl.date).map(dl=>dl.date));
  const finalDate = state.finalDeadline || '';

  const monthCards = Array.from({length:12}, (_, m) => {
    const firstDay = new Date(year, m, 1).getDay();
    const dim = new Date(year, m+1, 0).getDate();
    const prev = new Date(year, m, 0).getDate();
    const hrs = hoursForMonth(year, m).toFixed(1);

    let cells = DS2.map(d=>`<div class="ymm-dow">${d}</div>`).join('');
    // prev month filler
    for(let i=0;i<firstDay;i++) cells+=`<div class="ymm-cell other">${prev-firstDay+1+i}</div>`;
    // current month days
    for(let d=1;d<=dim;d++){
      const k=`${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = k===todayKey();
      const hasHrs = hoursForDay(k) > 0;
      const isDl = dlDates.has(k) || k===finalDate;
      const hasMtg = (state.meetings||[]).some(m=>m.date===k);
      let cls = 'ymm-cell';
      if(isToday) cls+=' is-today';
      else if(isDl) cls+=' has-deadline';
      else if(hasMtg) cls+=' has-meeting';
      else if(hasHrs) cls+=' has-hours';
      cells+=`<div class="${cls}" title="${hasMtg?'Meeting':''}">${d}</div>`;
    }
    // trailing filler
    const rem=(7-(firstDay+dim)%7)%7;
    for(let i=1;i<=rem;i++) cells+=`<div class="ymm-cell other">${i}</div>`;

    return `<div class="year-mini-month" onclick="jumpToMonth(${year},${m})" style="cursor:pointer" title="View ${MONTHS[m]} ${year}">
      <div class="ymm-header">
        <span class="ymm-name">${MONTHS[m]}</span>
        <span class="ymm-hours">${hrs}h${pagesForMonth(year,m)>0?' · '+pagesForMonth(year,m)+'pg':''}${wordsForMonth(year,m)>0?' · '+wordsForMonth(year,m).toLocaleString()+'w':''}</span>
      </div>
      <div class="ymm-grid">${cells}</div>
    </div>`;
  });

  const dls=state.deadlines.filter(dl=>dl.date&&new Date(dl.date).getFullYear()===year);
  const finalDl=state.finalDeadline&&new Date(state.finalDeadline).getFullYear()===year;
  let dlHtml='';
  if(finalDl||dls.length) dlHtml=`<div style="margin-top:24px"><div class="section-title" style="font-size:1rem;margin-bottom:10px">Deadlines ${year}</div>
    ${finalDl?`<div class="year-deadline final">★ Final Deadline — ${state.finalDeadline}</div>`:''}
    ${dls.map(dl=>`<div class="year-deadline ${dl.complete?'complete':'incomplete'}">${dl.complete?'✓':'✗'} ${dl.desc} — ${dl.date}</div>`).join('')}</div>`;

  body.innerHTML=`<div class="year-view-grid">${monthCards.join('')}</div>${dlHtml}`;
}

function saveDayModal(key) {
  const d=parseKey(key), isPast=d<=TODAY;
  if (!state.days[key]) state.days[key]={goals:[]};
  const ge=document.getElementById('modal-goals');
  if(ge) {
    const newTexts = ge.value.split('\n').map(g=>g.trim()).filter(Boolean);
    const existing = state.days[key].goals || [];
    // Merge: preserve existing goal objects (done, gcalEventId) by matching text
    state.days[key].goals = newTexts.map(text => {
      const found = existing.find(g => (typeof g === 'string' ? g : g.text) === text);
      if (found && typeof found === 'object') return found; // preserve existing object
      return { text, done: false, gcalEventId: null };     // new goal
    });
    // If gcalSyncGoals is on, push any newly added goals that have no gcalEventId
    if (state.gcalSyncGoals && key >= todayKey()) {
      state.days[key].goals.forEach(async g => {
        if (typeof g === 'object' && !g.gcalEventId && !g.done) {
          const id = await gcalCreateEvent(g.text, key, 'Goal');
          if (id) { g.gcalEventId = id; saveState(); }
        }
      });
    }
  }
  if(isPast||key===todayKey()) {
    const ae=document.getElementById('modal-acc'), he=document.getElementById('modal-hrs');
    if(ae) state.days[key].accomplished=ae.value.trim();
    if(he) state.days[key].hours=he.value.trim();
  }
  saveState(); closeModal(); renderMain();
}
function closeModal() { document.getElementById('modal').style.display='none'; }

function renderDeadlines(mp) {
  const dls=state.deadlines;

  // Gather all goals across all days, sorted by date
  // Goals can be plain strings (legacy) or {text, done} objects
  const goalText = g => typeof g === 'string' ? g : (g.text || '');
  const goalDone = g => typeof g === 'object' && g.done === true;
  const allGoals = [];
  const days = state.days || {};
  Object.keys(days).sort().forEach(dateKey => {
    const dayGoals = days[dateKey]?.goals || [];
    dayGoals.forEach((g, gi) => {
      const d = parseKey(dateKey);
      const isPast = d < TODAY;
      const isToday = dateKey === todayKey();
      allGoals.push({ dateKey, goal: goalText(g), done: goalDone(g), goalIdx: gi, isPast, isToday });
    });
  });
  // Sort all goals: incomplete first (by date), then complete (by date)
  allGoals.sort((a,b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;

  });

  mp.innerHTML=`

      <h3>All Deadlines</h3>
      ${dls.length===0?'<p style="font-size:.82rem;color:var(--muted)">No deadlines yet.</p>':''}

        <div class="deadline-dot ${dl.complete?'complete':'incomplete'}"></div>
        <div class="deadline-info"><div class="dl-desc" style="${dl.complete?'text-decoration:line-through;opacity:.6':''}">${dl.desc}</div><div class="dl-date">${dl.date}</div></div>
        <div class="deadline-actions">
          <button class="btn btn-sm btn-ghost" onclick="toggleDeadline(${i})">${dl.complete?'Mark Incomplete':'Mark Complete'}</button>
          <button class="btn btn-sm" style="background:var(--rust)" onclick="deleteDeadline(${i})">✕</button>
        </div>
      </div>`).join('')}

    <div class="card" style="margin-bottom:16px">

function addGoalFromPane() {
  const date = document.getElementById('dl-goal-date')?.value;
  const text = document.getElementById('dl-goal-text')?.value.trim();
  if (!date || !text) { alert('Please enter a date and goal.'); return; }
  if (!state.days[date]) state.days[date] = { goals: [] };
  if (!state.days[date].goals) state.days[date].goals = [];
  const goal = { text, done: false, gcalEventId: null };
  state.days[date].goals.push(goal);
  saveState(); renderMain(); renderSide();
  if (state.gcalSyncGoals) {
    gcalCreateEvent(text, date, 'Goal').then(id => {
      if (id) { goal.gcalEventId = id; saveState(); }
    });
  }
}

function toggleGoal(dateKey, goalIdx) {
  const goals = state.days[dateKey]?.goals;
  if (!goals) return;
  const g = goals[goalIdx];
  if (typeof g === 'string') {
    goals[goalIdx] = { text: g, done: true, gcalEventId: null };
  } else {
    goals[goalIdx] = { ...g, done: !g.done };
  }
  const updated = goals[goalIdx];
  saveState(); renderMain(); renderSide();
  if (state.gcalSyncGoals && updated.gcalEventId) {
    gcalUpdateEvent(updated.gcalEventId, updated.text, dateKey, 'Goal', updated.done);
  }
}

function deleteGoal(dateKey, goalIdx) {
  const goals = state.days[dateKey]?.goals;
  if (!goals) return;
  const g = goals[goalIdx];
  if (state.gcalSyncGoals && typeof g === 'object' && g.gcalEventId) gcalDeleteEvent(g.gcalEventId);
  goals.splice(goalIdx, 1);
  saveState(); renderMain(); renderSide();
}
function saveFinalDeadline() { state.finalDeadline=document.getElementById('final-dl-date').value; saveState(); renderMain(); renderSide(); }
function addDeadline() {
  const desc=document.getElementById('new-dl-desc').value.trim(), date=document.getElementById('new-dl-date').value;
  if(!desc||!date){alert('Please fill in both fields.');return;}
  const dl = {desc, date, complete:false, gcalEventId: null};
  state.deadlines.push(dl);
  saveState(); renderMain();
  if (state.gcalSyncDeadlines) {
    gcalCreateEvent(desc, date, 'Deadline').then(id => {
      if (id) { dl.gcalEventId = id; saveState(); }
    });
  }
}
function toggleDeadline(i) {
  state.deadlines[i].complete = !state.deadlines[i].complete;
  saveState(); renderMain();
  const dl = state.deadlines[i];
  if (state.gcalSyncDeadlines && dl.gcalEventId) {
    gcalUpdateEvent(dl.gcalEventId, dl.desc, dl.date, 'Deadline', dl.complete);
  }
}
function deleteDeadline(i) {
  if(!confirm('Delete this deadline?'))return;
  const dl = state.deadlines[i];
  if (state.gcalSyncDeadlines && dl.gcalEventId) gcalDeleteEvent(dl.gcalEventId);
  state.deadlines.splice(i,1); saveState(); renderMain();
}

function saveWordCount() {
  state.wcGoal    = parseFloat(document.getElementById('wc-goal')?.value) || 0;
  state.wcCurrent = parseFloat(document.getElementById('wc-current')?.value) || 0;
  saveState(); renderMain();
}

function saveWritingProject(i) {
  if (!state.writingProjects?.[i]) return;
  state.writingProjects[i].wcGoal    = parseFloat(document.getElementById('wp-goal-'+i)?.value) || 0;
  state.writingProjects[i].wcCurrent = parseFloat(document.getElementById('wp-current-'+i)?.value) || 0;
  saveState(); renderMain();
}

function addWritingProject() {
  const title = document.getElementById('wp-new-title')?.value.trim();
  if (!title) { alert('Please enter a title.'); return; }
  if (!state.writingProjects) state.writingProjects = [];
  state.writingProjects.push({
    id: Date.now().toString(36),
    title,
    wcGoal:    parseFloat(document.getElementById('wp-new-goal')?.value) || 0,
    wcCurrent: 0,
    docxPath:  '',
  });
  saveState(); renderMain();
}

async function pickDocxFileForProject(i) {
  if (typeof window.electronDialog === 'undefined') return;
  const filePath = await window.electronDialog.pickFile({
    title:      'Select Word document for ' + (state.writingProjects[i]?.title||'project'),
    filters:    [{ name: 'Word Documents', extensions: ['docx'] }],
    properties: ['openFile'],
  });
  if (!filePath || !state.writingProjects[i]) return;
  state.writingProjects[i].docxPath = filePath;
  saveState();
  // Get initial word count
  const result = await window.electronDocx.watchStart(filePath);
  if (result.ok && result.count > 0) {
    state.writingProjects[i].wcCurrent = result.count;
    saveState();
  }
  // Start watching for changes
  window.electronDocx.offWordCount();
  window.electronDocx.onWordCount((count) => {
    // Update the right project based on current docxPath match
    const proj = state.writingProjects.find(p => p.docxPath === filePath);
    if (proj) {
      proj.wcCurrent = count;
      saveState();
      if (currentPane === 'wordcount') renderMain();
      renderSide();
      const el = document.getElementById('today-display');
      if (el) { const orig = el.textContent; el.textContent = '📄 Word count updated'; setTimeout(()=>el.textContent=orig,2500); }
    }
  });
  renderMain(); renderSide();
}

function clearDocxFileForProject(i) {
  if (!state.writingProjects[i]) return;
  // Stop watcher if this was the active one
  if (state.writingProjects[i].docxPath === state.docxPath) {
    if (typeof window.electronDocx !== 'undefined') window.electronDocx.watchStop();
  }
  state.writingProjects[i].docxPath = '';
  saveState();
  renderMain();
}

function deleteWritingProject(i) {
  if (!confirm('Remove this writing project?')) return;
  state.writingProjects.splice(i, 1);
  saveState(); renderMain();
}




async function pickDocxFile() {
  if (typeof window.electronDialog === 'undefined') return;
  const filePath = await window.electronDialog.pickFile({
    title:      'Select your Word document',
    filters:    [{ name: 'Word Documents', extensions: ['docx'] }],
    properties: ['openFile'],
  });
  if (!filePath) return;
  state.docxPath = filePath;
  saveState();
  // Start watcher and get initial count
  const result = await window.electronDocx.watchStart(filePath);
  if (result.ok) {
    state.wcCurrent = result.count;
    saveState();
  }
  renderMain();
  renderSide();
}

function clearDocxFile() {
  if (typeof window.electronDocx !== 'undefined') window.electronDocx.watchStop();
  state.docxPath = '';
  saveState();
  renderMain();
}

// Start watching on load if a path is already configured
async function initDocxWatcher() {
  if (typeof window.electronDocx === 'undefined') return;
  if (!state.docxPath) return;
  // Register the live update listener
  window.electronDocx.offWordCount();
  window.electronDocx.onWordCount((count) => {
    state.wcCurrent = count;
    saveState();
    // Refresh word count pane and sidebar if visible
    if (currentPane === 'wordcount') renderMain();
    renderSide();
    // Flash a subtle indicator in the header
    const el = document.getElementById('today-display');
    if (el) {
      const orig = el.textContent;
      el.textContent = '📄 Word count updated';
      setTimeout(() => el.textContent = orig, 2500);
    }
  });
  // Start the watcher
  await window.electronDocx.watchStart(state.docxPath);
}

async function toggleGcalSync(field, val) {
  state[field] = val;
  saveState();

  // If turning ON, backfill existing future items that have no gcalEventId yet
  if (!val) return;
  const today = todayKey();

  if (field === 'gcalSyncDeadlines') {
    for (const dl of (state.deadlines||[])) {
      if (dl.gcalEventId || dl.complete || dl.date < today) continue;
      const id = await gcalCreateEvent(dl.desc, dl.date, 'Deadline');
      if (id) { dl.gcalEventId = id; }
    }
    saveState();
  }

  if (field === 'gcalSyncGoals') {
    for (const [dateKey, dayEntry] of Object.entries(state.days||{})) {
      if (dateKey < today) continue;
      for (const g of (dayEntry.goals||[])) {
        if (typeof g !== 'object' || g.gcalEventId || g.done) continue;
        const id = await gcalCreateEvent(g.text, dateKey, 'Goal');
        if (id) { g.gcalEventId = id; }
      }
    }
    saveState();
  }

  if (field === 'gcalSyncMeetings') {
    for (const m of (state.meetings||[])) {
      if (m.gcalEventId || m.date < today) continue;
      const id = await gcalCreateEvent(m.supervisor || 'Meeting', m.date, m.notes || '');
      if (id) { m.gcalEventId = id; }
    }
    saveState();
  }
}

// ===================== GOOGLE CALENDAR SYNC =====================

// Get an access token (reuses Gmail's token — same OAuth credentials)
async function gcalGetAccessToken() {
  return gmailGetAccessToken(); // same token works for both Gmail and Calendar
}

// Build a Google Calendar event body from a planner item
// Note: Google Calendar all-day events require end.date to be the day AFTER start.date
function gcalNextDay(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0, 10);
}

function gcalEventBody(summary, dateStr, description, done) {
  const body = {
    summary:     done ? ('✓ ' + summary) : summary,
    description: description || '',
    start: { date: dateStr },
    end:   { date: gcalNextDay(dateStr) },  // must be day after for all-day events
  };
  if (done) body.colorId = '2'; // green
  return body;
}

// Create a new event — returns the created event ID or null
async function gcalCreateEvent(summary, dateStr, description) {
  if (!state.alexaRefreshToken) return null;
  try {
    const token = await gcalGetAccessToken();
    const body  = gcalEventBody(summary, dateStr, description, false);
    const resp  = await fetch(`${GCAL_API}/calendars/primary/events`, {
      method:  'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      console.error('gcalCreate failed:', resp.status, JSON.stringify(errData));
      return null;
    }
    const data = await resp.json();
    return data.id || null;
  } catch(e) {
    console.error('gcalCreateEvent error:', e);
    return null;
  }
}

// Update an existing event by ID
async function gcalUpdateEvent(eventId, summary, dateStr, description, done) {
  if (!state.alexaRefreshToken || !eventId) return;
  try {
    const token = await gcalGetAccessToken();
    const body  = gcalEventBody(summary, dateStr, description, done);
    await fetch(`${GCAL_API}/calendars/primary/events/${encodeURIComponent(eventId)}`, {
      method:  'PATCH',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
  } catch(e) {
    console.error('gcalUpdateEvent error:', e);
  }
}

// Delete an event by ID
async function gcalDeleteEvent(eventId) {
  if (!state.alexaRefreshToken || !eventId) return;
  try {
    const token = await gcalGetAccessToken();
    await fetch(`${GCAL_API}/calendars/primary/events/${encodeURIComponent(eventId)}`, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token },
    });
  } catch(e) {
    console.error('gcalDeleteEvent error:', e);
  }
}

function renderMeetings(mp) {
  // Ensure every meeting has a stable id BEFORE sorting
  (state.meetings||[]).forEach((m,i) => {
    if (!m.id) m.id = 'm' + i + '_' + Date.now().toString(36);
  });
  const meetings = [...(state.meetings||[])].sort((a,b) => b.date.localeCompare(a.date));

  const cards = meetings.length === 0
    ? `<div class="meeting-empty">
        <div style="font-size:2rem;margin-bottom:8px">📋</div>
        No meetings logged yet. Add your first one below.
       </div>`
    : meetings.map((m, idx) => {
        const realIdx = state.meetings.findIndex(x => x.id === m.id);
        const pending = (m.actions||[]).filter(a=>!a.done).length;
        const total   = (m.actions||[]).length;
        const actionSummary = total ? `${total - pending}/${total} actions done` : 'No actions';
        const notesPreview = (m.notes||'').split('\n')[0].slice(0, 60) + ((m.notes||'').length > 60 ? '...' : '');
        const actionItems = (m.actions||[]).map((a, ai) => `
          <div class="action-item">
            <div class="action-checkbox${a.done?' done':''}" onclick="toggleAction(${realIdx},${ai})">

          </div>`).join('');

        return `<div class="meeting-card">
          <div class="meeting-card-header" onclick="toggleMeetingExpand(${realIdx})">
            <span class="meeting-date-badge">${m.date}</span>
            <span class="meeting-supervisor">${m.supervisor || 'Meeting'}</span>
            <span class="meeting-preview">${notesPreview}</span>

    if (!state.days[date]) state.days[date] = { goals: [] };

    state.days[date].goals.push({ text, done: false });
  } else {
    state.deadlines.push({ desc: text, date, complete: false });
  }
  saveState();
  closeModal();
  renderSide();
  if (currentPane === 'calendar' || currentPane === 'deadlines') renderMain();
}

// ── Create a new blank project ────────────────────────────────────────────────
function createProject(name) {
  const id = generateProjectId();
  const list = getProjectList();
  list.push({ id, name, created: new Date().toISOString() });
  saveProjectList(list);
  switchProject(id);
  return id;

// ── Delete a project ──────────────────────────────────────────────────────────
function deleteProject(id) {
  const list = getProjectList().filter(p => p.id !== id);
  saveProjectList(list);
  Object.keys(_storeCache).filter(k => k.startsWith('diss_proj_' + id + '_')).forEach(k => {
    delete _storeCache[k];
    if (isElectron) window.electronStorage.removeItem(k);
    else localStorage.removeItem(k);
  });
  if (state._activeProjectId === id) {
    if (list.length > 0) { switchProject(list[0].id); }
    else { const newId = createProject('My Project'); switchProject(newId); }
  }
}

// ── Migration from old flat keys ──────────────────────────────────────────────
function migrateIfNeeded() {
  const hasOldData = (isElectron ? _storeCache['diss_days'] : localStorage.getItem('diss_days')) !== null &&
                     (isElectron ? _storeCache['diss_days'] : localStorage.getItem('diss_days')) !== undefined ||
                     (isElectron ? _storeCache['diss_lastAccomplished'] : localStorage.getItem('diss_lastAccomplished')) !== null &&
                     (isElectron ? _storeCache['diss_lastAccomplished'] : localStorage.getItem('diss_lastAccomplished')) !== undefined;
  const existingProjects = getProjectList();
  if (!hasOldData || existingProjects.length > 0) return false;
  const id = generateProjectId();
  const oldFields = ['lastAccomplished','lastPlan','lastHours','days','deadlines','finalDeadline',
                     'wcGoal','wcCurrent','alexaEnabled','alexaRecipient','alexaLastSent',
                     'alexaLastStatus','currentTheme','meetings'];
  for (const k of oldFields) {
    const v = isElectron ? _storeCache['diss_'+k] : localStorage.getItem('diss_'+k);
    if (v !== null && v !== undefined) store(projKey(id, k), JSON.parse(v));
  }
  const globalMigrate = ['alexaClientId','alexaSenderEmail'];
  for (const k of globalMigrate) {
    const v = isElectron ? _storeCache['diss_'+k] : localStorage.getItem('diss_'+k);
    if (v !== null && v !== undefined) store(globalKey(k), JSON.parse(v));
  }
  saveProjectList([{ id, name: 'Ball Dissertation', created: new Date().toISOString() }]);
  setActiveProjectId(id);
  Object.keys(_storeCache).filter(k => k.startsWith('diss_') && !k.startsWith('diss_proj_') && !k.startsWith('diss_global_')).forEach(k => {
    delete _storeCache[k];
    if (isElectron) window.electronStorage.removeItem(k);
    else localStorage.removeItem(k);
  });
  return true;
}

function exportBackup() {
  const id = state._activeProjectId;
  const list = getProjectList();
  const proj = list.find(p => p.id === id) || { name: 'project' };
  const backup = {
    _version: 2,
    _exported: new Date().toISOString(),
    _projectName: proj.name,
    lastAccomplished: state.lastAccomplished,
    lastPlan:         state.lastPlan,
    lastHours:        state.lastHours,
    days:             state.days,
    deadlines:        state.deadlines,
    finalDeadline:    state.finalDeadline,
    wcGoal:           state.wcGoal,
    wcCurrent:        state.wcCurrent,
    alexaEnabled:     state.alexaEnabled,
    alexaRecipient:   state.alexaRecipient,
    alexaLastSent:    state.alexaLastSent,
    alexaLastStatus:  state.alexaLastStatus,
    currentTheme:     state.currentTheme,
    meetings:         state.meetings,
    // Global encrypted blobs
    enc_clientSecret: (isElectron ? _storeCache[globalKey('enc_clientSecret')] : localStorage.getItem(globalKey('enc_clientSecret'))) || null,
    enc_refreshToken: (isElectron ? _storeCache[globalKey('enc_refreshToken')] : localStorage.getItem(globalKey('enc_refreshToken'))) || null,
  };

  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  const safeName = proj.name.replace(/[^a-z0-9]/gi, '-').toLowerCase();
  a.href     = url;
  a.download = `${safeName}-backup-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;

  const filenameEl = document.getElementById('import-filename');
  const statusEl   = document.getElementById('import-status');
  if (filenameEl) filenameEl.textContent = file.name;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);

      // Basic validation
      if (typeof backup !== 'object' || backup === null) throw new Error('Invalid backup file.');
      if (!backup._version) throw new Error('File does not appear to be a dissertation planner backup.');

      if (!confirm('This will replace ALL current data with the backup. Are you sure?')) {
        if (statusEl) statusEl.textContent = '';
        return;
      }

      // Restore plain fields
      // Determine project name from backup or filename
      const importedName = backup._projectName ||
        file.name.replace(/[-_]backup[-_]\d{4}-\d{2}-\d{2}\.json$/i,'').replace(/[-_]/g,' ').trim() ||
        file.name.replace(/\.json$/i,'');

      // Create a new project for the imported data
      const newId = generateProjectId();
      const projFields = ['lastAccomplished','lastPlan','lastHours','days','deadlines','finalDeadline',
                          'wcGoal','wcCurrent','alexaEnabled','alexaRecipient',
                          'alexaLastSent','alexaLastStatus','currentTheme','meetings'];
      for (const k of projFields) {
        if (backup[k] !== undefined) store(projKey(newId, k), backup[k]);
      }
      const list = getProjectList();
      list.push({ id: newId, name: importedName, created: new Date().toISOString() });
      saveProjectList(list);

      // Restore encrypted blobs globally if present
      if (backup.enc_clientSecret) { _storeCache[globalKey('enc_clientSecret')] = backup.enc_clientSecret; if(isElectron) window.electronStorage.setItem(globalKey('enc_clientSecret'), backup.enc_clientSecret); else localStorage.setItem(globalKey('enc_clientSecret'), backup.enc_clientSecret); }
      if (backup.enc_refreshToken) { _storeCache[globalKey('enc_refreshToken')] = backup.enc_refreshToken; if(isElectron) window.electronStorage.setItem(globalKey('enc_refreshToken'), backup.enc_refreshToken); else localStorage.setItem(globalKey('enc_refreshToken'), backup.enc_refreshToken); }
      if (backup.enc_clientSecret || backup.enc_refreshToken) {
        state._hasEncryptedSecret = !!backup.enc_clientSecret;
        state._hasEncryptedToken  = !!backup.enc_refreshToken;
      }

      // Switch to the newly imported project
      switchProject(newId);

      if (statusEl) {
        statusEl.style.color = 'var(--green-done)';
        statusEl.textContent = '✓ Imported as new project "' + importedName + '". ' +
          Object.keys(backup.days||{}).length + ' day entries, ' +
          (backup.deadlines||[]).length + ' deadlines, ' +
          (backup.meetings||[]).length + ' meetings.';
      }

      // If encrypted creds were restored, prompt to unlock
      if (state._hasEncryptedSecret || state._hasEncryptedToken) {
        setTimeout(() => {
          showPasswordModal('enter', async (pw) => {
            await loadEncryptedCreds(pw);
            renderMain();
          });
        }, 600);
      }

    } catch(err) {
      if (statusEl) {
        statusEl.style.color = 'var(--red-dead)';
        statusEl.textContent = '✗ Import failed: ' + err.message;
      }
    }
  };
  reader.readAsText(file);
}

function importProjectItems(event) {
  const file = event.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById('items-status');

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const items = JSON.parse(e.target.result);

      // Validate it's a Project Items file
      if (!items._type || items._type !== 'jjs-planner-items') {
        throw new Error('This does not appear to be a Project Items file. Make sure you are importing the correct file.');
      }

      let added = { goals: 0, deadlines: 0, books: 0, meetings: 0 };

      // ── Merge goals ──────────────────────────────────────────────
      if (Array.isArray(items.goals)) {
        for (const g of items.goals) {
          if (!g.date || !g.text) continue;
          if (!state.days[g.date]) state.days[g.date] = { goals: [] };
          if (!state.days[g.date].goals) state.days[g.date].goals = [];
          state.days[g.date].goals.push({ text: g.text, done: false });
          added.goals++;
        }
      }

      // ── Merge deadlines ──────────────────────────────────────────
      if (Array.isArray(items.deadlines)) {
        for (const d of items.deadlines) {
          if (!d.date || !d.desc) continue;
          state.deadlines.push({ desc: d.desc, date: d.date, complete: false });
          added.deadlines++;
        }
      }

      // ── Merge books ──────────────────────────────────────────────
      if (Array.isArray(items.books)) {
        if (!state.books) state.books = [];
        for (const b of items.books) {
          if (!b.title) continue;
          // Don't add duplicates by title
          if (state.books.some(existing => existing.title.toLowerCase() === b.title.toLowerCase())) continue;
          state.books.push({
            id: Date.now().toString(36) + Math.random().toString(36).slice(2,5),
            title: b.title,
            currentPage: parseInt(b.currentPage) || 0,
            totalPages:  parseInt(b.totalPages)  || 0,
          });
          added.books++;
        }
      }

      // ── Merge meetings ───────────────────────────────────────────
      if (Array.isArray(items.meetings)) {
        if (!state.meetings) state.meetings = [];
        for (const m of items.meetings) {
          if (!m.date) continue;
          state.meetings.push({
            id: Date.now().toString(36) + Math.random().toString(36).slice(2,5),
            date:       m.date,
            supervisor: m.supervisor || '',
            notes:      m.notes      || '',
            actions:    Array.isArray(m.actions) ? m.actions.map(a => ({
              text: typeof a === 'string' ? a : (a.text || ''),
              done: false,
            })) : [],
            _open: false,
          });
          added.meetings++;
        }
      }

      saveState();
      renderSide();
      if (currentPane === 'deadlines' || currentPane === 'calendar' ||
          currentPane === 'meetings'  || currentPane === 'books') renderMain();

      const summary = [
        added.goals     ? added.goals     + ' goal'     + (added.goals     !== 1 ? 's' : '') : '',
        added.deadlines ? added.deadlines + ' deadline' + (added.deadlines !== 1 ? 's' : '') : '',
        added.books     ? added.books     + ' book'     + (added.books     !== 1 ? 's' : '') : '',
        added.meetings  ? added.meetings  + ' meeting'  + (added.meetings  !== 1 ? 's' : '') : '',
      ].filter(Boolean).join(', ');

      if (statusEl) {
        statusEl.style.color = 'var(--green-done)';
        statusEl.textContent = summary ? '✓ Added: ' + summary : '✓ File imported (no new items to add)';
      }

    } catch(err) {
      if (statusEl) {
        statusEl.style.color = 'var(--red-dead)';
        statusEl.textContent = '✗ Import failed: ' + err.message;
      }
    }
  };
  reader.readAsText(file);
}

function exportProjectContext() {
  const proj = getProjectList().find(p => p.id === state._activeProjectId);
  const projName = proj ? proj.name : 'Project';

  // Recent sessions (last 7)
  const recentSessions = Object.keys(state.days||{})
    .sort().reverse().slice(0, 7)
    .map(k => {
      const d = state.days[k];
      return d.accomplished ? `  ${k}: ${d.accomplished}${d.hours ? ' ('+d.hours+'h)' : ''}` : null;
    }).filter(Boolean);

  // Upcoming deadlines
  const upcomingDls = (state.deadlines||[])
    .filter(dl => !dl.complete && dl.date >= todayKey())
    .sort((a,b) => a.date.localeCompare(b.date))
    .map(dl => `  ${dl.date}: ${dl.desc}`);

  // Outstanding goals
  const goalsList = [];
  Object.keys(state.days||{}).sort().forEach(k => {
    (state.days[k]?.goals||[]).forEach(g => {
      const text = typeof g === 'string' ? g : g.text;
      const done = typeof g === 'object' && g.done;
      if (!done && k >= todayKey()) goalsList.push(`  ${k}: ${text}`);
    });
  });

  // Recent meetings
  const recentMtgs = (state.meetings||[])
    .sort((a,b) => b.date.localeCompare(a.date)).slice(0, 3)
    .map(m => {
      const pending = (m.actions||[]).filter(a=>!a.done).map(a=>a.text||a);
      const pendingStr = pending.length ? ' | Pending: ' + pending.join(', ') : '';
      return '  ' + m.date + ' - ' + (m.supervisor||'Meeting') + pendingStr;
    });

  // Books
  const booksList = (state.books||[]).map(b => {
    const cur = parseInt(b.currentPage)||0, tot = parseInt(b.totalPages)||0;
    const pct = tot > 0 ? Math.round(cur/tot*100) : null;
    return `  ${b.title}${tot ? ': p.'+cur+'/'+tot+(pct!==null?' ('+pct+'%)':'') : ''}`;
  });

  const wpd = wordsPerDay();
  const daysLeft = state.finalDeadline
    ? Math.max(0, Math.ceil((parseKey(state.finalDeadline) - TODAY) / 86400000))
    : null;

  const SEP = '\n';
  const parts = [
    'PROJECT CONTEXT - ' + projName,
    'Generated: ' + new Date().toLocaleDateString(),
    'Today: ' + todayKey(),
    '',
    '-- WORD COUNT --',
    'Current: ' + Number(state.wcCurrent||0).toLocaleString() + ' words',
    state.wcGoal ? 'Goal: ' + Number(state.wcGoal).toLocaleString() + ' words' : '',
    state.wcGoal ? 'Remaining: ' + Number(Math.max(0,(state.wcGoal||0)-(state.wcCurrent||0))).toLocaleString() + ' words' : '',
    wpd > 0 ? 'Daily target: ' + wpd.toFixed(0) + ' words/day' : '',
    state.finalDeadline ? 'Final deadline: ' + state.finalDeadline + ' (' + daysLeft + ' days away)' : '',
    '',
    recentSessions.length ? '-- RECENT SESSIONS --' + SEP + recentSessions.join(SEP) : '',
    '',
    upcomingDls.length ? '-- UPCOMING DEADLINES --' + SEP + upcomingDls.join(SEP) : '',
    '',
    goalsList.length ? '-- OUTSTANDING GOALS --' + SEP + goalsList.join(SEP) : '',
    '',
    recentMtgs.length ? '-- RECENT MEETINGS --' + SEP + recentMtgs.join(SEP) : '',
    '',
    booksList.length ? '-- BOOKS IN PROGRESS --' + SEP + booksList.join(SEP) : '',
    '',
    '-- HOW TO GENERATE A PROJECT ITEMS FILE --',
    'Paste this context into a Claude conversation and ask it to plan goals,',
    'suggest deadlines, recommend books, or schedule meetings. Ask Claude to',
    'output a Project Items file in this exact JSON format:',
    '',
    '{',
    '  "_type": "jjs-planner-items",',
    '  "_version": 1,',
    '  "goals":     [ { "date": "YYYY-MM-DD", "text": "..." } ],',
    '  "deadlines": [ { "date": "YYYY-MM-DD", "desc": "..." } ],',
    '  "books":     [ { "title": "...", "totalPages": 0 } ],',
    '  "meetings":  [ { "date": "YYYY-MM-DD", "supervisor": "...", "notes": "...", "actions": ["..."] } ]',
    '}',
  ].filter(function(s){ return s !== ''; });

  const text = parts.join(SEP).replace(/\n{3,}/g, '\n\n'); blob = new Blob([text], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${projName.replace(/[^a-z0-9]/gi,'-').toLowerCase()}-context-${todayKey()}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function buildReportText(from, to) {
  const proj = getProjectList().find(p => p.id === state._activeProjectId);
  const projName = proj ? proj.name : 'Project';
  const userName = state.userName ? state.userName + '\n' : '';

  // Collect days in window
  const days = state.days || {};
  const inWindow = k => k >= from && k <= to;

  // Hours
  let totalHrs = 0;
  Object.keys(days).filter(inWindow).forEach(k => {
    totalHrs += parseFloat(days[k]?.hours || 0) || 0;
  });

  // Words — sum from session writing entries in window
  let wordsWritten = 0;
  Object.keys(days).filter(inWindow).forEach(k => {
    (days[k]?.writing||[]).forEach(e => { wordsWritten += parseInt(e.wordsWritten)||0; });
  });

  // Pages — sum from session reading entries in window
  let totalPagesRead = 0;
  Object.keys(days).filter(inWindow).forEach(k => {
    (days[k]?.reading||[]).forEach(e => { totalPagesRead += parseInt(e.pagesRead)||0; });
  });

  // Goals completed in window
  const completedGoals = [];
  Object.keys(days).filter(inWindow).forEach(k => {
    (days[k]?.goals||[]).forEach(g => {
      const done = typeof g === 'object' && g.done;
      const text = typeof g === 'string' ? g : g.text;
      if (done) completedGoals.push({ date: k, text });
    });
  });

  // Deadlines met in window
  const metDeadlines = (state.deadlines||[]).filter(dl => dl.complete && dl.date >= from && dl.date <= to);

  // Meetings in window
  const windowMeetings = (state.meetings||[]).filter(m => m.date >= from && m.date <= to);

  // Build report text
  let lines = [];
  lines.push(`PROGRESS REPORT`);
  lines.push(`${projName}`);
  if (state.userName) lines.push(state.userName);
  lines.push(`Period: ${from} to ${to}`);
  lines.push(`Generated: ${new Date().toLocaleDateString()}`);
  lines.push('');
  lines.push('─'.repeat(50));
  lines.push('');

  if (reportIncludes.hours) {
    lines.push(`HOURS WORKED`);
    lines.push(`Total: ${totalHrs.toFixed(1)} hours`);
    lines.push('');
  }
  if (reportIncludes.words) {
    // Per-project breakdown
    const writingByProject = {};
    Object.keys(days).filter(inWindow).forEach(k => {
      (days[k]?.writing||[]).forEach(e => {
        const key = e.projectTitle || e.projectId || 'Unknown';
        writingByProject[key] = (writingByProject[key]||0) + (parseInt(e.wordsWritten)||0);
      });
    });
    lines.push(`WORDS WRITTEN`);
    lines.push(`Total: ${wordsWritten.toLocaleString()} words`);
    if (Object.keys(writingByProject).length > 1) {
      Object.entries(writingByProject).forEach(([proj, words]) => {
        lines.push(`  • ${proj}: ${words.toLocaleString()} words`);
      });
    }
    lines.push('');
  }
  if (reportIncludes.pages) {
    // Per-book breakdown
    const readingByBook = {};
    Object.keys(days).filter(inWindow).forEach(k => {
      (days[k]?.reading||[]).forEach(e => {
        const key = e.bookTitle || e.bookId || 'Unknown';
        readingByBook[key] = (readingByBook[key]||0) + (parseInt(e.pagesRead)||0);
      });
    });
    lines.push(`PAGES READ`);
    lines.push(`Total: ${totalPagesRead} pages`);
    if (Object.keys(readingByBook).length > 0) {
      Object.entries(readingByBook).forEach(([book, pages]) => {
        lines.push(`  • ${book}: ${pages} pages`);
      });
    }
    lines.push('');
  }
  if (reportIncludes.books && (state.books||[]).length > 0) {
    lines.push(`BOOKS — CURRENT POSITION`);
    (state.books||[]).forEach(b => {
      const cur = parseInt(b.currentPage)||0;
      const tot = parseInt(b.totalPages)||0;
      const pct = tot > 0 ? Math.round(cur/tot*100) : null;
      lines.push(`  • ${b.title}: p.${cur}${tot?' / '+tot:''}${pct!==null?' ('+pct+'%)':''}`);
    });
    lines.push('');
  }
  if (reportIncludes.goals && completedGoals.length > 0) {
    lines.push(`GOALS COMPLETED`);
    completedGoals.forEach(g => lines.push(`  • [${g.date}] ${g.text}`));
    lines.push('');
  }
  if (reportIncludes.deadlines && metDeadlines.length > 0) {
    lines.push(`DEADLINES MET`);
    metDeadlines.forEach(dl => lines.push(`  • [${dl.date}] ${dl.desc}`));
    lines.push('');
  }
  if (reportIncludes.meetings && windowMeetings.length > 0) {
    lines.push(`MEETINGS`);
    windowMeetings.forEach(m => {
      lines.push(`  ${m.date} — ${m.supervisor||'Meeting'}`);
      if (m.notes) lines.push(`    Notes: ${m.notes.split('\n')[0].slice(0,80)}`);
      const done = (m.actions||[]).filter(a=>a.done);
      const pending = (m.actions||[]).filter(a=>!a.done);
      if (done.length) lines.push(`    Completed actions: ${done.map(a=>a.text||a).join('; ')}`);
      if (pending.length) lines.push(`    Pending actions: ${pending.map(a=>a.text||a).join('; ')}`);
    });
    lines.push('');
  }

  return lines.join('\n');
}

  if (reportIncludes.deadlines && metDeadlines.length > 0) {

// ===================== AI DASHBOARD =====================

const CATO_DEFAULT_PROMPT = `You are Cato, a virtual research supervisor specializing in Reformed and Puritan theology, with deep expertise in the theology of the Westminster Assembly, covenant theology, and the history of soteriology. You have supervised numerous PhD dissertations in historical and constructive theology.

You have access to the researcher's current project data: their session logs, deadlines, goals, word count progress, and meetings. Use this data to inform your responses.

When giving a review, be direct and honest. You are a supervisor, not a cheerleader — but you are also not harsh. Speak in the first person. Be concise: no more than 3 sentences. If the researcher is on track, say so briefly and point to what matters most right now. If they are behind or unfocused, say so clearly and give one concrete recommendation.

When generating agenda items, think like a supervisor planning the next two to four weeks of research. Suggest specific, actionable goals with realistic dates. Prefer depth over breadth.

You do not speculate about things you cannot know. You do not repeat yourself. You write in a measured, scholarly register — neither casual nor pompous.`;

function getCatoPrompt() {
  return state.catoSystemPrompt || CATO_DEFAULT_PROMPT;
}

// Rough token estimator: ~4 chars per token
function estimateTokens(str) { return Math.ceil(str.length / 4); }
const CATO_INPUT_TOKEN_CAP = 8000;

function buildCatoContext(includeHistory) {
  const proj = getProjectList().find(p => p.id === state._activeProjectId);
  const today = todayKey();
  const wpd = wordsPerDay();
  const daysLeft = state.finalDeadline
    ? Math.max(0, Math.ceil((parseKey(state.finalDeadline) - TODAY) / 86400000)) : null;

  const sections = [];

  // ── Project overview ──────────────────────────────────────────────────────
  sections.push('PROJECT: ' + (proj?.name||'Unknown'));
  sections.push('Today: ' + today);
  if (state.finalDeadline) sections.push('Final deadline: ' + state.finalDeadline + ' (' + (daysLeft||0) + ' days away)');
  if (state.wcGoal > 0) {
    sections.push('Main project word count: ' + Number(state.wcCurrent||0).toLocaleString() + ' / ' + Number(state.wcGoal).toLocaleString() + ' words');
    if (wpd > 0) sections.push('Words/day needed to hit deadline: ' + wpd.toFixed(0));
  }

  // ── Additional writing projects ───────────────────────────────────────────
  if ((state.writingProjects||[]).length > 0) {
    const wpLines = (state.writingProjects||[]).map(p => {
      const pct = p.wcGoal > 0 ? Math.round((p.wcCurrent||0)/p.wcGoal*100) : null;
      return '  ' + p.title + ': ' + Number(p.wcCurrent||0).toLocaleString() + (p.wcGoal?' / '+Number(p.wcGoal).toLocaleString():'') + (pct!==null?' ('+pct+'%)':'');
    });
    sections.push('\nADDITIONAL WRITING PROJECTS:\n' + wpLines.join('\n'));
  }

  // ── Books ─────────────────────────────────────────────────────────────────
  if ((state.books||[]).length > 0) {
    const bookLines = (state.books||[]).map(b => {
      const cur = parseInt(b.currentPage)||0, tot = parseInt(b.totalPages)||0;
      const pct = tot > 0 ? Math.round(cur/tot*100) : null;
      return '  ' + b.title + ': p.' + cur + (tot?' / '+tot:'') + (pct!==null?' ('+pct+'%)':'');
    });
    sections.push('\nBOOKS IN PROGRESS:\n' + bookLines.join('\n'));
  }

  // ── All sessions (oldest first) ───────────────────────────────────────────
  const allSessionKeys = Object.keys(state.days||{}).sort();
  const sessionLines = [];
  allSessionKeys.forEach(k => {
    const d = state.days[k];
    if (!d) return;
    let line = k;
    if (d.hours) line += ' (' + d.hours + 'h)';
    if (d.accomplished) line += ': ' + d.accomplished;
    const reading = (d.reading||[]).map(r => r.pagesRead + ' pages of ' + r.bookTitle).filter(Boolean);
    const writing = (d.writing||[]).map(w => w.wordsWritten + ' words on ' + w.projectTitle).filter(Boolean);
    if (reading.length) line += ' | Read: ' + reading.join(', ');
    if (writing.length) line += ' | Wrote: ' + writing.join(', ');
    if (line !== k) sessionLines.push('  ' + line);
  });
  if (sessionLines.length) sections.push('\nALL SESSIONS (oldest to newest):\n' + sessionLines.join('\n'));
  else sections.push('\nNo sessions logged yet.');

  // ── All goals ─────────────────────────────────────────────────────────────
  const completedGoals = [], pendingGoals = [];
  Object.keys(state.days||{}).sort().forEach(k => {
    (state.days[k]?.goals||[]).forEach(g => {
      const text = typeof g === 'string' ? g : g.text;
      const done = typeof g === 'object' && g.done;
      if (done) completedGoals.push('[done] ' + k + ': ' + text);
      else pendingGoals.push('[pending] ' + k + ': ' + text);
    });
  });
  if (completedGoals.length) sections.push('\nCOMPLETED GOALS:\n' + completedGoals.map(g=>'  '+g).join('\n'));
  if (pendingGoals.length)   sections.push('\nPENDING GOALS:\n'   + pendingGoals.map(g=>'  '+g).join('\n'));

  // ── All deadlines ─────────────────────────────────────────────────────────
  const doneDls = (state.deadlines||[]).filter(d=>d.complete).map(d=>'  [done] '+d.date+': '+d.desc);
  const pendDls = (state.deadlines||[]).filter(d=>!d.complete).sort((a,b)=>a.date.localeCompare(b.date)).map(d=>'  [pending] '+d.date+': '+d.desc);
  if (doneDls.length)  sections.push('\nCOMPLETED DEADLINES:\n' + doneDls.join('\n'));
  if (pendDls.length)  sections.push('\nUPCOMING DEADLINES:\n'  + pendDls.join('\n'));

  // ── All meetings ──────────────────────────────────────────────────────────
  const mtgLines = (state.meetings||[]).sort((a,b)=>a.date.localeCompare(b.date)).map(m => {
    const done = (m.actions||[]).filter(a=>a.done).map(a=>a.text||a);
    const pend = (m.actions||[]).filter(a=>!a.done).map(a=>a.text||a);
    let line = '  ' + m.date + ' — ' + (m.supervisor||'Meeting');
    if (m.notes) line += '\n    Notes: ' + m.notes.slice(0,200);
    if (done.length) line += '\n    Completed actions: ' + done.join('; ');
    if (pend.length) line += '\n    Pending actions: '   + pend.join('; ');
    return line;
  });
  if (mtgLines.length) sections.push('\nALL MEETINGS:\n' + mtgLines.join('\n'));

  let context = sections.filter(Boolean).join('\n');

  // ── Token cap: trim oldest sessions if over limit ─────────────────────────
  if (estimateTokens(context) > CATO_INPUT_TOKEN_CAP) {
    // Rebuild with fewer sessions
    const trimmedSessions = sessionLines.slice(-30); // keep most recent 30
    // Trim to last 30 sessions if over token cap
    const rebuiltContext = context.replace(
      /ALL SESSIONS[^:]*:[\s\S]*?(?=\nADDITIONAL|\nBOOKS|\nCOMPLETED|\nPENDING|\nUPCOMING|\nALL MEETINGS|$)/,
      'RECENT SESSIONS (last 30):\n' + trimmedSessions.join('\n') + '\n'
    );
    context = rebuiltContext;
  }

  // ── Previous reviews (history) ────────────────────────────────────────────
  if (includeHistory) {
    const history = (state.catoHistory||[]).slice(0,3);
    if (history.length > 0) {
      const histLines = history.map((h,i) =>
        '  [' + new Date(h.ts).toLocaleDateString() + '] ' + h.response.slice(0,300)
      );
      context += '\n\nMY PREVIOUS REVIEWS (most recent first):\n' + histLines.join('\n---\n');
    }
  }

  return context;
}

function logCatoUsage(feature, inputTokens, outputTokens) {
  if (!state.catoUsageLog) state.catoUsageLog = [];
  state.catoUsageLog.unshift({
    ts: new Date().toISOString(),
    feature,
    inputTokens: inputTokens || 0,
    outputTokens: outputTokens || 0,
  });
  // Keep last 50 entries
  if (state.catoUsageLog.length > 50) state.catoUsageLog = state.catoUsageLog.slice(0, 50);
  saveState();
}

async function callCato(userPrompt, feature) {
  if (state.catoEnabled === false) {
    alert('AI is disabled. Enable it using the toggle on the AI Dashboard.');
    return null;
  }
  if (!state.anthropicKey) {
    alert('Please add your Anthropic API key in the AI Dashboard under API Settings.');
    return null;
  }
  state.catoLastCallStatus  = 'calling';
  state.catoLastCallFeature = feature;
  state.catoLastCallTime    = new Date().toISOString();
  if (currentPane === 'ai') renderAIDashboard(document.getElementById('main-pane'));
  const context = buildCatoContext(feature === 'Review');
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.anthropicKey,
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: getCatoPrompt(),
        messages: [{ role: 'user', content: context + '\n\n---\n\n' + userPrompt }],
      }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(()=>({}));
      throw new Error(err.error?.message || 'API error ' + resp.status);
    }
    const data = await resp.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    logCatoUsage(feature, data.usage?.input_tokens, data.usage?.output_tokens);
    state.catoLastCallStatus = 'ok';
    state.catoLastCallTime   = new Date().toISOString();
    return text;
  } catch(e) {
    state.catoLastCallStatus = 'error';
    state.catoLastCallTime   = new Date().toISOString();
    throw e;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAIDashboard(mp) {
  const review      = state.catoReview     || '';
  const reviewDate  = state.catoReviewDate || '';
  const agendaItems = state.catoAgendaItems || [];
  const usageLog    = state.catoUsageLog   || [];
  const hasKey      = !!state.anthropicKey;
  const enabled     = state.catoEnabled !== false;

  const monitorStatusClass = state.catoLastCallStatus === 'calling' ? 'active'
    : state.catoLastCallStatus === 'error' ? 'error' : '';
  const monitorText = state.catoLastCallStatus === 'calling'
    ? 'Calling API...'
    : state.catoLastCallTime
      ? (state.catoLastCallStatus === 'error' ? 'Error: ' : 'Last call: ')
        + state.catoLastCallFeature + '  '
        + new Date(state.catoLastCallTime).toLocaleTimeString()
      : 'No API calls this session';

  const agendaHtml = agendaItems.length === 0
    ? '<p style="font-size:.82rem;color:var(--muted);font-style:italic">No agenda items yet. Click Generate Agenda to get Cato\'s recommendations.</p>'
    : agendaItems.map((item, i) =>
        '<div class="agenda-item">' +
        '<input type="checkbox" ' + (item.approved?'checked':'') + ' onchange="toggleAgendaItem(' + i + ',this.checked)">' +
        '<div class="agenda-item-body">' +
        '<div class="agenda-item-type">' + item.type + '</div>' +
        '<div class="agenda-item-title">' + item.title + '</div>' +
        '<div class="agenda-item-date">' + (item.date||'') + '</div>' +
        '</div></div>'

async function catoRefreshReview() {
  const btn = document.getElementById('cato-refresh-btn');
  const txt = document.getElementById('cato-review-text');
  const status = document.getElementById('cato-review-status');
  if (btn) btn.disabled = true;
  if (status) status.textContent = 'Asking Cato...';
  if (txt) txt.innerHTML = '<span style="opacity:.4;font-style:italic">Generating...</span>';
  try {
    const review = await callCato(
      'Please give me a brief review (1-3 sentences) of how my research project is progressing based on the data above. Be honest, direct, and supervisory.',
      'Review'
    );
    if (review) {
      state.catoReview     = review;
      state.catoReviewDate = new Date().toISOString();
      // Store in history (keep last 3)
      if (!state.catoHistory) state.catoHistory = [];
      state.catoHistory.unshift({ ts: state.catoReviewDate, response: review });
      if (state.catoHistory.length > 3) state.catoHistory = state.catoHistory.slice(0, 3);
      saveState();
      if (txt) txt.textContent = review;
      if (status) status.textContent = '';
      if (currentPane === 'overview') renderOverview();
    }
  } catch(e) {
    if (txt) txt.innerHTML = '<span style="opacity:.5;font-style:italic">Error: ' + e.message + '</span>';
    if (status) status.textContent = 'Error: ' + e.message;
    if (currentPane === 'ai') renderAIDashboard(document.getElementById('main-pane'));
  }
  if (btn) btn.disabled = false;
}

async function catoGenerateAgenda() {
  const status = document.getElementById('cato-agenda-status');
  const list   = document.getElementById('cato-agenda-list');
  if (status) status.textContent = 'Generating agenda...';
  if (list)   list.innerHTML = '<div style="font-size:.82rem;color:var(--muted);font-style:italic;padding:10px 0">Asking Cato...</div>';
  try {
    const raw = await callCato(
      'Generate a recommended agenda for the next 2-4 weeks. Return ONLY a JSON array (no markdown, no explanation) with objects like:\n[{"type":"goal","title":"...","date":"YYYY-MM-DD"},{"type":"deadline","title":"...","date":"YYYY-MM-DD"}]\nToday is ' + todayKey() + '. Include 5-10 items. Types must be "goal" or "deadline" only.',
      'Agenda'
    );
    const jsonMatch = raw.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error('Could not parse agenda from response');
    const items = JSON.parse(jsonMatch[0]);
    state.catoAgendaItems = items.map(item => ({ ...item, approved: false }));
    saveState();
    if (status) status.textContent = 'Generated ' + items.length + ' items. Check the ones you want and click "Add Approved".';
    if (currentPane === 'deadlines') renderMain();
  } catch(e) {
    if (status) status.textContent = 'Error: ' + e.message;
    if (list)   list.innerHTML = '<div style="font-size:.82rem;color:var(--muted)">Failed to generate agenda. Try again.</div>';
    if (currentPane === 'ai') renderAIDashboard(document.getElementById('main-pane'));
  }
}
